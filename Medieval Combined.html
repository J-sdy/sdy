&lt;!-- ========== TAB 1: DS RISE &amp; DYNASTIES ========== --&gt;
&lt;div id=&quot;t1&quot; class=&quot;panel active&quot;&gt;
  &lt;span class=&quot;section-label sl-ds&quot;&gt;Delhi Sultanate · 1206–1526&lt;/span&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;📌 Background &amp; Rise&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;
      &lt;li&gt;Rise = series of shifts from &lt;span class=&quot;kw&quot;&gt;fragmented Rajput kingdoms&lt;/span&gt; → centralized Islamic empire&lt;/li&gt;
      &lt;li&gt;Began with decline of &lt;span class=&quot;kw&quot;&gt;Ghaznavids&lt;/span&gt; + expansion of &lt;span class=&quot;kw&quot;&gt;Ghurid dynasty&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Muhammad Ghori&lt;/span&gt; → unlike previous raiders, sought &lt;span class=&quot;kw&quot;&gt;territory not plunder&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;After Ghori&#x27;s death → his Turkish slave-general &lt;span class=&quot;kw&quot;&gt;Qutb-ud-din Aibak&lt;/span&gt; took over = official start of Sultanate&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;⚔️ The Turning Point&lt;/div&gt;
      &lt;span class=&quot;kw&quot;&gt;1191&lt;/span&gt; – Muhammad Ghori &lt;span class=&quot;rd&quot;&gt;defeated&lt;/span&gt; at &lt;span class=&quot;kw&quot;&gt;First Battle of Tarain&lt;/span&gt;&lt;br&gt;
      &lt;span class=&quot;kw&quot;&gt;1192&lt;/span&gt; – Ghori &lt;span class=&quot;gr&quot;&gt;wins&lt;/span&gt; Second Battle of Tarain → crushed &lt;span class=&quot;kw&quot;&gt;Prithviraj Chauhan&#x27;s&lt;/span&gt; Rajput confederacy
    &lt;/div&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;🧠 Remember 5 Dynasties in Order&lt;/div&gt;
      &lt;strong&gt;&quot;Many Kings Travel Slowly Lazily&quot;&lt;/strong&gt;&lt;br&gt;
      &lt;span class=&quot;pu&quot;&gt;M&lt;/span&gt;amluk (Slave) → &lt;span class=&quot;pu&quot;&gt;K&lt;/span&gt;halji → &lt;span class=&quot;pu&quot;&gt;T&lt;/span&gt;ughlaq → &lt;span class=&quot;pu&quot;&gt;S&lt;/span&gt;ayyid → &lt;span class=&quot;pu&quot;&gt;L&lt;/span&gt;odi
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- MAMLUK --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-mamluk&quot;&gt;1206–1290&lt;/span&gt; Mamluk (Slave) Dynasty&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:10px;&quot;&gt;Transition from military occupation → settled administrative state. Birth of &lt;span class=&quot;kw&quot;&gt;Indo-Saracenic&lt;/span&gt; architectural style.&lt;/p&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;ds-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Facts&lt;/th&gt;&lt;th&gt;Military&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Qutb-ud-din Aibak&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1206–1210&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Called &lt;span class=&quot;kw&quot;&gt;Lakh Baksh&lt;/span&gt; (generous giver)&lt;br&gt;
              • Started &lt;span class=&quot;kw&quot;&gt;Qutub Minar&lt;/span&gt;&lt;br&gt;
              • Built &lt;span class=&quot;kw&quot;&gt;Quwat-ul-Islam Mosque&lt;/span&gt; using materials from 27 temples&lt;br&gt;
              • Blend of Hindu craftsmanship + Islamic design
            &lt;/td&gt;
            &lt;td&gt;Secured Indo-Gangetic plain; established Delhi as seat of Islamic power&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Iltutmish&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1211–1236&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • &lt;span class=&quot;kw&quot;&gt;Real consolidator&lt;/span&gt; of Sultanate&lt;br&gt;
              • Completed Qutub Minar; expanded Quwat-ul-Islam mosque&lt;br&gt;
              • Introduced &lt;span class=&quot;kw&quot;&gt;Iqta system&lt;/span&gt; &amp; &lt;span class=&quot;kw&quot;&gt;Silver Tanka&lt;/span&gt;
            &lt;/td&gt;
            &lt;td&gt;Kept &lt;span class=&quot;kw&quot;&gt;Mongols (Genghis Khan)&lt;/span&gt; at bay; conquered Bihar &amp; Bengal&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Razia Sultan&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1236–1240&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Challenged traditional &lt;span class=&quot;kw&quot;&gt;gender roles&lt;/span&gt;&lt;br&gt;
              • Appointed Ethiopian slave &lt;span class=&quot;kw&quot;&gt;Yakut&lt;/span&gt; to high post&lt;br&gt;
              • Angered &lt;span class=&quot;kw&quot;&gt;Turkish &quot;Chahalgani&quot; nobles&lt;/span&gt;
            &lt;/td&gt;
            &lt;td&gt;Fought against rebel governor of Sirhind (&lt;span class=&quot;kw&quot;&gt;Altunia&lt;/span&gt;); eventually defeated&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Ghiyasuddin Balban&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1266–1287&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Theory of &lt;span class=&quot;kw&quot;&gt;Divine Kingship (Zil-i-Ilahi)&lt;/span&gt;&lt;br&gt;
              • Persian customs: &lt;span class=&quot;kw&quot;&gt;Sijda&lt;/span&gt; (prostration) &amp; &lt;span class=&quot;kw&quot;&gt;Paibos&lt;/span&gt; (kissing feet)&lt;br&gt;
              • Created &lt;span class=&quot;kw&quot;&gt;Diwan-i-Arz&lt;/span&gt; (Military Dept)
            &lt;/td&gt;
            &lt;td&gt;Suppressed Meos of Mewat; stabilized NW frontier against Mongols&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;🧠 Mamluk Rulers in Order&lt;/div&gt;
      &lt;strong&gt;&quot;Aibak Injured Razia Badly&quot;&lt;/strong&gt; → &lt;span class=&quot;pu&quot;&gt;A&lt;/span&gt;ibak · &lt;span class=&quot;pu&quot;&gt;I&lt;/span&gt;ltutmish · &lt;span class=&quot;pu&quot;&gt;R&lt;/span&gt;azia · &lt;span class=&quot;pu&quot;&gt;B&lt;/span&gt;alban
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- KHALJI --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-khalji&quot;&gt;1290–1320&lt;/span&gt; Khalji Dynasty&lt;/div&gt;
    &lt;div class=&quot;imp-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;✅ Khalji Revolution (1290)&lt;/div&gt;
      Khaljis &lt;span class=&quot;kw&quot;&gt;NOT part of Turkish aristocracy&lt;/span&gt; → broke monopoly of Turkish nobles over Delhi throne. First non-Turkish rulers.
    &lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:10px;&quot;&gt;First major imperialist expansion into &lt;span class=&quot;kw&quot;&gt;South India&lt;/span&gt;. Addition of &lt;span class=&quot;kw&quot;&gt;Alai Darwaza&lt;/span&gt; to Qutub complex.&lt;/p&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;ds-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Facts&lt;/th&gt;&lt;th&gt;Military&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Jalaluddin Khalji&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1290–1296&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;• Founded dynasty at &lt;span class=&quot;kw&quot;&gt;age 70&lt;/span&gt;&lt;br&gt;• Known for mildness&lt;br&gt;• Allowed Mongol converts to settle in &lt;span class=&quot;kw&quot;&gt;&quot;Mughalpura&quot;&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;Nephew Alauddin led secret raid on &lt;span class=&quot;kw&quot;&gt;Devagiri&lt;/span&gt;&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Alauddin Khalji&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1296–1316&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Built &lt;span class=&quot;kw&quot;&gt;Alai Darwaza&lt;/span&gt; &amp; city of &lt;span class=&quot;kw&quot;&gt;Siri&lt;/span&gt;&lt;br&gt;
              • Total &lt;span class=&quot;kw&quot;&gt;Price Control system&lt;/span&gt;&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Land measurement&lt;/span&gt; system
            &lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Siege of Chittor (1303)&lt;/span&gt;; General &lt;span class=&quot;kw&quot;&gt;Malik Kafur&lt;/span&gt; extracted tribute from Hoysalas &amp; Pandyas&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- TUGHLAQ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-tughlaq&quot;&gt;1320–1414&lt;/span&gt; Tughlaq Dynasty&lt;/div&gt;
    &lt;div class=&quot;imp-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;⚡ Tughlaq Rise (1320)&lt;/div&gt;
      After Alauddin&#x27;s incompetent successors → &lt;span class=&quot;kw&quot;&gt;Khusrau Khan&lt;/span&gt; (convert) seized throne as usurper. &lt;span class=&quot;kw&quot;&gt;Ghiyasuddin Tughlaq&lt;/span&gt; (Governor of Dipalpur) marched on Delhi to &quot;save Islam.&quot;
    &lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:10px;&quot;&gt;Massive sloped-wall architecture + administrative experimentation.&lt;/p&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;ds-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Facts&lt;/th&gt;&lt;th&gt;Military&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Ghiyasuddin Tughlaq&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1320–1325&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;• Built fortress city of &lt;span class=&quot;kw&quot;&gt;Tughlaqabad&lt;/span&gt;&lt;br&gt;• Restored irrigation systems&lt;br&gt;• Lightened harsh Khalji land taxes&lt;/td&gt;
            &lt;td&gt;Annexed &lt;span class=&quot;kw&quot;&gt;Warangal&lt;/span&gt;; campaign into Bengal&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Muhammad bin Tughlaq&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1325–1351&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Brilliant polymath who &lt;span class=&quot;rd&quot;&gt;failed in practice&lt;/span&gt;&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Capital Shift to Daulatabad&lt;/span&gt; (failed)&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Token Currency&lt;/span&gt; – Copper coins (failed)&lt;br&gt;
              • Taxation in &lt;span class=&quot;kw&quot;&gt;Doab Region&lt;/span&gt;
            &lt;/td&gt;
            &lt;td&gt;Khurasan &amp; Qarachil Expedition; &lt;span class=&quot;kw&quot;&gt;Vijayanagara &amp; Bahmani kingdoms broke away&lt;/span&gt;&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Firoz Shah Tughlaq&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1351–1388&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Called &lt;span class=&quot;kw&quot;&gt;&quot;Reformer King&quot;&lt;/span&gt;&lt;br&gt;
              • Built 300+ towns; repaired Qutub Minar&lt;br&gt;
              • Established &lt;span class=&quot;kw&quot;&gt;Diwan-i-Khairat&lt;/span&gt; (charity dept)&lt;br&gt;
              • Transported &lt;span class=&quot;kw&quot;&gt;Ashokan Pillars&lt;/span&gt; to Delhi
            &lt;/td&gt;
            &lt;td&gt;Campaigns to Jajnagar (Odisha) &amp; Nagarkot; focused on public works&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💥 Timurid Catastrophe (1398)&lt;/div&gt;
      &lt;span class=&quot;kw&quot;&gt;Timur (Tamerlane)&lt;/span&gt; invaded in &lt;span class=&quot;kw&quot;&gt;1398&lt;/span&gt; → sacked Delhi → left it in ruins&lt;br&gt;
      Appointed &lt;span class=&quot;kw&quot;&gt;Khizr Khan&lt;/span&gt; as deputy → eventually took control → Tughlaq line extinct&lt;br&gt;
      💡 &lt;strong&gt;Year Trick: 1398 – &quot;Three nines minus one = Timur&#x27;s ruin&quot;&lt;/strong&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- SAYYID --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-sayyid&quot;&gt;1414–1451&lt;/span&gt; Sayyid Dynasty&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:8px;&quot;&gt;A period of &lt;span class=&quot;kw&quot;&gt;contraction and vassalage&lt;/span&gt;.&lt;/p&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;ds-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Facts&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Khizr Khan&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1414–1421&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Ruled as Timurid deputy (&lt;span class=&quot;kw&quot;&gt;Rayat-i-Ala&lt;/span&gt;); constant defense against Hindu &amp; Khokhar chiefs&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Alam Shah&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1445–1451&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Last ruler; weak administrator; &lt;span class=&quot;kw&quot;&gt;voluntarily abdicated&lt;/span&gt; &amp; retired to Badaun&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;imp-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;🔄 Lodi Invitation (1451)&lt;/div&gt;
      Relatively &lt;span class=&quot;kw&quot;&gt;bloodless transition&lt;/span&gt;. Alam Shah retired → Afghan noble &lt;span class=&quot;kw&quot;&gt;Bahlul Lodi invited&lt;/span&gt; to take throne. Shift from &lt;span class=&quot;kw&quot;&gt;Turkish/Persian → Afghan rule&lt;/span&gt;.
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- LODI --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-lodi&quot;&gt;1451–1526&lt;/span&gt; Lodi Dynasty – First Afghan Empire&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;ds-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Facts&lt;/th&gt;&lt;th&gt;Military&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Bahlul Lodi&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1451–1489&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;Re-established Afghan prestige; introduced &lt;span class=&quot;kw&quot;&gt;Bahloli Coin&lt;/span&gt; (used until Akbar&#x27;s time)&lt;/td&gt;
            &lt;td&gt;Defeated &lt;span class=&quot;kw&quot;&gt;Sharqi rulers of Jaunpur&lt;/span&gt;; re-annexed it to Sultanate&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Sikandar Lodi&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1489–1517&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;Established &lt;span class=&quot;kw&quot;&gt;Agra as capital&lt;/span&gt;; patron of learning; had Sanskrit medical texts translated into Persian&lt;/td&gt;
            &lt;td&gt;Conquered Bihar; forced Bengali rulers into non-aggression treaty&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Ibrahim Lodi&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1517–1526&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;Final Sultan; insisted on absolute monarchical power → nobles invited foreign intervention&lt;/td&gt;
            &lt;td&gt;Defeated by &lt;span class=&quot;kw&quot;&gt;Babur at First Battle of Panipat (1526)&lt;/span&gt; → ended 320 years of Sultanate&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;⚔️ End of Sultanate – Battle of Panipat (1526)&lt;/div&gt;
      • Ibrahim Lodi&#x27;s own &lt;span class=&quot;kw&quot;&gt;uncle + Governor of Punjab&lt;/span&gt; invited Babur&lt;br&gt;
      • Babur used &lt;span class=&quot;kw&quot;&gt;Artillery &amp; Tulughma tactics&lt;/span&gt; → decimated Lodi army&lt;br&gt;
      • Ended Delhi Sultanate → &lt;span class=&quot;kw&quot;&gt;Mughal Empire began&lt;/span&gt;&lt;br&gt;
      💡 &lt;strong&gt;Year Trick: 1526 – &quot;Five to Twenty-Six: Sultanate&#x27;s fix was Babur&#x27;s mix&quot;&lt;/strong&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;!-- ========== TAB 2: DS ARCHITECTURE ========== --&gt;
&lt;div id=&quot;t2&quot; class=&quot;panel&quot;&gt;
  &lt;span class=&quot;section-label sl-ds&quot;&gt;Delhi Sultanate · Architecture (1206–1526)&lt;/span&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;🏛️ Architecture Evolution Overview&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;
      &lt;li&gt;Evolution from &lt;span class=&quot;kw&quot;&gt;reuse of temple materials&lt;/span&gt; → sophisticated &lt;span class=&quot;kw&quot;&gt;True Arch &amp; True Dome&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Key change: &lt;span class=&quot;kw&quot;&gt;Corbelled arches&lt;/span&gt; (Mamluk) → &lt;span class=&quot;kw&quot;&gt;True Arches/Domes&lt;/span&gt; (Khalji) → &lt;span class=&quot;kw&quot;&gt;Double Domes&lt;/span&gt; (Lodi)&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh ds&quot;&gt;Architectural Evolution Flow&lt;/div&gt;
    &lt;div class=&quot;arch-flow&quot;&gt;

      &lt;span class=&quot;af-arrow&quot;&gt;→&lt;/span&gt;

      &lt;span class=&quot;af-arrow&quot;&gt;→&lt;/span&gt;
      &lt;div class=&quot;af-item&quot;&gt;🏔️ Sloped Walls (Batter)&lt;br&gt;&lt;small&gt;Tughlaq&lt;/small&gt;&lt;/div&gt;
      &lt;span class=&quot;af-arrow&quot;&gt;→&lt;/span&gt;
      &lt;div class=&quot;af-item&quot;&gt;🔵 Double Dome&lt;br&gt;&lt;small&gt;Lodi&lt;/small&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;sh ds&quot;&gt;Material Used&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;ds-h&quot;&gt;&lt;th&gt;Era&lt;/th&gt;&lt;th&gt;Material&lt;/th&gt;&lt;th&gt;Wall Style&lt;/th&gt;&lt;th&gt;Focus&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;Early (Mamluk)&lt;/td&gt;&lt;td&gt;Reused temple stone&lt;/td&gt;&lt;td&gt;Vertical&lt;/td&gt;&lt;td&gt;Mosques &amp; Minars&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;High (Khalji/Tughlaq)&lt;/td&gt;&lt;td&gt;Red Sandstone / Grey Quartzite&lt;/td&gt;&lt;td&gt;Sloping (Batter)&lt;/td&gt;&lt;td&gt;Fortified Cities&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Late (Lodi)&lt;/td&gt;&lt;td&gt;Grey Stone / Marble finishing&lt;/td&gt;&lt;td&gt;Decorative facades&lt;/td&gt;&lt;td&gt;Garden Tombs&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Mamluk Architecture --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-mamluk&quot;&gt;Mamluk&lt;/span&gt; Architecture (1206–1290)&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:8px;&quot;&gt;Characterized by &lt;span class=&quot;kw&quot;&gt;re-utilization&lt;/span&gt; of existing structures. Builders used &lt;span class=&quot;kw&quot;&gt;Corbelled technique&lt;/span&gt; before mastering the arch.&lt;/p&gt;

    &lt;div class=&quot;sh ds&quot;&gt;Qutb-ud-din Aibak&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Quwwat-ul-Islam Mosque (Delhi)&lt;/span&gt; – materials from &lt;span class=&quot;kw&quot;&gt;27 Hindu &amp; Jain temples&lt;/span&gt;; &lt;span class=&quot;gr&quot;&gt;first congregational mosque&lt;/span&gt; in Delhi&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Qutb Minar&lt;/span&gt; – initiated as victory tower; Aibak completed only &lt;span class=&quot;kw&quot;&gt;first story&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Adhai Din Ka Jhonpra (Ajmer)&lt;/span&gt; – mosque built over former Sanskrit college; built traditionally in &lt;span class=&quot;kw&quot;&gt;2.5 days&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh ds&quot;&gt;Iltutmish&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Qutb Minar Extension&lt;/span&gt; – added &lt;span class=&quot;kw&quot;&gt;three more stories&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Sultan Ghari&lt;/span&gt; – &lt;span class=&quot;gr&quot;&gt;first Islamic mausoleum (tomb)&lt;/span&gt; built in India; for son Nasiruddin Mahmud&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Gandhak ki Baoli&lt;/span&gt; – stepwell for Sufi saint &lt;span class=&quot;kw&quot;&gt;Bakhtiyar Kaki&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh ds&quot;&gt;Ghiyas ud-din Balban&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Tomb of Balban (Mehrauli)&lt;/span&gt; – features the &lt;span class=&quot;gr&quot;&gt;FIRST &quot;True Arch&quot;&lt;/span&gt; in India; moved away from corbelled style&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💡 Remember&lt;/div&gt;
      &lt;span class=&quot;kw&quot;&gt;Balban&#x27;s Tomb&lt;/span&gt; = First True Arch in India. &quot;Balban broke the Corbel barrier!&quot;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Khalji Architecture --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-khalji&quot;&gt;Khalji&lt;/span&gt; Architecture (1290–1320)&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:8px;&quot;&gt;Introduced &lt;span class=&quot;kw&quot;&gt;Red Sandstone&lt;/span&gt;. Refined &lt;span class=&quot;kw&quot;&gt;True Dome&lt;/span&gt; &amp; &lt;span class=&quot;kw&quot;&gt;Horse-shoe arches&lt;/span&gt;.&lt;/p&gt;

    &lt;div class=&quot;sh ds&quot;&gt;Alauddin Khalji&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Alai Darwaza&lt;/span&gt; – magnificent southern gateway to Quwwat-ul-Islam mosque; celebrated for symmetry &amp; &lt;span class=&quot;gr&quot;&gt;first use of the true dome&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Siri Fort&lt;/span&gt; – second city of Delhi; built to protect from &lt;span class=&quot;kw&quot;&gt;Mongol invasions&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Hauz Khas&lt;/span&gt; – large water reservoir (tank) to supply &lt;span class=&quot;kw&quot;&gt;city of Siri&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Jama&#x27;at Khana Masjid&lt;/span&gt; – built near dargah of &lt;span class=&quot;kw&quot;&gt;Nizamuddin Auliya&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💡 Key Firsts&lt;/div&gt;
      &lt;span class=&quot;kw&quot;&gt;Alai Darwaza&lt;/span&gt; = First True Dome in India. &quot;Alauddin&#x27;s Arch was Awesome (first dome)!&quot;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Tughlaq Architecture --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title ds&quot;&gt;&lt;span class=&quot;dyn-badge db-tughlaq&quot;&gt;Tughlaq&lt;/span&gt; Architecture (1320–1414)&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem; color:var(--muted); margin-bottom:8px;&quot;&gt;Austere &amp; functional; grey quartzite stone; hallmark = &lt;span class=&quot;kw&quot;&gt;&quot;Batter&quot; (sloping walls)&lt;/span&gt; for strength.&lt;/p&gt;

    &lt;div class=&quot;sh ds&quot;&gt;Ghiyasuddin Tughlaq&lt;/div&gt;
    &lt;ul class=&quot;notes ds&quot;&gt;

  &lt;!-- SANGAMA --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title vj&quot;&gt;&lt;span class=&quot;dyn-badge db-sangama&quot;&gt;1336–1485&lt;/span&gt; Sangama Dynasty&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr class=&quot;vj-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Contributions&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Harihara I&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr yr-vj&quot;&gt;1336–1356&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • &lt;span class=&quot;kw&quot;&gt;&quot;Founder of Karnataka Kingdom&quot;&lt;/span&gt;&lt;br&gt;
              • Established first administrative setup&lt;br&gt;
              • Controlled region south of &lt;span class=&quot;kw&quot;&gt;Tungabhadra River&lt;/span&gt;&lt;br&gt;
              • Divided empire into &lt;span class=&quot;kw&quot;&gt;&#x27;Stalhas&#x27; (provinces)&lt;/span&gt; for tax collection&lt;br&gt;
              • Title: &lt;span class=&quot;kw&quot;&gt;&#x27;Purvapaschima Samudradhishvara&#x27;&lt;/span&gt; (Master of Eastern &amp; Western Seas)
            &lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Bukka Raya I&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr yr-vj&quot;&gt;1356–1377&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Southern expansion; control over &lt;span class=&quot;kw&quot;&gt;Goa &amp; Krishna-Tungabhadra Doab&lt;/span&gt;&lt;br&gt;
              • Defeated &lt;span class=&quot;kw&quot;&gt;Sultanate of Madurai (1370)&lt;/span&gt;&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Diplomatic embassy to Ming Dynasty (China) in 1374&lt;/span&gt;&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Sayanacharya&lt;/span&gt; wrote commentaries on the Vedas&lt;br&gt;
              • Title: &lt;span class=&quot;kw&quot;&gt;&#x27;Vedamarga Sthapanacharya&#x27;&lt;/span&gt; (Establisher of the path of Vedas)
            &lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Harihara II&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr yr-vj&quot;&gt;1377–1404&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • First to take title of &lt;span class=&quot;kw&quot;&gt;Maharajadhiraja&lt;/span&gt;&lt;br&gt;
              • Extended empire beyond Krishna River → almost entire South India&lt;br&gt;
              • Captured &lt;span class=&quot;kw&quot;&gt;Goa, Chaul &amp; Dabhol&lt;/span&gt; from Bahmani Sultanate (secured horse trade)
            &lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Deva Raya I&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr yr-vj&quot;&gt;1406–1422&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Visionary ruler; infrastructure &amp; military modernization&lt;br&gt;
              • Built &lt;span class=&quot;kw&quot;&gt;Dam across Tungabhadra River&lt;/span&gt;&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Military Reform:&lt;/span&gt; began recruiting Turkish/Muslim archers&lt;br&gt;
              • Foreign Visit: Italian traveler &lt;span class=&quot;kw&quot;&gt;Nicolo Conti&lt;/span&gt; visited Hampi&lt;br&gt;
              • &lt;span class=&quot;kw&quot;&gt;Treaty of 1407&lt;/span&gt; with Firuz Shah Bahmani; paid annual tribute; gave daughter in marriage
            &lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Deva Raya II&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr yr-vj&quot;&gt;1422–1446&lt;/span&gt;&lt;/td&gt;
            &lt;td&gt;
              • Also known as &lt;span class=&quot;kw&quot;&gt;Praudha Devaraya / Imadi Devaraya&lt;/span&gt;&lt;br&gt;
              • Empire reached &lt;span class=&quot;gr&quot;&gt;cultural &amp; territorial zenith&lt;/span&gt;&lt;br&gt;
              • Defeated Zamorin of Calicut &amp; ruler of Quilon&lt;br&gt;
              • Launched &lt;span class=&quot;kw&quot;&gt;naval expedition to Sri Lanka&lt;/span&gt;&lt;br&gt;
              • Literature: Authored &lt;span class=&quot;kw&quot;&gt;&#x27;Mahanataka Sudhanidhi&#x27;&lt;/span&gt; (Sanskrit) + commentary on Brahma Sutras&lt;br&gt;
              • Architecture: Built &lt;span class=&quot;kw&quot;&gt;Virupaksha Temple at Hampi&lt;/span&gt;&lt;br&gt;
              • Title: &lt;span class=&quot;kw&quot;&gt;&#x27;Gajabetekara&#x27;&lt;/span&gt; (The Elephant Hunter)&lt;br&gt;
              • Foreign Visit: Persian ambassador &lt;span class=&quot;kw&quot;&gt;Abdur Razzaq&lt;/span&gt;
            &lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;⚠️ Sangama Decline&lt;/div&gt;
      Post Deva Raya II → Sangama Dynasty weakened due to &lt;span class=&quot;kw&quot;&gt;internal dissent &amp; external pressures&lt;/span&gt;
    &lt;/div&gt;
  &lt;/div&gt;

            &lt;td&gt;

        &lt;thead&gt;&lt;tr class=&quot;vj-h&quot;&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Reign&lt;/th&gt;&lt;th&gt;Key Facts&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;

            &lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;strong&gt;Venkata II&lt;/strong&gt;&lt;/td&gt;
            &lt;td&gt;&lt;span class=&quot;yr yr-vj&quot;&gt;1585–1614&lt;/span&gt;&lt;/td&gt;

    &lt;div class=&quot;card-title&quot;&gt;📌 Mughal Empire – Overview&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;300-year spectacle&lt;/span&gt; of wealth, warfare &amp; breathtaking art&lt;/li&gt;
      &lt;li&gt;Founded by a &lt;span class=&quot;kw&quot;&gt;fugitive prince from Central Asia&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Blended &lt;span class=&quot;kw&quot;&gt;Persian, Islamic &amp; Indian traditions&lt;/span&gt; → unique &lt;span class=&quot;kw&quot;&gt;&quot;Indo-Islamic&quot; civilization&lt;/span&gt;&lt;/li&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏹 BABUR &lt;span class=&quot;yr&quot;&gt;1526–1530&lt;/span&gt;&lt;/div&gt;
    &lt;span class=&quot;emp-badge&quot;&gt;1st Mughal Emperor&lt;/span&gt;
    &lt;div class=&quot;sh&quot;&gt;Early Struggles (1494–1504)&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;At age &lt;span class=&quot;kw&quot;&gt;12&lt;/span&gt;, inherited principality of &lt;span class=&quot;kw&quot;&gt;Farghana&lt;/span&gt; (modern-day Uzbekistan) after father Umar Sheikh Mirza died&lt;/li&gt;
      &lt;li&gt;Descendant of &lt;span class=&quot;kw&quot;&gt;Timur (father&#x27;s side)&lt;/span&gt; &amp; &lt;span class=&quot;kw&quot;&gt;Genghis Khan (mother&#x27;s side)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Obsessed with capturing &lt;span class=&quot;kw&quot;&gt;Samarkand&lt;/span&gt; – ancestral seat of Timur&lt;/li&gt;
      &lt;li&gt;Captured Samarkand &lt;span class=&quot;kw&quot;&gt;3 times&lt;/span&gt; but could never hold it → lost both Samarkand &amp; Farghana → became a &quot;homeless prince&quot;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Kabul (1504):&lt;/span&gt; Moved south, captured Kabul → became base for India&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Entry into India – Invited By&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;1. &lt;span class=&quot;kw&quot;&gt;Daulat Khan Lodi&lt;/span&gt; – Governor of Punjab&lt;/li&gt;
      &lt;li&gt;2. &lt;span class=&quot;kw&quot;&gt;Alam Khan&lt;/span&gt; – Uncle of Ibrahim Lodi&lt;/li&gt;
      &lt;li&gt;3. &lt;span class=&quot;kw&quot;&gt;Rana Sanga&lt;/span&gt; – King of Mewar (per Babur&#x27;s memoirs)&lt;/li&gt;
      &lt;li&gt;⚠️ They believed Babur would raid &amp; leave like Timur — underestimated his intention to &lt;span class=&quot;kw&quot;&gt;stay&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;4 Key Battles of Babur&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Year&lt;/th&gt;&lt;th&gt;Battle&lt;/th&gt;&lt;th&gt;Opponent&lt;/th&gt;&lt;th&gt;Significance&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;1526&lt;/span&gt;&lt;/td&gt;&lt;td&gt;1st Battle of Panipat&lt;/td&gt;&lt;td&gt;Ibrahim Lodi&lt;/td&gt;&lt;td&gt;Used &lt;span class=&quot;kw&quot;&gt;Tulughma&lt;/span&gt; (flanking) &amp; &lt;span class=&quot;kw&quot;&gt;Araba&lt;/span&gt; (artillery). Ended Delhi Sultanate.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;1527&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Battle of Khanwa&lt;/td&gt;&lt;td&gt;Rana Sanga&lt;/td&gt;&lt;td&gt;Proclaimed &lt;span class=&quot;kw&quot;&gt;Jihad&lt;/span&gt;; took title &lt;span class=&quot;kw&quot;&gt;Ghazi&lt;/span&gt;. Defeated Rajput confederacy.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;1528&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Battle of Chanderi&lt;/td&gt;&lt;td&gt;Medini Rai&lt;/td&gt;&lt;td&gt;Secured Mughal control over &lt;span class=&quot;kw&quot;&gt;Malwa &amp; Central India&lt;/span&gt;.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;1529&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Battle of Ghagra&lt;/td&gt;&lt;td&gt;Afghan Chiefs&lt;/td&gt;&lt;td&gt;Defeated joint Afghan forces from &lt;span class=&quot;kw&quot;&gt;Bihar &amp; Bengal&lt;/span&gt;.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Military Techniques of Babur&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Tulughma System&lt;/span&gt; – encirclement/flanking tactic&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Araba (Wagon-Fort) Method&lt;/span&gt; – cannons hidden behind wagons; Ottoman influence&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Mobility &amp; Horse Archers&lt;/span&gt; – Parthian shot, kiting, rapid attack (Turco-Mongol style)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Gunpowder &amp; Field Artillery&lt;/span&gt; – light &amp; movable; matchlockmen; cannon fire-inducing sounds&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Discipline &amp; Terrain Use&lt;/span&gt; – disciplined formations vs terrain anchorage, fortified ditches&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Literature&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Tuzuk-i-Baburi (Baburnama)&lt;/span&gt; – written in &lt;span class=&quot;kw&quot;&gt;Chagatai Turkic&lt;/span&gt;; candid autobiography&lt;/li&gt;
      &lt;li&gt;Translated into Persian by &lt;span class=&quot;kw&quot;&gt;Abdur Rahim Khan-i-Khana&lt;/span&gt; in &lt;span class=&quot;kw&quot;&gt;1589&lt;/span&gt; during Akbar&#x27;s reign&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;🧠 Babur&#x27;s 4 Battles in Order&lt;/div&gt;
      &lt;strong&gt;&quot;Panipat&#x27;s Khan Charged Gallantly&quot;&lt;/strong&gt; → &lt;span class=&quot;pu&quot;&gt;P&lt;/span&gt;anipat · &lt;span class=&quot;pu&quot;&gt;Kh&lt;/span&gt;anwa · &lt;span class=&quot;pu&quot;&gt;Ch&lt;/span&gt;anderi · &lt;span class=&quot;pu&quot;&gt;G&lt;/span&gt;hagra
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;😔 HUMAYUN &lt;span class=&quot;yr&quot;&gt;1530–1540&lt;/span&gt; &amp; &lt;span class=&quot;yr&quot;&gt;1555–1556&lt;/span&gt;&lt;/div&gt;
    &lt;span class=&quot;emp-badge&quot;&gt;2nd Mughal Emperor&lt;/span&gt;
    &lt;div class=&quot;imp-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;📜 Famous Quote&lt;/div&gt;
      &quot;Humayun tumbled through life, and he tumbled out of it.&quot; – Historian Stanley Lane-Poole
    &lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Early Challenges – 3 Main Enemies&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;1. &lt;span class=&quot;kw&quot;&gt;Afghans&lt;/span&gt; – led by brilliant &lt;span class=&quot;kw&quot;&gt;Sher Shah Suri&lt;/span&gt; in East (Bihar/Bengal)&lt;/li&gt;
      &lt;li&gt;2. &lt;span class=&quot;kw&quot;&gt;Bahadur Shah of Gujarat&lt;/span&gt; – powerful regional ruler from West&lt;/li&gt;
      &lt;li&gt;3. &lt;span class=&quot;kw&quot;&gt;His Own Brothers&lt;/span&gt; – Kamran, Hindal &amp; Askari frequently revolted&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Siege of Chunar (1532):&lt;/span&gt; First encounter with Sher Shah; Humayun accepted tactical submission → gave Sher Shah time to consolidate&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Conflict with Sher Shah Suri&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Battle of Chausa (1539):&lt;/span&gt; Sher Shah surprise attack; Humayun escaped by jumping into Ganges, saved by water-carrier &lt;span class=&quot;kw&quot;&gt;Nizam&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Battle of Kannauj/Bilgram (1540):&lt;/span&gt; Decisive defeat; Humayun lost throne &amp; fled&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Period of Exile (1540–1555) – 15 Years&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Wandered through Rajasthan, Sindh, eventually Persia&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Birth of Akbar (1542)&lt;/span&gt; – born in exile at &lt;span class=&quot;kw&quot;&gt;Amarkot (Umarkot)&lt;/span&gt; in palace of Rana Prasad&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Safavid Help:&lt;/span&gt; Took refuge with &lt;span class=&quot;kw&quot;&gt;Shah Tahmasp&lt;/span&gt; of Persia; agreed to convert to Shia Islam (nominally) &amp; cede &lt;span class=&quot;kw&quot;&gt;Kandahar&lt;/span&gt; to Persians in exchange for military aid&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Restoration &amp; Death (1555–1556)&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;After Sher Shah&#x27;s death &amp; decline of Sur Dynasty → opportunity arose&lt;/li&gt;
      &lt;li&gt;With loyal general &lt;span class=&quot;kw&quot;&gt;Bairam Khan&lt;/span&gt; → defeated Afghans at &lt;span class=&quot;kw&quot;&gt;Battle of Machhiwara &amp; Sirhind (1555)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Re-occupied Delhi in &lt;span class=&quot;kw&quot;&gt;July 1555&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Tragic End (1556):&lt;/span&gt; Died falling from stairs of his library, &lt;span class=&quot;kw&quot;&gt;Sher Mandal&lt;/span&gt;, at Purana Qila&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Art &amp; Literature&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;During exile recruited Persian painters &lt;span class=&quot;kw&quot;&gt;Mir Sayyid Ali &amp; Abdus Samad&lt;/span&gt; → laid foundation for &lt;span class=&quot;kw&quot;&gt;Mughal School of Painting&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Sister &lt;span class=&quot;kw&quot;&gt;Gulbadan Begum&lt;/span&gt; wrote &lt;span class=&quot;kw&quot;&gt;Humayun-Nama&lt;/span&gt; – rare intimate look into Mughal royal household&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🔶 Sher Shah Suri (1486–1545) – The Interregnum&lt;/div&gt;
    &lt;span class=&quot;badge b-red&quot;&gt;Not a Mughal – Sur Empire&lt;/span&gt;
    &lt;div class=&quot;sh&quot;&gt;Rise to Power&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Born as &lt;span class=&quot;kw&quot;&gt;Farid Khan&lt;/span&gt; in Sasaram, Bihar; served in Bihar Sultan&#x27;s army&lt;/li&gt;
      &lt;li&gt;Captured Sasaram; established &lt;span class=&quot;kw&quot;&gt;Sur Empire&lt;/span&gt; as ruler of North India&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Key Achievements&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Introduced &lt;span class=&quot;kw&quot;&gt;uniform land revenue measurement&lt;/span&gt;; land measured in &lt;span class=&quot;kw&quot;&gt;Bigha&lt;/span&gt; &amp; classified on soil basis&lt;/li&gt;
      &lt;li&gt;Average produce calculated; &lt;span class=&quot;kw&quot;&gt;1/3rd&lt;/span&gt; was state&#x27;s share&lt;/li&gt;
      &lt;li&gt;Revenue collected in &lt;span class=&quot;kw&quot;&gt;cash, not in kind&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Peasants given receipts (&lt;span class=&quot;kw&quot;&gt;Patta&lt;/span&gt;); state had records (&lt;span class=&quot;kw&quot;&gt;Qabuliyat&lt;/span&gt;)&lt;/li&gt;
      &lt;li&gt;Reduced role of middlemen; fair treatment of peasants&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Administrative Reforms&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Centralized administration with well-organized bureaucracy&lt;/li&gt;
      &lt;li&gt;Divided empire into Provinces (&lt;span class=&quot;kw&quot;&gt;Sarkar&lt;/span&gt;), Districts (&lt;span class=&quot;kw&quot;&gt;Pargana&lt;/span&gt;) &amp; Villages&lt;/li&gt;
      &lt;li&gt;Officials appointed on &lt;span class=&quot;kw&quot;&gt;merit basis&lt;/span&gt;; efficient espionage system; comprehensive revenue system&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Economic Reforms&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Uniform system of &lt;span class=&quot;kw&quot;&gt;weights &amp; measures&lt;/span&gt;; encouraged trade &amp; commerce&lt;/li&gt;
      &lt;li&gt;Issued &lt;span class=&quot;kw&quot;&gt;silver coins (Rupee)&lt;/span&gt; of high purity → became the standard&lt;/li&gt;
      &lt;li&gt;Promoted agriculture &amp; irrigation&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Public Welfare&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Built &lt;span class=&quot;kw&quot;&gt;Grand Trunk Road&lt;/span&gt; (Bengal to Punjab) – most famous road&lt;/li&gt;
      &lt;li&gt;Planted trees on both sides; built rest houses (&lt;span class=&quot;kw&quot;&gt;Sarai&lt;/span&gt;) for travelers&lt;/li&gt;
      &lt;li&gt;Constructed wells, bridges; ensured facilities for people&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Military &amp; Other&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Strong disciplined army; used artillery effectively&lt;/li&gt;
      &lt;li&gt;Built many forts, mosques &amp; Sarai&lt;/li&gt;
      &lt;li&gt;His &lt;span class=&quot;kw&quot;&gt;tomb in Sasaram&lt;/span&gt; – fine example of &lt;span class=&quot;kw&quot;&gt;Indo-Islamic architecture&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Known for justice, discipline &amp; concern for subjects&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💡 Key Line&lt;/div&gt;
      &quot;Sher Shah Suri&#x27;s reforms laid a strong foundation for good governance, which was later followed by the Mughals.&quot;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ===== TAB 2: AKBAR ===== --&gt;
&lt;div id=&quot;t2&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;⚔️ AKBAR &lt;span class=&quot;yr&quot;&gt;1556–1605&lt;/span&gt;&lt;/div&gt;
    &lt;span class=&quot;emp-badge&quot;&gt;3rd Mughal Emperor – &quot;Empire Builder&quot;&lt;/span&gt;
    &lt;div class=&quot;sh&quot;&gt;Early Phase: Regency &amp; Consolidation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Accession (1556):&lt;/span&gt; Crowned at age &lt;span class=&quot;kw&quot;&gt;13&lt;/span&gt; at &lt;span class=&quot;kw&quot;&gt;Kalanaur (Punjab)&lt;/span&gt;; tutor &lt;span class=&quot;kw&quot;&gt;Bairam Khan&lt;/span&gt; appointed Regent (&lt;span class=&quot;kw&quot;&gt;Wakil&lt;/span&gt;)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Second Battle of Panipat (1556):&lt;/span&gt; Bairam Khan defeated &lt;span class=&quot;kw&quot;&gt;Hemu&lt;/span&gt; (general of Sur dynasty) → &quot;real&quot; start of Mughal Empire&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;End of Regency (1560–62):&lt;/span&gt; Dismissed Bairam Khan; survived &lt;span class=&quot;kw&quot;&gt;&quot;Petticoat Government&quot;&lt;/span&gt; (1560–62) where foster mother &lt;span class=&quot;kw&quot;&gt;Maham Anga&lt;/span&gt; held significant influence&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Rajput Policy – A Masterstroke&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Realized to rule India → needed support of &lt;span class=&quot;kw&quot;&gt;Rajputs&lt;/span&gt;, most powerful local warriors&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Matrimonial Alliances (1562):&lt;/span&gt; Married daughter of &lt;span class=&quot;kw&quot;&gt;Raja Bharmal of Amber&lt;/span&gt; (Harka Bai / Jodha Bai) → Amber house became most loyal allies&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Watan Jagir:&lt;/span&gt; Allowed Rajput kings to keep ancestral lands (Watan) as long as they accepted &lt;span class=&quot;kw&quot;&gt;Mughal suzerainty&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Battle of Haldighati (1576):&lt;/span&gt; Maharana Pratap of Mewar resisted; Akbar&#x27;s army led by &lt;span class=&quot;kw&quot;&gt;Raja Man Singh&lt;/span&gt; (a Rajput!) defeated him; Mewar never fully absorbed&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Military Campaigns of Akbar&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Year&lt;/th&gt;&lt;th&gt;Campaign&lt;/th&gt;&lt;th&gt;Opponent&lt;/th&gt;&lt;th&gt;Significance&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;1556&lt;/td&gt;&lt;td&gt;2nd Battle of Panipat&lt;/td&gt;&lt;td&gt;Hemu&lt;/td&gt;&lt;td&gt;Re-established Mughal rule; ended Afghan challenge&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1561&lt;/td&gt;&lt;td&gt;Conquest of Malwa&lt;/td&gt;&lt;td&gt;Baz Bahadur&lt;/td&gt;&lt;td&gt;First independent conquest; expanded to Central India&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1568&lt;/td&gt;&lt;td&gt;Siege of Chittor&lt;/td&gt;&lt;td&gt;Udai Singh II (Mewar)&lt;/td&gt;&lt;td&gt;Major psychological victory vs Rajputs&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1572–73&lt;/td&gt;&lt;td&gt;Gujarat Campaign&lt;/td&gt;&lt;td&gt;Muzaffar Shah III&lt;/td&gt;&lt;td&gt;Access to sea trade; Buland Darwaza built&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1576&lt;/td&gt;&lt;td&gt;Battle of Haldighati&lt;/td&gt;&lt;td&gt;Maharana Pratap&lt;/td&gt;&lt;td&gt;Pratap continued guerrilla warfare; Man Singh led Mughals&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1576&lt;/td&gt;&lt;td&gt;Conquest of Bengal&lt;/td&gt;&lt;td&gt;Dawood Khan Karrani&lt;/td&gt;&lt;td&gt;Ended last Afghan kingdom; integrated Bengal&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1581&lt;/td&gt;&lt;td&gt;Kabul Campaign&lt;/td&gt;&lt;td&gt;Mirza Hakim (half-brother)&lt;/td&gt;&lt;td&gt;Secured NW frontier; first Mughal to cross Indus since Humayun&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1586&lt;/td&gt;&lt;td&gt;Conquest of Kashmir&lt;/td&gt;&lt;td&gt;Yusuf Shah Chak&lt;/td&gt;&lt;td&gt;Strategically important for northern security&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;1601&lt;/td&gt;&lt;td&gt;Siege of Asirgarh&lt;/td&gt;&lt;td&gt;Mir Bahadur (Khandesh)&lt;/td&gt;&lt;td&gt;Akbar&#x27;s last major conquest; &quot;Gateway to Deccan&quot;&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;⚙️ Akbar&#x27;s Administrative Reforms&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;A. Mansabdari System&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Unique &lt;span class=&quot;kw&quot;&gt;grading system&lt;/span&gt; for all civil &amp; military officers&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Zat:&lt;/span&gt; Personal rank &amp; salary&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Sawar:&lt;/span&gt; Number of cavalrymen the officer had to maintain&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Dagh:&lt;/span&gt; Branding of horses (to prevent fraud)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Chehra:&lt;/span&gt; Descriptive rolls of soldiers&lt;/li&gt;
      &lt;li&gt;Ranks ranged from &lt;span class=&quot;kw&quot;&gt;10 to 10,000&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;B. Land Revenue – Zabt / Dahshala System&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Created by &lt;span class=&quot;kw&quot;&gt;Raja Todar Mal&lt;/span&gt; (Navaratna)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Dahshala:&lt;/span&gt; Average produce &amp; prices of last &lt;span class=&quot;kw&quot;&gt;10 years&lt;/span&gt;; state&#x27;s share = &lt;span class=&quot;kw&quot;&gt;1/3rd&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Land Classification: &lt;span class=&quot;kw&quot;&gt;Polaj&lt;/span&gt; (best, always cultivated) → &lt;span class=&quot;kw&quot;&gt;Parauti&lt;/span&gt; → &lt;span class=&quot;kw&quot;&gt;Chachar&lt;/span&gt; → &lt;span class=&quot;kw&quot;&gt;Banjar&lt;/span&gt; (worst)&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;🧠 Land Classification (Best → Worst)&lt;/div&gt;
      &lt;strong&gt;&quot;Poor Peasants Can&#x27;t Bear&quot;&lt;/strong&gt; → &lt;span class=&quot;pu&quot;&gt;Po&lt;/span&gt;laj · &lt;span class=&quot;pu&quot;&gt;Pa&lt;/span&gt;rauti · &lt;span class=&quot;pu&quot;&gt;C&lt;/span&gt;hachar · &lt;span class=&quot;pu&quot;&gt;B&lt;/span&gt;anjar
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🕌 Akbar&#x27;s Religious Policy – Sulh-i-Kul&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem;color:var(--muted);margin-bottom:8px;&quot;&gt;Shifted from orthodox Islam to &lt;span class=&quot;kw&quot;&gt;&quot;Universal Peace&quot;&lt;/span&gt;&lt;/p&gt;
    &lt;div class=&quot;sh&quot;&gt;Timeline of Religious Reforms&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;1563:&lt;/span&gt; Abolished &lt;span class=&quot;kw&quot;&gt;Pilgrim Tax&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;1564:&lt;/span&gt; Abolished &lt;span class=&quot;kw&quot;&gt;Jizya&lt;/span&gt; (poll tax on non-Muslims)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;1575:&lt;/span&gt; Built &lt;span class=&quot;kw&quot;&gt;Ibadat Khana&lt;/span&gt; (House of Worship) at Fatehpur Sikri&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;1579:&lt;/span&gt; Issued &lt;span class=&quot;kw&quot;&gt;Mazhar-i-Nama&lt;/span&gt; (Infallibility Decree) – made him supreme judge in religious matters&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;1582:&lt;/span&gt; Introduced &lt;span class=&quot;kw&quot;&gt;Din-i-Ilahi&lt;/span&gt; (Tawhid-i-Ilahi) – NOT a religion; a code of conduct; &lt;span class=&quot;kw&quot;&gt;Birbal&lt;/span&gt; was the only prominent noble to accept it&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💡 Year Trick for Akbar&#x27;s Reforms&lt;/div&gt;
      63-64-75-79-82: &quot;63 is pilgrim year, 64 Jizya&#x27;s fear, 75 built worship&#x27;s peer, 79 Mazhar&#x27;s decree was clear, 82 Din-i-Ilahi appeared&quot;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;✨ Akbar&#x27;s Navaratnas (Nine Gems)&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;#&lt;/th&gt;&lt;th&gt;Name&lt;/th&gt;&lt;th&gt;Field&lt;/th&gt;&lt;th&gt;Key Fact&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Abul Fazl&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Historian&lt;/td&gt;&lt;td&gt;Author of Akbarnama; also wrote Ain-i-Akbari&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Faizi&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Poet&lt;/td&gt;&lt;td&gt;Great Persian poet &amp; scholar; brother of Abul Fazl&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Tansen&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Musician&lt;/td&gt;&lt;td&gt;Legendary musician &amp; vocalist; melodies celebrated in Indian classical music&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Todar Mal&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Finance Minister&lt;/td&gt;&lt;td&gt;Reformer of revenue system; introduced Zabt/Dahshala system&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;5&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Man Singh&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Rajput Commander&lt;/td&gt;&lt;td&gt;Trusted general; led Mughal forces at Haldighati&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;6&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Birbal&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Courtier&lt;/td&gt;&lt;td&gt;Known for wit &amp; wisdom; only noble to accept Din-i-Ilahi&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Abdul Rahim Khan-i-Khana&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Scholar &amp; Poet&lt;/td&gt;&lt;td&gt;Wrote couplets (dohas) in Hindi &amp; Persian&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;8&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Hamim Human&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Courtier &amp; Translator&lt;/td&gt;&lt;td&gt;Well-versed in Sanskrit &amp; Persian; translated many works&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;9&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Mulla Do-Piyaza&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Jester &amp; Wit&lt;/td&gt;&lt;td&gt;Famous for clever jokes and humorous stories&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;🧠 Remember 9 Navaratnas&lt;/div&gt;

      &lt;span class=&quot;pu&quot;&gt;A&lt;/span&gt;bul Fazl · &lt;span class=&quot;pu&quot;&gt;F&lt;/span&gt;aizi · &lt;span class=&quot;pu&quot;&gt;T&lt;/span&gt;ansen · &lt;span class=&quot;pu&quot;&gt;T&lt;/span&gt;odar Mal · &lt;span class=&quot;pu&quot;&gt;M&lt;/span&gt;an Singh · &lt;span class=&quot;pu&quot;&gt;B&lt;/span&gt;irbal · &lt;span class=&quot;pu&quot;&gt;A&lt;/span&gt;bdul Rahim · &lt;span class=&quot;pu&quot;&gt;H&lt;/span&gt;amim Human · &lt;span class=&quot;pu&quot;&gt;M&lt;/span&gt;ulla Do-Piyaza
    &lt;/div&gt;
  &lt;/div&gt;

&lt;!-- ===== TAB 3: JAHANGIR &amp; SHAH JAHAN ===== --&gt;
&lt;div id=&quot;t3&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🎨 JAHANGIR &lt;span class=&quot;yr&quot;&gt;1605–1627&lt;/span&gt;&lt;/div&gt;
    &lt;span class=&quot;emp-badge&quot;&gt;4th Mughal Emperor – &quot;Empire Preserver&quot;&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Born as &lt;span class=&quot;kw&quot;&gt;Prince Salim&lt;/span&gt;; remembered as &quot;Empire Preserver&quot; &amp; great patron of arts&lt;/li&gt;
      &lt;li&gt;Title: &lt;span class=&quot;kw&quot;&gt;Nur-ud-din Muhammad Jahangir&lt;/span&gt; (Conqueror of the World) – taken 1605&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Early Challenges&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Rebellion of Prince Khusrau:&lt;/span&gt; Immediately after accession; his eldest son Khusrau rebelled with help of &lt;span class=&quot;kw&quot;&gt;5th Sikh Guru, Guru Arjan Dev&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Consequence: &lt;span class=&quot;kw&quot;&gt;Jahangir executed Guru Arjan Dev&lt;/span&gt; → beginning of long-standing conflict between &lt;span class=&quot;kw&quot;&gt;Mughals &amp; Sikhs&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Military Conquests&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Mewar (1615):&lt;/span&gt; Settlement with &lt;span class=&quot;kw&quot;&gt;Amar Singh&lt;/span&gt; (son of Maharana Pratap); Ranas accepted Mughal suzerainty but exempted from attending court personally&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Deccan (Ahmednagar):&lt;/span&gt; Sent &lt;span class=&quot;kw&quot;&gt;Prince Khurram&lt;/span&gt; (later Shah Jahan); success earned Khurram title &quot;Shah Jahan&quot;; but &lt;span class=&quot;kw&quot;&gt;Malik Ambar&lt;/span&gt; (PM of Ahmednagar) prevented total takeover using &lt;span class=&quot;kw&quot;&gt;guerrilla warfare&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Kangra (1620):&lt;/span&gt; Successfully captured strategic Kangra Fort in Himalayan foothills&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;The Era of Nur Jahan&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;1611: Married &lt;span class=&quot;kw&quot;&gt;Mehr-un-Nissa&lt;/span&gt;, titled &lt;span class=&quot;kw&quot;&gt;Nur Jahan&lt;/span&gt; (Light of the World)&lt;/li&gt;
      &lt;li&gt;Only Mughal Empress to have &lt;span class=&quot;kw&quot;&gt;coins minted in her name&lt;/span&gt; &amp; issue royal &lt;span class=&quot;kw&quot;&gt;farmans (decrees)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Nur Jahan Junta:&lt;/span&gt; Formed powerful group with her father (&lt;span class=&quot;kw&quot;&gt;Itimad-ud-Daula&lt;/span&gt;), brother (&lt;span class=&quot;kw&quot;&gt;Asaf Khan&lt;/span&gt;) &amp; Prince Khurram → dominated court for nearly a decade&lt;/li&gt;
      &lt;li&gt;Later rift between Nur Jahan &amp; Shah Jahan → Shah Jahan&#x27;s rebellion → weakened empire in final years&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Administration &amp; Justice&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Zanjir-i-Adal (Chain of Justice):&lt;/span&gt; Golden chain with &lt;span class=&quot;kw&quot;&gt;60 bells&lt;/span&gt; at Agra Fort; any subject could pull for direct audience with Emperor&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;12 Edicts (Dastur-ul-Amal):&lt;/span&gt; Upon accession; banned cutting noses/ears as punishment; prohibited forced sale of land&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Europeans in Jahangir&#x27;s Court&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Visitor&lt;/th&gt;&lt;th&gt;Year&lt;/th&gt;&lt;th&gt;Key Fact&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;William Hawkins&lt;/span&gt;&lt;/td&gt;&lt;td&gt;1608&lt;/td&gt;&lt;td&gt;Arrived with letter from King James I; given title &lt;span class=&quot;kw&quot;&gt;&quot;English Khan&quot;&lt;/span&gt;; no trade concessions due to Portuguese pressure&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Sir Thomas Roe&lt;/span&gt;&lt;/td&gt;&lt;td&gt;1615&lt;/td&gt;&lt;td&gt;Official ambassador of British East India Company; successfully secured permission to trade &amp; establish factories at &lt;span class=&quot;kw&quot;&gt;Surat&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Art, Culture &amp; Literature&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Jahangir&#x27;s reign = &lt;span class=&quot;kw&quot;&gt;Golden Age of Mughal Painting&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Shifted from manuscript illustrations to &lt;span class=&quot;kw&quot;&gt;individual portraits&lt;/span&gt; &amp; detailed &lt;span class=&quot;kw&quot;&gt;nature studies&lt;/span&gt; (birds, animals, flowers)&lt;/li&gt;
      &lt;li&gt;Famous painters: &lt;span class=&quot;kw&quot;&gt;Ustad Mansur&lt;/span&gt; (flora &amp; fauna) &amp; &lt;span class=&quot;kw&quot;&gt;Abul Hasan&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Literature: &lt;span class=&quot;kw&quot;&gt;Tuzuk-i-Jahangiri&lt;/span&gt; – autobiography in Persian; noted for frankness &amp; scientific observations of nature&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏗️ SHAH JAHAN &lt;span class=&quot;yr&quot;&gt;1628–1658&lt;/span&gt;&lt;/div&gt;
    &lt;span class=&quot;emp-badge&quot;&gt;5th Mughal Emperor – &quot;Engineer King&quot;&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Born as &lt;span class=&quot;kw&quot;&gt;Prince Khurram&lt;/span&gt;; known as &quot;Engineer King&quot;&lt;/li&gt;
      &lt;li&gt;Reign = &lt;span class=&quot;kw&quot;&gt;&quot;Golden Age&quot; of Mughal architecture&lt;/span&gt; but also start of financial strain&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Accession &amp; Early Challenges&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Ascended throne in &lt;span class=&quot;kw&quot;&gt;1628&lt;/span&gt; with support of father-in-law &lt;span class=&quot;kw&quot;&gt;Asaf Khan&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Title: &lt;span class=&quot;kw&quot;&gt;Shah Jahan&lt;/span&gt; (King of the World)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Bundela Rebellion:&lt;/span&gt; Led by Jujhar Singh – first major challenge&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Khan-i-Jahan Lodi:&lt;/span&gt; Afghan noble who rebelled; defeated &amp; killed in &lt;span class=&quot;kw&quot;&gt;1631&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Military Conquests &amp; Deccan Policy&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Annexation of Ahmadnagar (1633):&lt;/span&gt; Ended independence of Nizam Shahi dynasty&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Treaties with Bijapur &amp; Golconda (1636):&lt;/span&gt; Forced to accept Mughal suzerainty &amp; pay tribute; not fully annexed&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Central Asian Campaign:&lt;/span&gt; Attempted to reclaim Balkh &amp; Badakhshan → &lt;span class=&quot;rd&quot;&gt;major failure&lt;/span&gt;; massive loss of men &amp; money&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Loss of Kandahar (1649):&lt;/span&gt; Persians permanently seized Kandahar → blow to prestige &amp; strategic defense&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Administration &amp; Revenue&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Month-Scale System:&lt;/span&gt; &quot;Monthly Ratio&quot; in Mansabdari; if Jagir didn&#x27;t yield expected revenue → adjusted to &lt;span class=&quot;kw&quot;&gt;10-month, 8-month, or 6-month scale&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;State demand raised to &lt;span class=&quot;kw&quot;&gt;50% of produce&lt;/span&gt; in some regions to fund buildings → increased peasant burden&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Literature &amp; Culture&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Dara Shikoh&#x27;s Work:&lt;/span&gt; Translated Upanishads into Persian as &lt;span class=&quot;kw&quot;&gt;Sirr-i-Akbar (The Great Secret)&lt;/span&gt;; wrote &lt;span class=&quot;kw&quot;&gt;Majma-ul-Bahrayn (The Mingling of Two Oceans)&lt;/span&gt; – exploring commonalities between Islam &amp; Hinduism&lt;/li&gt;
      &lt;li&gt;Other Dara Shikoh works: Safain-ul-Auliya, Hasanat-ul-Arifeen, Risala-i-Haqqnuma, Tarjuma-i-Yogvashishtha&lt;/li&gt;
      &lt;li&gt;Court Historian: &lt;span class=&quot;kw&quot;&gt;Abdul Hamid Lahori&lt;/span&gt; wrote &lt;span class=&quot;kw&quot;&gt;Padshahnama&lt;/span&gt; – official history of Shah Jahan&#x27;s reign&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;War of Succession (1657–1658)&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;When Shah Jahan fell ill → brutal civil war between 4 sons:&lt;/li&gt;
      &lt;li&gt;1. &lt;span class=&quot;kw&quot;&gt;Dara Shikoh&lt;/span&gt; – eldest; scholar of Upanishads; Emperor&#x27;s favorite&lt;/li&gt;
      &lt;li&gt;2. &lt;span class=&quot;kw&quot;&gt;Shuja&lt;/span&gt; – Governor of Bengal&lt;/li&gt;
      &lt;li&gt;3. &lt;span class=&quot;kw&quot;&gt;Aurangzeb&lt;/span&gt; – Governor of Deccan; seasoned military general&lt;/li&gt;
      &lt;li&gt;4. &lt;span class=&quot;kw&quot;&gt;Murad&lt;/span&gt; – Governor of Gujarat&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Aurangzeb won&lt;/span&gt; → defeated Dara Shikoh at &lt;span class=&quot;kw&quot;&gt;Battle of Samugarh (1658)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Imprisoned Shah Jahan in &lt;span class=&quot;kw&quot;&gt;Agra Fort&lt;/span&gt; for remaining &lt;span class=&quot;kw&quot;&gt;8 years&lt;/span&gt; of his life&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💡 Dara Shikoh&#x27;s Famous Quote&lt;/div&gt;
      &quot;The different religions are but different paths leading to the same God.&quot;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ===== TAB 4: AURANGZEB ===== --&gt;
&lt;div id=&quot;t4&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🕌 AURANGZEB &lt;span class=&quot;yr&quot;&gt;1658–1707&lt;/span&gt;&lt;/div&gt;
    &lt;span class=&quot;emp-badge&quot;&gt;6th Mughal Emperor – Last &quot;Great Mughal&quot;&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Title: &lt;span class=&quot;kw&quot;&gt;Alamgir&lt;/span&gt; (&quot;Conqueror of the World&quot;)&lt;/li&gt;
      &lt;li&gt;Last of the &quot;Great Mughals&quot;; reigned for &lt;span class=&quot;kw&quot;&gt;49 years&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Empire reached &lt;span class=&quot;kw&quot;&gt;maximum territorial extent&lt;/span&gt; but also sowed seeds of decline&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Character &amp; Personal Life&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Lived a very &lt;span class=&quot;kw&quot;&gt;simple, austere life&lt;/span&gt; unlike predecessors&lt;/li&gt;
      &lt;li&gt;Called &lt;span class=&quot;kw&quot;&gt;Zinda Pir&lt;/span&gt; (Living Saint) for disciplined habits &amp; avoidance of royal luxuries&lt;/li&gt;
      &lt;li&gt;Secured throne after bloody civil war, defeating brothers Shuja, Murad &amp; crown prince Dara Shikoh&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Two Phases of Reign&lt;/div&gt;
    &lt;div class=&quot;fact-grid&quot;&gt;
      &lt;div class=&quot;fact-item&quot;&gt;&lt;div class=&quot;fl&quot;&gt;Phase 1 (1658–1681)&lt;/div&gt;Focused on &lt;span class=&quot;kw&quot;&gt;Northern India&lt;/span&gt; – dealing with Jats, Satnamis &amp; Sikhs&lt;/div&gt;
      &lt;div class=&quot;fact-item&quot;&gt;&lt;div class=&quot;fl&quot;&gt;Phase 2 (1681–1707)&lt;/div&gt;Focused entirely on &lt;span class=&quot;kw&quot;&gt;Deccan&lt;/span&gt;; never returned to Delhi&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Territorial Extent&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Empire stretched from &lt;span class=&quot;kw&quot;&gt;Kabul to Chittagong&lt;/span&gt; and from &lt;span class=&quot;kw&quot;&gt;Kashmir to Kaveri River&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Military Campaigns&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;North-East:&lt;/span&gt; General Mir Jumla annexed &lt;span class=&quot;kw&quot;&gt;Assam (Ahom kingdom) in 1662&lt;/span&gt;; Mughals struggled to maintain control due to geography&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Annexed Bijapur (1686)&lt;/span&gt; &amp; &lt;span class=&quot;kw&quot;&gt;Golconda (1687)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Removing these kingdoms eliminated the &quot;buffer&quot; between Mughals &amp; Marathas → direct exhausting conflict&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Conflict with Marathas:&lt;/span&gt; Rise of &lt;span class=&quot;kw&quot;&gt;Shivaji Maharaj&lt;/span&gt; = biggest challenge&lt;/li&gt;
      &lt;li&gt;Despite &lt;span class=&quot;kw&quot;&gt;Treaty of Purandar (1665)&lt;/span&gt;, Shivaji escaped Mughal custody in Agra &amp; established sovereign Maratha kingdom&lt;/li&gt;
      &lt;li&gt;Aurangzeb spent &lt;span class=&quot;kw&quot;&gt;last 25 years in Deccan&lt;/span&gt; trying to crush Marathas but &lt;span class=&quot;rd&quot;&gt;failed&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;⚠️ Religious &amp; Social Policies of Aurangzeb&lt;/div&gt;
    &lt;p style=&quot;font-size:0.83rem;color:var(--muted);margin-bottom:8px;&quot;&gt;Moved away from Akbar&#x27;s &lt;span class=&quot;kw&quot;&gt;Sulh-i-Kul&lt;/span&gt; toward more orthodox Islamic state&lt;/p&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Jizya (1679):&lt;/span&gt; Re-introduced Jizya tax on non-Muslims (abolished by Akbar 115 years earlier)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Muhtasibs:&lt;/span&gt; Appointed censors of public morals to ensure people lived per Sharia law&lt;/li&gt;
      &lt;li&gt;Banned &lt;span class=&quot;kw&quot;&gt;music, gambling &amp; alcohol&lt;/span&gt; in court&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Temple Policy:&lt;/span&gt; Issued some grants to temples but also ordered destruction of prominent ones (Vishwanath in Kashi, Keshavdeva in Mathura) – primarily for political reasons/punishing rebellions&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Sikh Conflict:&lt;/span&gt; Executed &lt;span class=&quot;kw&quot;&gt;9th Sikh Guru, Guru Tegh Bahadur (1675)&lt;/span&gt; after he refused to convert → led to permanent militarization of Sikhs under &lt;span class=&quot;kw&quot;&gt;Guru Gobind Singh (The Khalsa)&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;⚠️ Exam Note – Sikh Gurus Conflict&lt;/div&gt;
      &lt;span class=&quot;kw&quot;&gt;Guru Arjan Dev&lt;/span&gt; (5th) → executed by &lt;span class=&quot;kw&quot;&gt;Jahangir&lt;/span&gt;&lt;br&gt;
      &lt;span class=&quot;kw&quot;&gt;Guru Tegh Bahadur&lt;/span&gt; (9th) → executed by &lt;span class=&quot;kw&quot;&gt;Aurangzeb (1675)&lt;/span&gt; → led to formation of &lt;span class=&quot;kw&quot;&gt;Khalsa&lt;/span&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;📉 Administration &amp; Decline&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Jagirdari Crisis&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Empire so large → not enough good land (Jagirs) for increasing Mansabdars&lt;/li&gt;
      &lt;li&gt;Led to &lt;span class=&quot;kw&quot;&gt;internal corruption &amp; competition&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;The Deccan Ulcer&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&quot;The &lt;span class=&quot;kw&quot;&gt;Deccan ulcer ruined Aurangzeb&lt;/span&gt;&quot; – historians&#x27; verdict&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;26-year-long campaign&lt;/span&gt; drained royal treasury, exhausted army&lt;/li&gt;
      &lt;li&gt;Administrative collapse in &lt;span class=&quot;kw&quot;&gt;Northern India&lt;/span&gt; due to Emperor&#x27;s long absence&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Literature&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Fatawa-e-Alamgiri&lt;/span&gt; – massive compilation of Islamic law; created under his patronage; served as legal code for the empire&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

&lt;!-- ===== TAB 5: ARCHITECTURE ===== --&gt;
&lt;div id=&quot;t5&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏛️ Mughal Architecture – Overview (1526–1707)&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Represents the &lt;span class=&quot;kw&quot;&gt;peak of Indo-Islamic architecture&lt;/span&gt; in India&lt;/li&gt;
      &lt;li&gt;Fusion of &lt;span class=&quot;kw&quot;&gt;Persian, Timurid (Central Asian), Islamic &amp; indigenous Indian styles&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Known for &lt;span class=&quot;kw&quot;&gt;symmetry, monumentality, gardens, domes, arches &amp; decorative elegance&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Evolved continuously from &lt;span class=&quot;kw&quot;&gt;Babur to Aurangzeb&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Important Mughal Buildings – Master Table&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Building&lt;/th&gt;&lt;th&gt;Distinguishing Feature&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;Babur&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Aram Bagh&lt;/span&gt;&lt;/td&gt;&lt;td&gt;First Mughal garden in India&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Humayun&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Humayun&#x27;s Tomb&lt;/span&gt;&lt;/td&gt;&lt;td&gt;First double dome; Charbagh layout; prototype of Taj Mahal&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Sher Shah&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Sasaram Tomb&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Transitional Indo-Afghan style&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Akbar&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Fatehpur Sikri&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Fusion architecture; planned city&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Akbar&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Buland Darwaza&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Largest gateway in India (55m high)&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Jahangir&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Itmad-ud-Daulah&lt;/span&gt;&lt;/td&gt;&lt;td&gt;First marble tomb; first extensive pietra dura&lt;/td&gt;&lt;/tr&gt;

          &lt;tr&gt;&lt;td&gt;Shah Jahan&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Red Fort&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Diwan-i-Khas; new imperial capital Shahjahanabad&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Shah Jahan&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Jama Masjid&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Grand mosque; largest in India&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;Aurangzeb&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Bibi Ka Maqbara&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&quot;Taj of Deccan&quot;; decline phase&lt;/td&gt;&lt;/tr&gt;
