  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏗️ 19 Elements &amp; Features of Mughal Architecture&lt;/div&gt;
    &lt;div class=&quot;arch-elem&quot;&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;1. Arches&lt;/div&gt;Curved structural openings above doors/windows; Mughals used pointed &amp; cusped arches with voussoirs &amp; keystone&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;2. Domes&lt;/div&gt;Hemispherical structures covering large spaces; Mughal domes are usually bulbous &amp; set on a drum&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;3. Double Dome&lt;/div&gt;Two domes – inner for interior proportion, outer for external height &amp; magnificence&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;4. Minarets&lt;/div&gt;Tall slender towers at corners of platform; add vertical emphasis; used for call to prayer&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;5. Charbagh&lt;/div&gt;Persian-style four-part garden divided by water channels; symbolizing paradise as in Quran&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;6. Pietra Dura (Parchin Kari)&lt;/div&gt;Art of inlaying semi-precious stones into marble to create floral &amp; geometric patterns&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;7. Jali Work&lt;/div&gt;Perforated stone lattice screens with intricate geometric/floral patterns; let light &amp; air while maintaining privacy&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;8. Calligraphy&lt;/div&gt;Quranic verses inscribed using calligraphic scripts like Thuluth &amp; Naskh&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;9. Chhatris&lt;/div&gt;Small elevated dome-shaped kiosks; adopted from Rajput architecture&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;10. Jharokhas&lt;/div&gt;Overhanging enclosed balconies projecting from walls; derived from Rajput architecture&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;11. Materials&lt;/div&gt;Red sandstone (Akbar era) → White marble (Shah Jahan era)&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;12. Symmetry&lt;/div&gt;Buildings planned with perfect symmetry along central axis; reflecting balance, order &amp; imperial authority&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;13. Iwan&lt;/div&gt;Vaulted hall/space open on one side; typical Persian architectural element adopted by Mughals&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;14. Pishtaq&lt;/div&gt;Tall rectangular framed archway used as grand entrance; creates monumental impression&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;15. Arabesque&lt;/div&gt;Intricate floral, geometric &amp; vegetal patterns used as decoration&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;16. Muqarnas&lt;/div&gt;Honeycomb-like decorative vaulting used in arches, domes &amp; ceilings&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;17. Finial&lt;/div&gt;Ornamental element at top of domes or minarets&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;18. Hasht Bihisht&lt;/div&gt;Persian planning concept – central chamber surrounded by eight rooms (&quot;Eight Paradise Plan&quot;)&lt;/div&gt;
      &lt;div class=&quot;ae-item&quot;&gt;&lt;div class=&quot;ae-title&quot;&gt;19. Water Channels &amp; Fountains&lt;/div&gt;Used in gardens for beauty, cooling &amp; symbolic representation of paradise&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏡 Babur&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1526–1530&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;Persian-Central Asian Garden Style&lt;/span&gt;; simple but deeply influenced by Persian &amp; Central Asian traditions&lt;/li&gt;
      &lt;li&gt;Introduced concept of &lt;span class=&quot;kw&quot;&gt;Charbagh (four-part garden)&lt;/span&gt; divided by water channels in India&lt;/li&gt;
      &lt;li&gt;Flowing water, tanks &amp; fountains used for beauty, cooling &amp; paradise symbolism&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Aram Bagh, Agra&lt;/span&gt; – first Mughal garden in India; Charbagh style; had pavilions, fruit trees, flower beds&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Kabuli Bagh Mosque, Panipat&lt;/span&gt; – built after First Battle of Panipat (1526); one of earliest Mughal mosques; Persian arched openings; brick &amp; stone&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Jama Masjid, Sambhal&lt;/span&gt; – one of earliest mosques; reflects early Persian influence; built for local Muslim community&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🏯 Humayun&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1530–1556&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;Strong Persianized Mughal Style&lt;/span&gt;; moved away from Afghan simplicity&lt;/li&gt;
      &lt;li&gt;Key features: Iwans &amp; Pishtaqs, Charbagh gardens, &lt;span class=&quot;kw&quot;&gt;Double Dome System&lt;/span&gt;, Symmetry &amp; Axial Planning, Chhatris &amp; Jaalis&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Dinpanah (Delhi)&lt;/span&gt; – new city built by Humayun in 1533; named &quot;Abode of Faith&quot;; later captured by Sher Shah; renamed &lt;span class=&quot;kw&quot;&gt;Purana Qila&lt;/span&gt;; contains Qila-i-Kuhna Mosque (1541) &amp; Sher Mandal&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Humayun&#x27;s Tomb (1570)&lt;/span&gt; – built by his widow &lt;span class=&quot;kw&quot;&gt;Begha Begum&lt;/span&gt;; architect &lt;span class=&quot;kw&quot;&gt;Mirak Mirza Ghiyas&lt;/span&gt;; first grand Mughal tomb in India &amp; &lt;span class=&quot;kw&quot;&gt;UNESCO World Heritage Site&lt;/span&gt;; first major use of double dome; Charbagh layout; red sandstone + white marble; prototype for Taj Mahal; &lt;span class=&quot;kw&quot;&gt;Hasht Bihisht&lt;/span&gt; plan&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🔶 Sher Shah Suri&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1540–1545&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;Transitional Indo-Afghan&lt;/span&gt;; bridge between Lodi simplicity &amp; Mughal grandeur&lt;/li&gt;
      &lt;li&gt;Massive, strong &amp; functional structures; use of &lt;span class=&quot;kw&quot;&gt;red sandstone &amp; rubble masonry&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Minimal ornamentation; focus on durability; octagonal tomb style&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Sher Shah&#x27;s Tomb, Sasaram&lt;/span&gt; – on an artificial lake; octagonal plan on raised platform; red sandstone with white marble inlay; chhatris on corners; blend of strength, beauty &amp; serenity&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Purana Qila (Delhi)&lt;/span&gt; – expanded Humayun&#x27;s Dinpanah; includes Qila-i-Kuhna Mosque &amp; Sher Mandal (library)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Rohtas Fort (Punjab, Pakistan)&lt;/span&gt; – massive hill fort; thick walls, gateways &amp; watchtowers; designed to withstand long sieges&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🔴 Akbar&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1556–1605&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;&quot;The Great Synthesizer&quot;&lt;/span&gt; – fusion of Persian, Central Asian, Hindu, Jain &amp; Buddhist traditions&lt;/li&gt;
      &lt;li&gt;Key features: &lt;span class=&quot;kw&quot;&gt;Red sandstone construction&lt;/span&gt;, Trabeate style (pillars &amp; beams), Chhatris, Jharokhas, Brackets &amp; Corbels, Jali work, Lotus motifs&lt;/li&gt;
      &lt;li&gt;Massive &amp; bold structures; incorporated Indian elements extensively&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Agra Fort (c. 1565)&lt;/span&gt; – first major architectural venture; red sandstone; semi-circular plan; strong fortifications; palaces, audience halls, mosques&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Fatehpur Sikri (1571–1585)&lt;/span&gt; – imperial capital built to honor Sheikh Salim Chishti; planned city; architectural fusion:
        &lt;br&gt;• &lt;span class=&quot;kw&quot;&gt;Buland Darwaza&lt;/span&gt; (1601) – after Gujarat victory; &lt;span class=&quot;gr&quot;&gt;largest gateway in India&lt;/span&gt; (55m high)
        &lt;br&gt;• &lt;span class=&quot;kw&quot;&gt;Panch Mahal&lt;/span&gt; – 5-storey palace inspired by Buddhist vihara
        &lt;br&gt;• &lt;span class=&quot;kw&quot;&gt;Diwan-i-Khas&lt;/span&gt; – famous for central pillar with radiating platforms
        &lt;br&gt;• &lt;span class=&quot;kw&quot;&gt;Ibadat Khana&lt;/span&gt; – hall for interfaith discussions
        &lt;br&gt;• &lt;span class=&quot;kw&quot;&gt;Tomb of Salim Chishti&lt;/span&gt; – originally red sandstone, later rebuilt in marble; exquisite jali work
        &lt;br&gt;• &lt;span class=&quot;kw&quot;&gt;Jodha Bai Palace&lt;/span&gt; – strong Rajput influence with chhatris, brackets &amp; carved pillars
      &lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Akbar&#x27;s Tomb, Sikandra&lt;/span&gt; (completed by Jahangir) – blend of Islamic &amp; Hindu elements; no central dome; pyramidal look; red sandstone &amp; marble&lt;/li&gt;
      &lt;li&gt;Other: Lahore Fort (early), Allahabad Fort, Ajmer Fort &amp; Mosque, Sarai &amp; Caravanserais&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;🤍 Jahangir&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1605–1627&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;&quot;Patron of Refined Beauty &amp; Nature&quot;&lt;/span&gt;; shift from massive red sandstone → &lt;span class=&quot;kw&quot;&gt;white marble&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Key features: Use of white marble, &lt;span class=&quot;kw&quot;&gt;Pietra Dura work&lt;/span&gt;, Gardens &amp; Charbagh, Delicate ornamentation, Harmony with nature&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Itmad-ud-Daulah Tomb, Agra&lt;/span&gt; – built by Nur Jahan for her father; called &lt;span class=&quot;kw&quot;&gt;&quot;Baby Taj&quot;&lt;/span&gt;; &lt;span class=&quot;gr&quot;&gt;first Mughal structure entirely of white marble&lt;/span&gt;; first extensive use of pietra dura; prototype for later marble architecture including Taj Mahal&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Shalimar Bagh, Srinagar (Kashmir)&lt;/span&gt; – magnificent Charbagh garden along Dal Lake; terraced layout, Chinar trees, water channels, fountains, pavilions&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Akbar&#x27;s Tomb, Sikandra&lt;/span&gt; – completed during Jahangir&#x27;s reign&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Jahangir&#x27;s Palaces at Lahore Fort&lt;/span&gt; – Khwabgah (Dream Palace), Diwan-i-Khas, Sheesh Mahal; fine frescoes, painted ceilings, mirror work&lt;/li&gt;
      &lt;li&gt;Other: Sarai Nurmahal (caravanserai), Nishat Bagh/Chashme Shahi (Kashmir)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;⭐ Shah Jahan&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1628–1658&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;&quot;Zenith of Mughal Architecture&quot;&lt;/span&gt;; dominant use of &lt;span class=&quot;kw&quot;&gt;white marble with red sandstone accents&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Key features: White marble, Pietra Dura inlay, Perfect symmetry, &lt;span class=&quot;kw&quot;&gt;Bulbous domes &amp; slender minarets&lt;/span&gt;, Calligraphy, Charbagh gardens&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Taj Mahal, Agra (1632–1653)&lt;/span&gt; – built in memory of wife &lt;span class=&quot;kw&quot;&gt;Mumtaz Mahal&lt;/span&gt;; pinnacle of Mughal architecture; pure white marble; perfect symmetry; pietra dura inlay; Charbagh on raised platform; double dome &amp; 4 minarets&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Red Fort (Lal Qila), Delhi (1639–1648)&lt;/span&gt; – new imperial capital Shahjahanabad; red sandstone with marble accents; Diwan-i-Am, Diwan-i-Khas, Rang Mahal, Khas Mahal, Sheesh Mahal; beautiful marble pavilions &amp; gardens&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Jama Masjid, Delhi (1650–1656)&lt;/span&gt; – one of largest &amp; most magnificent mosques; huge courtyard; 3 large marble domes &amp; 2 tall minarets; red sandstone &amp; marble&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Musamman Burj, Agra Fort (1631)&lt;/span&gt; – octagonal marble tower where Shah Jahan was imprisoned by Aurangzeb; overlooks Taj Mahal&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Moti Masjid, Agra Fort (1648–1654)&lt;/span&gt; – entirely white marble; 3 domes &amp; delicate arches; &quot;Pearl Mosque&quot;&lt;/li&gt;
      &lt;li&gt;Other: Shalimar Bagh (Lahore), Khas Mahal (Agra Fort), Jahanaras Sarai (Delhi), &lt;span class=&quot;kw&quot;&gt;Takht-i-Taus (Peacock Throne)&lt;/span&gt; – legendary throne symbolizing imperial grandeur&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;📉 Aurangzeb&#x27;s Architecture &lt;span class=&quot;yr&quot;&gt;1658–1707&lt;/span&gt;&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Style: &lt;span class=&quot;kw&quot;&gt;Declining &amp; Simplified&lt;/span&gt;; shift toward simplicity, functionality &amp; piety&lt;/li&gt;
      &lt;li&gt;Reduced ornamentation; less white marble; austere &amp; economical structures&lt;/li&gt;
      &lt;li&gt;Greater emphasis on &lt;span class=&quot;kw&quot;&gt;mosques, religious buildings, forts &amp; practical constructions&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Major Buildings&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Bibi Ka Maqbara, Aurangabad (c. 1661–1678)&lt;/span&gt; – built in memory of wife Dilras Banu Begum (Rabia-ud-Daurani); called &lt;span class=&quot;kw&quot;&gt;&quot;Taj of Deccan&quot;&lt;/span&gt;; resembles Taj Mahal on smaller scale; marble with minimal pietra dura&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Badshahi Mosque, Lahore (1671–1673)&lt;/span&gt; – one of largest mosques in world; red sandstone with marble inlay; 3 large marble domes; 4 minarets; vast prayer hall&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Alamgir Masjid, Delhi (c. 1669)&lt;/span&gt; – built on raised platform near Red Fort; small &amp; simple compared to earlier mosques&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Makki Masjid, Delhi (c. 1660)&lt;/span&gt; – near Jama Masjid; red sandstone; simple yet elegant&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Daulatabad Fort&lt;/span&gt; – strengthened &amp; renovated; important military stronghold in Deccan&lt;/li&gt;
      &lt;li&gt;Other: Built Sarais, Bridges &amp; Roads, Fortifications (Gwalior, Ranthambore, Jinj), Water Tanks &amp; Wells&lt;/li&gt;
      &lt;li&gt;Religious &amp; Educational: Built Madrasas, renovated Mazars &amp; Dargahs, built many mosques; supported Khanqas (Sufi institutions)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ===== TAB 6: ADMINISTRATION ===== --&gt;
&lt;div id=&quot;t6&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;⚙️ Mansabdari System – Evolution&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Ruler&lt;/th&gt;&lt;th&gt;Changes&lt;/th&gt;&lt;th&gt;Key Features&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Akbar&lt;/span&gt;&lt;br&gt;1556–1605&lt;/td&gt;
            &lt;td&gt;Introduced Mansabdari as centralized administrative &amp; military structure&lt;/td&gt;
            &lt;td&gt;• Mansab = rank/position&lt;br&gt;• Zat (personal rank) + Sawar (cavalry rank)&lt;br&gt;• Ranks: 10 to 10,000&lt;br&gt;• Dagh (horse branding) &amp; Chehra (descriptive rolls)&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Jahangir&lt;/span&gt;&lt;br&gt;1605–1627&lt;/td&gt;
            &lt;td&gt;Modified for greater rewards &amp; flexibility&lt;/td&gt;
            &lt;td&gt;• Introduced &lt;span class=&quot;kw&quot;&gt;Du-Aspah, Si-Aspah&lt;/span&gt; (extra cavalry allowance)&lt;br&gt;• Increased privileges for loyal nobles&lt;br&gt;• Mansabs became more honorary &amp; less strictly military&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Shah Jahan&lt;/span&gt;&lt;br&gt;1628–1658&lt;/td&gt;
            &lt;td&gt;More elaborate &amp; expensive&lt;/td&gt;
            &lt;td&gt;• Increased mansabs for imperial grandeur&lt;br&gt;• Greater emphasis on court hierarchy&lt;br&gt;• Jagir assignments often insufficient to pay nobles&lt;br&gt;• Month-Scale System introduced&lt;/td&gt;
          &lt;/tr&gt;
          &lt;tr&gt;
            &lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Aurangzeb&lt;/span&gt;&lt;br&gt;1658–1707&lt;/td&gt;
            &lt;td&gt;Expanded excessively; began declining&lt;/td&gt;
            &lt;td&gt;• Huge increase in mansabdars (Deccan campaigns)&lt;br&gt;• Severe shortage of jagirs (&lt;span class=&quot;kw&quot;&gt;Jagirdari Crisis&lt;/span&gt;)&lt;br&gt;• Corruption &amp; inefficiency increased&lt;br&gt;• Military obligations weakened&lt;/td&gt;
          &lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;lbl&quot;&gt;💡 Highest Mansab&lt;/div&gt;
      &lt;span class=&quot;kw&quot;&gt;Prince Dara Shikoh&lt;/span&gt; (son of Shah Jahan) = highest mansab of &lt;span class=&quot;kw&quot;&gt;60,000 Zat &amp; 40,000 Sawar&lt;/span&gt;&lt;br&gt;
      Non-royal nobles: &lt;span class=&quot;kw&quot;&gt;Raja Man Singh&lt;/span&gt; (under Akbar) &amp; &lt;span class=&quot;kw&quot;&gt;Mirza Raja Jai Singh&lt;/span&gt; (under Aurangzeb)
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;📊 Delhi Sultanate vs Mughal Empire – Administration&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Feature&lt;/th&gt;&lt;th&gt;Delhi Sultanate (1206–1526)&lt;/th&gt;&lt;th&gt;Mughal Empire (1526–1857)&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Nature of State&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Military State; authority depended on Sultan&#x27;s personal strength &amp; Turkish nobility support&lt;/td&gt;&lt;td&gt;Centralized Bureaucracy; more &quot;National&quot; state with systematic hierarchy &amp; cultural integration&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;The Ruler&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Sultan: &quot;First among equals&quot; (Primus inter pares) relative to powerful nobles&lt;/td&gt;&lt;td&gt;Badshah/Emperor: Absolute authority with divine aura (Zill-i-Ilahi); far more powerful than nobility&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Land Revenue&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Iqta System: Land grants to officers (Iqtadars); revenue less systematically measured&lt;/td&gt;&lt;td&gt;Zabt/Dahshala System: Highly scientific measurement based on 10-year average produce&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Rank System&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Informal; based on size of Iqta &amp; number of troops maintained&lt;/td&gt;&lt;td&gt;Mansabdari System: Unique formal grading using Zat &amp; Sawar&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Provincial Div.&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Shiqs (Provinces) &amp; Parganas (Districts)&lt;/td&gt;&lt;td&gt;Subas (Provinces), Sarkars (Districts) &amp; Parganas&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Local Presence&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Central control weak in rural areas; depended on local Hindu intermediaries&lt;/td&gt;&lt;td&gt;Stronger central control reached village level through Patwari &amp; Qanungo&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Nobility&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dominated by Turkish, Afghan &amp; Persian elites; often unstable &amp; prone to rebellion&lt;/td&gt;&lt;td&gt;Diverse &quot;Heterogeneous&quot; nobility: Persians, Turks, Rajputs &amp; Indian Muslims&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Tuzuk-i-Baburi&lt;/span&gt; written in &lt;span class=&quot;kw&quot;&gt;Chagatai Turkic&lt;/span&gt; (NOT Persian); translated by Abdul Rahim Khan-i-Khana in 1589&lt;/li&gt;

      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Akbar&#x27;s army at Haldighati&lt;/span&gt; was led by a &lt;span class=&quot;kw&quot;&gt;Rajput&lt;/span&gt; (Raja Man Singh) – not Akbar himself&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Birbal&lt;/span&gt; = only prominent noble to accept Din-i-Ilahi&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Itmad-ud-Daulah&lt;/span&gt; = first marble tomb (Jahangir), NOT Taj Mahal&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Humayun&#x27;s Tomb&lt;/span&gt; = first double dome &amp; prototype for Taj Mahal&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Taj Mahal&lt;/span&gt; architect = &lt;span class=&quot;kw&quot;&gt;Ustad Ahmad Lahauri&lt;/span&gt; (generally credited)&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Nur Jahan&lt;/span&gt; = only Mughal Empress to mint coins in her name&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Buland Darwaza&lt;/span&gt; (55m) = largest gateway in India; built after Gujarat victory&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Guru Arjan Dev&lt;/span&gt; (5th Guru) → Jahangir | &lt;span class=&quot;kw&quot;&gt;Guru Tegh Bahadur&lt;/span&gt; (9th Guru) → Aurangzeb&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Panch Mahal&lt;/span&gt; at Fatehpur Sikri inspired by &lt;span class=&quot;kw&quot;&gt;Buddhist Vihara&lt;/span&gt; style&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Fatawa-e-Alamgiri&lt;/span&gt; = Islamic law compilation under Aurangzeb&#x27;s patronage&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Dara Shikoh&lt;/span&gt; = highest mansab ever: 60,000 Zat &amp; 40,000 Sawar&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Bibi Ka Maqbara&lt;/span&gt; = &quot;Taj of Deccan&quot;; Aurangzeb built for his wife; reflects decline phase&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Sher Shah Suri&#x27;s Rupee&lt;/span&gt; = became the standard silver coin (even followed by Mughals)&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Grand Trunk Road&lt;/span&gt; = Sher Shah Suri&#x27;s contribution; Bengal to Punjab&lt;/li&gt;
      &lt;li&gt;💡 &lt;span class=&quot;kw&quot;&gt;Mughal School of Painting&lt;/span&gt; foundation = Persian painters Mir Sayyid Ali &amp; Abdus Samad (recruited by Humayun in exile)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;button id=&quot;scroll-top&quot; onclick=&quot;window.scrollTo({top:0,behavior:&#x27;smooth&#x27;})&quot; title=&quot;Scroll to top&quot;&gt;↑&lt;/button&gt;

&lt;script&gt;
  function showTab(id, btn) {
    document.querySelectorAll(&#x27;.panel&#x27;).forEach(p =&gt; p.classList.remove(&#x27;active&#x27;));
    document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(b =&gt; b.classList.remove(&#x27;active&#x27;));
    document.getElementById(id).classList.add(&#x27;active&#x27;);
    btn.classList.add(&#x27;active&#x27;);
    window.scrollTo({top:0, behavior:&#x27;smooth&#x27;});
  }
  window.addEventListener(&#x27;scroll&#x27;, function() {
    const btn = document.getElementById(&#x27;scroll-top&#x27;);
    if (window.scrollY &gt; 300) btn.classList.add(&#x27;visible&#x27;);
    else btn.classList.remove(&#x27;visible&#x27;);
  });
&lt;/script&gt;
&lt;/body&gt;
