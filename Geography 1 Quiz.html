s from 150 m (from river plains) to an elevation of 600-900 m, and is one of the oldest, most stable landmasses."}, {"q": "The Peninsular Plateau is broadly divided into which three groups?", "options": ["Deccan Plateau, Central Highlands, Northeastern Plateau", "Malwa, Chotanagpur, Bundelkhand", "Western Ghats, Eastern Ghats, Nilgiris", "Aravalli, Vindhya, Satpura"], "correct": 0, "exp": "The Peninsular Plateau is divided into three broad groups: Deccan Plateau, Central Highlands, and Northeastern Plateau."}, {"q": "Which range of the Deccan Plateau has a higher average elevation and is more continuous \u2014 the Western Ghats or Eastern Ghats?", "options": ["Western Ghats (avg. 1,500 m, continuous)", "Eastern Ghats (avg. 1,500 m, continuous)", "Both have equal elevation and continuity", "Eastern Ghats is higher but discontinuous"], "correct": 0, "exp": "The Western Ghats (avg. 1,500 m, continuous) are higher and more continuous than the Eastern Ghats, which are discontinuous and more eroded."}, {"q": "Anaimudi (2,695 m), the highest peak of the Peninsular Plateau, is located in which hills?", "options": ["Nilgiri hills", "Anaimalai hills", "Cardamom hills", "Palani hills"], "correct": 1, "exp": "Anaimudi (2,695 m), the highest peak of the Peninsular Plateau, is located in the Anaimalai hills; Dodabetta (2,637 m) in the Nilgiris is the second highest."}, {"q": "The Central Highlands, lying west of the Aravalis, are bounded on the south by which range?", "options": ["Vindhyan Range", "Satpura Range", "Maikal Range", "Kaimur Range"], "correct": 1, "exp": "The Satpura Range forms the southern boundary of the Central Highlands, which lie west of the Aravalis and slope towards the north/northeast."}, {"q": "The Northeastern Plateau (part of the Peninsular Plateau) is separated from the main Peninsular Block by:", "options": ["A river delta", "A fault, later filled by river deposits", "The Himalayas", "An ocean trench"], "correct": 1, "exp": "The Northeastern Plateau is a detached extension of the Peninsular block, separated by a fault that was later filled by river deposits."}, {"q": "The Meghalaya Plateau is divided into which three hill regions, named after local tribes?", "options": ["Garo-Khasi-Jaintia Hills", "Naga-Mizo-Manipur Hills", "Cardamom-Anaimalai-Nilgiri Hills", "Aravalli-Vindhya-Satpura Hills"], "correct": 0, "exp": "The Meghalaya Plateau is divided into the Garo-Khasi-Jaintia Hills, named after local tribes, and is rich in coal, iron ore, sillimanite, limestone, and uranium."}, {"q": "Along the Western Ghats, the local name changes from Sahyadri (Maharashtra) to which name in Karnataka/Tamil Nadu?", "options": ["Nilgiri", "Anaimalai", "Cardamom Hills", "Palani"], "correct": 0, "exp": "The Western Ghats are locally called Sahyadri in Maharashtra, Nilgiri in Karnataka/Tamil Nadu, and Anaimalai & Cardamom Hills in Kerala."}, {"q": "The badland ravines of Chambal, Bhind, and Morena are located in which part of India?", "options": ["Northwestern Peninsular Plateau", "Eastern Coastal Plain", "Northeastern Plateau", "Indian Desert"], "correct": 0, "exp": "The famous badland ravines of Chambal, Bhind, and Morena are found in the northwestern Peninsular Plateau."}, {"q": "The Indian Desert (Marusthali), lying northwest of the Aravalis, is believed to have been under the sea during which geological era?", "options": ["Paleozoic", "Mesozoic", "Cenozoic", "Proterozoic"], "correct": 1, "exp": "The Indian Desert is believed to have been under the sea during the Mesozoic era, evidenced by wood fossils at Aakal and marine deposits near Brahmsar, Jaisalmer (~180 million years old)."}, {"q": "The Indian Desert (Marusthali), drained mainly by which ephemeral river?", "options": ["Chambal", "Luni", "Betwa", "Sabarmati"], "correct": 1, "exp": "The Luni is the main (ephemeral) river of the Indian Desert; many of its streams end in salt lakes/playas, a source of salt."}, {"q": "Which coast of India is a submerged coast, narrow, and generally lacks deltas?", "options": ["Eastern Coastal Plain", "Western Coastal Plain", "Coromandel Coast", "Northern Circars"], "correct": 1, "exp": "The Western Coastal Plain is a submerged, narrow coast with no deltas but many natural ports (Kandla, JNPT, Marmagao, Cochin), unlike the emergent, broader Eastern Coastal Plain, which has well-developed deltas (Mahanadi, Godavari, Krishna, Kaveri)."}, {"q": "Which coastal region contains well-developed river deltas, such as the Mahanadi, Godavari, Krishna, and Kaveri?", "options": ["Western Coastal Plain", "Eastern Coastal Plain", "Kachchh & Kathiawar coast", "Konkan coast"], "correct": 1, "exp": "The Eastern Coastal Plain, an emergent and broader coast, contains well-developed deltas of the Mahanadi, Godavari, Krishna, and Kaveri rivers."}, {"q": "'Kayals', the backwaters used for fishing, tourism, and the Nehru Trophy boat race, are a special feature of which coastal state?", "options": ["Tamil Nadu", "Kerala", "Odisha", "Gujarat"], "correct": 1, "exp": "Kayals (backwaters) are a special feature of Kerala's coast, used for fishing, tourism, and the Nehru Trophy boat race at Punnamada."}, {"q": "Along the western coast (north to south), the sub-divisions are: Kachchh & Kathiawar \u2192 Konkan \u2192 Goan \u2192 which region?", "options": ["Malabar", "Coromandel", "Northern Circars", "Vidarbha"], "correct": 0, "exp": "The Western Coastal Plain's sub-divisions (north to south) are Kachchh & Kathiawar (Gujarat) \u2192 Konkan (Maharashtra) \u2192 Goan \u2192 Malabar (Karnataka/Kerala)."}, {"q": "Andaman & Nicobar Islands and Lakshadweep are separated in origin because:", "options": ["Andaman & Nicobar are of coral origin; Lakshadweep is volcanic", "Andaman & Nicobar are elevated submarine mountains (some volcanic); Lakshadweep is of coral origin", "Both are entirely volcanic", "Both are entirely of coral origin"], "correct": 1, "exp": "Andaman & Nicobar Islands are elevated submarine mountains (some volcanic, including Barren Island \u2014 India's only active volcano), while Lakshadweep islands are of coral origin."}, {"q": "The Ten Degree Channel separates:", "options": ["Andaman (north) from Nicobar (south)", "Amini (north) from Cannanore (south)", "India from Sri Lanka", "Lakshadweep from the mainland"], "correct": 0, "exp": "The Ten Degree Channel separates the Andaman Islands (north) from the Nicobar Islands (south); the Nine Degree Channel separates Amini (north) from Cannanore/Minicoy (south) in Lakshadweep."}, {"q": "Saddle Peak, the highest peak in the Andaman & Nicobar Islands, has an elevation of approximately:", "options": ["150 m", "453 m", "738 m", "1,200 m"], "correct": 2, "exp": "Saddle Peak, the highest point in the Andaman & Nicobar Islands, stands at about 738 m."}, {"q": "Minicoy, the largest island of Lakshadweep, has an area of approximately:", "options": ["100 sq km", "453 sq km", "700 sq km", "1,000 sq km"], "correct": 1, "exp": "Minicoy, the largest island in Lakshadweep, has an area of about 453 sq km, and lies 220-440 km off the Kerala coast."}]}, {"title": "17. Drainage System (Rivers of India)", "questions": [{"q": "Approximately what percentage of India's drainage area flows into the Bay of Bengal?", "options": ["23%", "50%", "77%", "90%"], "correct": 2, "exp": "About 77% of India's drainage area flows into the Bay of Bengal (Ganga, Brahmaputra, Mahanadi, Krishna, Godavari, Kaveri), while about 23% flows into the Arabian Sea (Indus, Narmada, Tapi, Mahi, Periyar)."}, {"q": "Himalayan rivers are classified as 'perennial' because they are fed by:", "options": ["Only rainfall", "Snowmelt plus rainfall", "Groundwater alone", "Glacial lakes only, with no rainfall input"], "correct": 1, "exp": "Himalayan drainage is perennial, fed by both snowmelt and rain, unlike most Peninsular drainage, which is mostly seasonal/rain-fed (except a few rivers like Narmada/Tapi in rift valleys)."}, {"q": "Which drainage pattern resembles the branching of a tree, and is found in rivers of the Northern Plain?", "options": ["Radial", "Dendritic", "Trellis", "Centripetal"], "correct": 1, "exp": "The Dendritic pattern, resembling tree branches, is found in rivers of the Northern Plain."}, {"q": "The 'Radial' drainage pattern, where rivers flow outward from a central hill in all directions, is exemplified by rivers from:", "options": ["The Amarkantak range", "The Aravalli range", "The Himalayas", "The Western Ghats"], "correct": 0, "exp": "Rivers from the Amarkantak range exhibit a radial drainage pattern, flowing outward in all directions from the central highland."}, {"q": "Loktak Lake in Manipur, the largest freshwater lake in Northeast India, is a classic example of which drainage pattern?", "options": ["Dendritic", "Radial", "Trellis", "Centripetal"], "correct": 3, "exp": "Loktak Lake demonstrates centripetal drainage, where rivers converge into a central lake/depression; it is also home to the Keibul Lamjao National Park, the world's only floating national park."}, {"q": "The ancient master river theorised to have once flowed the entire length of the Himalayas before being dismembered into the Indus, Ganga, and Brahmaputra systems is called:", "options": ["Tsangpo", "Indo-Brahma (Shiwalik river)", "Panjnad", "Singi Khamban"], "correct": 1, "exp": "The 'Indo-Brahma' (Shiwalik river) is theorised to have flowed the length of the Himalayas during the Miocene, later dismembered by Pleistocene tectonic uplift into the Indus (west), Ganga (central), and Brahmaputra (east) systems."}, {"q": "The Indus originates near Bokhar Chu in the Kailash range, Tibet, where it is locally called:", "options": ["Tsangpo", "Singi Khamban (Lion's Mouth)", "Panjnad", "Gangotri"], "correct": 1, "exp": "The Indus originates near Bokhar Chu, Kailash range, Tibet, where it is called 'Singi Khamban' or 'Lion's Mouth'."}, {"q": "The combined tributaries of the Indus \u2014 Jhelum, Chenab, Ravi, Beas, and Satluj \u2014 together are known as:", "options": ["Panch Prayag", "Panjnad", "Tsangpo", "Dihang"], "correct": 1, "exp": "Jhelum, Chenab, Ravi, Beas, and Satluj together form the 'Panjnad', joining above Mithankot before flowing into the Indus."}, {"q": "The river Ganga is formed at Devprayag by the confluence of the Bhagirathi and:", "options": ["Mandakini", "Alaknanda", "Pindar", "Dhauliganga"], "correct": 1, "exp": "The Bhagirathi (from Gangotri glacier) meets the Alaknanda at Devprayag to form the Ganga. The Alaknanda itself is formed by the Dhauliganga and Vishnuganga meeting at Joshimath/Vishnuprayag."}, {"q": "The Ganga enters the plains at which town?", "options": ["Devprayag", "Haridwar", "Rishikesh", "Prayagraj"], "correct": 1, "exp": "The Ganga enters the plains at Haridwar; its total length is about 2,525 km."}, {"q": "Which of the following is a south-bank (Peninsular) tributary of the Ganga, older than the Himalayan rivers?", "options": ["Ghaghara", "Kosi", "Chambal", "Gandak"], "correct": 2, "exp": "Chambal, Betwa, and Son are south-bank Peninsular tributaries of the Ganga/Yamuna, geologically older than the north-bank Himalayan tributaries (Yamuna, Ghaghara, Gandak, Kosi)."}, {"q": "Which river is known as the 'Sorrow of Bihar' due to its tendency to frequently shift course?", "options": ["Gandak", "Ghaghara", "Kosi", "Son"], "correct": 2, "exp": "The Kosi River is called the 'Sorrow of Bihar' because of its notorious tendency to frequently shift its course due to heavy silt deposition."}, {"q": "The Namami Gange Programme, a flagship river conservation mission, was launched in which year?", "options": ["2009", "2014", "2018", "2020"], "correct": 1, "exp": "The Namami Gange Programme was launched in 2014, with pillars including sewage treatment, river-front development, river surface cleaning, biodiversity, and afforestation."}, {"q": "The Brahmaputra is known as the 'Tsangpo' in Tibet, and enters India in which state?", "options": ["Assam", "Sikkim", "Arunachal Pradesh", "West Bengal"], "correct": 2, "exp": "The Brahmaputra, called Tsangpo in Tibet, enters India in Arunachal Pradesh as the Dihang/Siang, before taking a sharp turn southward at Dhubri to enter Bangladesh."}, {"q": "Majuli, the world's largest river island, is formed by which river?", "options": ["Ganga", "Brahmaputra", "Indus", "Godavari"], "correct": 1, "exp": "Majuli is a riverine island of the Brahmaputra River, known for its braided channels and frequent floods."}, {"q": "Which Peninsular rivers flow into the Arabian Sea through rift valleys without forming deltas?", "options": ["Godavari and Krishna", "Mahanadi and Kaveri", "Narmada and Tapi", "Chambal and Betwa"], "correct": 2, "exp": "The Narmada and Tapi flow westward through rift valleys into the Arabian Sea without forming deltas, unlike most other Peninsular rivers that flow east into the Bay of Bengal and form deltas."}, {"q": "The Narmada river originates from which plateau?", "options": ["Amarkantak Plateau", "Malwa Plateau", "Chotanagpur Plateau", "Deccan Plateau"], "correct": 0, "exp": "The Narmada originates from the Amarkantak Plateau (Madhya Pradesh) and flows into the Arabian Sea via a rift valley."}, {"q": "Godavari, the largest Peninsular river, is also known as:", "options": ["Dakshin Ganga", "Uttar Ganga", "Peninsular Ganga", "Southern Brahmaputra"], "correct": 0, "exp": "The Godavari, originating near Nashik in the Western Ghats and India's largest Peninsular river, is popularly known as 'Dakshin Ganga' (Ganga of the South)."}, {"q": "The Krishna river originates near which location in the Western Ghats?", "options": ["Nashik", "Mahabaleshwar", "Brahmagiri", "Amarkantak"], "correct": 1, "exp": "The Krishna river originates near Mahabaleshwar in the Western Ghats and flows into the Bay of Bengal."}, {"q": "The Kaveri river originates in which hills?", "options": ["Brahmagiri (Karnataka)", "Nilgiri (Tamil Nadu)", "Anaimalai (Kerala)", "Cardamom Hills"], "correct": 0, "exp": "The Kaveri originates at Brahmagiri in Karnataka and flows into the Bay of Bengal."}, {"q": "The Manipur River flows via which lake, originating in Senapati district with tributaries Imphal and Iril?", "options": ["Loktak Lake", "Chilika Lake", "Wular Lake", "Sambhar Lake"], "correct": 0, "exp": "The Manipur River originates in Senapati district, with tributaries Imphal and Iril, flowing via the Loktak Lake side."}, {"q": "Loktak Lake is listed in the Montreux Record (1993) primarily due to which issue?", "options": ["Overfishing", "Water hyacinth invasion", "Industrial pollution", "Reduced rainfall"], "correct": 1, "exp": "Loktak Lake is listed in the Montreux Record (1993) due to water hyacinth invasion, despite being a Ramsar site (1990) and home to the Keibul Lamjao National Park."}, {"q": "The Feni River, flowing from South Tripura into Bangladesh, is notable for:", "options": ["Being India's largest river", "A water-sharing dispute with Bangladesh", "Forming the world's largest delta", "Being entirely underground"], "correct": 1, "exp": "The Feni River, flowing from South Tripura to Bangladesh, is notable for a water-sharing dispute between India and Bangladesh."}]}, {"title": "18. Climate of India & Monsoon System", "questions": [{"q": "India's climate is classified as which type, characterised by a seasonal reversal of winds?", "options": ["Mediterranean type", "Monsoon type", "Continental type", "Equatorial type"], "correct": 1, "exp": "India's climate is the 'Monsoon type', characterised by seasonal reversal of winds \u2014 the South-West Monsoon (onshore, rainy) and North-East Monsoon (offshore, mostly dry, except Tamil Nadu)."}, {"q": "Which of the following is NOT one of India's four main climatic seasons?", "options": ["Cold weather (Dec-Feb)", "Hot weather (Mar-May)", "South-West Monsoon (Jun-Sep)", "Spring monsoon (Jan-Feb)"], "correct": 3, "exp": "India's four seasons are: Cold weather (Dec-Feb), Hot weather (Mar-May), South-West Monsoon/rainy season (Jun-Sep), and Retreating/Post-monsoon (Oct-Nov)."}, {"q": "The South-West Monsoon splits into which two branches?", "options": ["Himalayan branch and Peninsular branch", "Arabian Sea branch and Bay of Bengal branch", "Eastern branch and Western branch", "Coastal branch and Inland branch"], "correct": 1, "exp": "The South-West Monsoon splits into the Arabian Sea branch (hitting the Western Ghats first, with Kerala onset around 1 June) and the Bay of Bengal branch (moving up through NE India and the Gangetic plain)."}, {"q": "The South-West Monsoon brings approximately what share of India's annual rainfall?", "options": ["25-30%", "50-55%", "75-80%", "95-100%"], "correct": 2, "exp": "The South-West Monsoon (June\u2013September) brings about 75-80% of India's annual rainfall."}, {"q": "Which region receives rainfall from the retreating North-East Monsoon (Oct-Dec), unlike most of India which is dry in this season?", "options": ["Kerala", "Tamil Nadu and the Coromandel coast", "Punjab", "Rajasthan"], "correct": 1, "exp": "Tamil Nadu and the Coromandel coast receive rainfall from the North-East (Retreating) Monsoon, as these winds pick up moisture crossing the Bay of Bengal."}, {"q": "The onset of the monsoon in India is theorised to be triggered by the withdrawal of which atmospheric feature from north of the Himalayas?", "options": ["Trade winds", "Subtropical westerly jet stream", "Polar easterlies", "Coriolis force"], "correct": 1, "exp": "The Jet Stream theory holds that the withdrawal of the subtropical westerly jet stream from north of the Himalayas triggers the monsoon's onset."}, {"q": "Mawsynram and Cherrapunji, among the wettest places on Earth, are located in which state?", "options": ["Assam", "Meghalaya", "Arunachal Pradesh", "Manipur"], "correct": 1, "exp": "Mawsynram and Cherrapunji in Meghalaya are among the wettest places on Earth, due to their funnel-shaped topography intensifying orographic rainfall."}, {"q": "Rainfall in the Northern Plains generally decreases in which direction?", "options": ["North to south", "East to west", "West to east", "South to north"], "correct": 1, "exp": "Rainfall decreases from east to west in the Northern Plains, and from coast to interior in the Peninsula."}, {"q": "Which region is considered the coldest in India?", "options": ["Rajasthan", "Kashmir/Ladakh and Siachen", "Northeastern Plateau", "Coromandel Coast"], "correct": 1, "exp": "Kashmir/Ladakh and Siachen are considered the coldest regions of India; the hottest is Rajasthan (Thar Desert, Churu/Ganganagar)."}, {"q": "'Mango showers' refer to:", "options": ["Winter showers over Rajasthan", "Pre-monsoon showers in Kerala/Karnataka that help ripen mangoes", "Cyclonic storms over the Bay of Bengal", "Monsoon showers over Punjab"], "correct": 1, "exp": "Mango showers are pre-monsoon showers in Kerala/Karnataka that help mango ripening."}, {"q": "'Kal Baisakhi' or 'Nor'westers' are violent pre-monsoon evening thunderstorms occurring in:", "options": ["Kerala and Karnataka", "West Bengal and Assam", "Rajasthan and Gujarat", "Punjab and Haryana"], "correct": 1, "exp": "Kal Baisakhi (Nor'westers) are violent pre-monsoon evening thunderstorms in West Bengal and Assam; Mango showers are pre-monsoon showers in Kerala/Karnataka that help ripen mangoes."}, {"q": "The monsoon's onset in India typically follows which geographic order?", "options": ["Delhi \u2192 Kolkata \u2192 Mumbai \u2192 Kerala", "Kerala \u2192 Mumbai \u2192 Kolkata \u2192 Delhi", "Kolkata \u2192 Delhi \u2192 Kerala \u2192 Mumbai", "Simultaneously across the entire country"], "correct": 1, "exp": "The monsoon 'arrives' in India from the south and moves northward/eastward: Kerala (~1 June) \u2192 Mumbai \u2192 Kolkata \u2192 Delhi (~end June/July)."}]}, {"title": "19. Soils of India", "questions": [{"q": "Which soil type is India's largest soil group, found in the Northern Plains and river deltas?", "options": ["Black (Regur) soil", "Alluvial soil", "Laterite soil", "Red and Yellow soil"], "correct": 1, "exp": "Alluvial soil is India's largest soil group, found in the Northern Plains and river deltas; it is fertile, rich in potash and lime, and includes Khadar (new) and Bhangar (old) types."}, {"q": "Black (Regur) soil, ideal for cotton cultivation, is formed from:", "options": ["Weathered granite", "Lava (basalt)", "River-borne alluvium", "Coastal marine deposits"], "correct": 1, "exp": "Black (Regur) soil forms from lava/basalt rock in the Deccan Plateau; it has high clay content, retains moisture, and cracks when dry (self-ploughing), making it ideal for cotton \u2014 hence 'black cotton soil'."}, {"q": "Red and Yellow soil, found in the low-rainfall areas of eastern and southern Deccan, develops on which rock type?", "options": ["Crystalline rocks", "Basaltic lava", "Alluvium", "Limestone"], "correct": 0, "exp": "Red and Yellow soil develops on crystalline rocks; the red colour comes from iron oxide diffusion, and it is less fertile, suited to millets and groundnut."}, {"q": "Laterite soil, found in high-rainfall plateau areas, forms mainly through:", "options": ["Intense leaching in high temperature and rainfall", "Deposition of river silt", "Volcanic ash accumulation", "Wind-blown deposition"], "correct": 0, "exp": "Laterite soil forms through intense leaching under high temperature and heavy rainfall, leaving it poor in organic matter; it's found in Karnataka, Kerala, Odisha, and Assam."}, {"q": "Which soil type is suited to cashew, tea, and coffee cultivation (with added fertilizer)?", "options": ["Alluvial", "Black (Regur)", "Laterite", "Arid/Desert"], "correct": 2, "exp": "Laterite soil, though poor in organic matter, is suited to cashew, tea, and coffee cultivation when supplemented with fertilizer."}, {"q": "Arid/Desert soil, found in Rajasthan, is characterised by:", "options": ["High organic content and low salinity", "Sandy, saline, low-humus, high-calcium composition", "Rich humus content, ideal for rice", "Being formed from lava"], "correct": 1, "exp": "Arid/Desert soil is sandy, saline, low in humus, and high in calcium \u2014 it can support drought-resistant crops with irrigation."}, {"q": "Mountain/Forest soil, found in the Himalayan region, is typically:", "options": ["Uniform in composition regardless of altitude", "Varying with altitude and vegetation, acidic in high-rainfall areas", "Always sandy and saline", "The most fertile soil in India"], "correct": 1, "exp": "Mountain/Forest soil varies with altitude and vegetation type, and is acidic in high-rainfall areas; it supports tea, spices, and fruit cultivation."}, {"q": "Saline and alkaline soils, also known as Reh or Usar, are characterised by:", "options": ["High organic/humus content", "Excess salts, making them unproductive without reclamation", "High potash and lime content, very fertile", "Acidity, suited to tea cultivation"], "correct": 1, "exp": "Saline and Alkaline (Reh/Usar) soils have excess salts and are unproductive unless reclaimed; they occur in dry regions and some coastal areas."}, {"q": "Peaty and Marshy soil, rich in organic/humus content, is best suited for growing:", "options": ["Cotton", "Rice", "Tea", "Wheat"], "correct": 1, "exp": "Peaty and Marshy soil, found in high-rainfall/humid areas like Kerala, Odisha, and Bihar, is rich in organic content and best suited for rice cultivation."}, {"q": "Which of the following is a major cause of soil erosion in India?", "options": ["Contour ploughing", "Terracing", "Deforestation and overgrazing", "Afforestation"], "correct": 2, "exp": "Major causes of soil erosion include deforestation, overgrazing, and faulty farming practices like shifting cultivation. Contour ploughing, terracing, and afforestation are conservation methods, not causes."}, {"q": "Which soil erosion conservation method involves ploughing along the contour lines of a slope?", "options": ["Terracing", "Contour ploughing", "Afforestation", "Shelter belts"], "correct": 1, "exp": "Contour ploughing involves ploughing along the natural contour lines of a slope to reduce soil erosion; other methods include terracing, afforestation, and shelter belts (e.g. against desertification in Rajasthan)."}]}, {"title": "20. Natural Vegetation / Forests in India", "questions": [{"q": "Tropical Evergreen (Rain) Forest, with trees like rosewood, ebony and mahogany, occurs in areas with rainfall exceeding:", "options": ["70 cm", "100 cm", "200 cm", "300 cm"], "correct": 2, "exp": "Tropical Evergreen (Rain) Forests occur in areas with rainfall over 200 cm, such as the Western Ghats, NE states, and Andaman & Nicobar Islands, featuring dense canopy, broad-leaved trees like rosewood, ebony, and mahogany."}, {"q": "Which vegetation type is the most widespread in India, occurring where rainfall is between 100-200 cm?", "options": ["Tropical Evergreen Forest", "Tropical Deciduous (Monsoon) Forest", "Thorn and Scrub Forest", "Montane Forest"], "correct": 1, "exp": "Tropical Deciduous (Monsoon) Forest, with key trees like Teak and Sal, is the most widespread vegetation type in India, occurring in areas with 100-200 cm rainfall."}, {"q": "Teak forests, part of the moist Tropical Deciduous category, are prominent in which states?", "options": ["Rajasthan and Gujarat", "Madhya Pradesh and Chhattisgarh", "Punjab and Haryana", "Jammu and Kashmir"], "correct": 1, "exp": "Teak forests (moist deciduous) are prominent in Madhya Pradesh and Chhattisgarh, while Sal forests occur in drier deciduous conditions."}, {"q": "Thorn and Scrub Forest, with vegetation like acacia (babul) and cactus, is typically found in areas with rainfall below:", "options": ["70 cm", "100 cm", "150 cm", "200 cm"], "correct": 0, "exp": "Thorn and Scrub Forest occurs in semi-arid areas with rainfall below 70 cm, such as Rajasthan and Gujarat."}, {"q": "The Sundari tree, which gives the Sunderbans its name, is characteristic of which forest type?", "options": ["Tropical Evergreen Forest", "Thorn and Scrub Forest", "Mangrove (Tidal/Littoral) Forest", "Montane Forest"], "correct": 2, "exp": "The Sundari tree, a saline-tolerant species with aerial roots, is characteristic of Mangrove (Tidal/Littoral) forests found in deltas and coasts like the Sunderbans."}, {"q": "Montane/Alpine forests on Himalayan slopes typically transition, with increasing altitude, from Chir pine and deodar/oak to:", "options": ["Mangrove vegetation", "Alpine grasslands", "Tropical rainforest", "Thorn scrub"], "correct": 1, "exp": "Montane/Alpine forests show altitude-dependent zonation, transitioning from Chir pine, deodar, and oak at lower altitudes to alpine grasslands at higher altitudes."}, {"q": "The biennial India State of Forest Report (ISFR) is published by:", "options": ["Ministry of Environment", "Forest Survey of India (FSI)", "National Green Tribunal", "Wildlife Institute of India"], "correct": 1, "exp": "The Forest Survey of India (FSI) prepares the biennial India State of Forest Report (ISFR); the National Forest Policy targets 33% of India's geographical area under forest/tree cover."}, {"q": "According to the National Forest Policy, what percentage of India's geographical area is targeted to be under forest/tree cover?", "options": ["20%", "25%", "33%", "50%"], "correct": 2, "exp": "The National Forest Policy sets a target of 33% of India's geographical area under forest/tree cover."}, {"q": "Project Tiger, a flagship wildlife conservation scheme, was launched in:", "options": ["1972", "1973", "1992", "2000"], "correct": 1, "exp": "Project Tiger was launched in 1973; Project Elephant followed in 1992."}, {"q": "Project Elephant, a flagship wildlife conservation scheme, was launched in:", "options": ["1973", "1985", "1992", "2002"], "correct": 2, "exp": "Project Elephant was launched in 1992, following Project Tiger (1973)."}]}, {"title": "21. Mineral Resources & Industry in India", "questions": [{"q": "Which states are leading producers of Iron Ore in India?", "options": ["Odisha, Chhattisgarh, Jharkhand, Karnataka", "Rajasthan, Gujarat, Punjab", "Kerala, Tamil Nadu, Karnataka", "Assam, Meghalaya, Manipur"], "correct": 0, "exp": "Odisha, Chhattisgarh, Jharkhand, and Karnataka (Bellary) are leading producers of Iron Ore in India."}, {"q": "Jharia (Jharkhand) and Raniganj (West Bengal) are notable mining towns for:", "options": ["Bauxite", "Coal", "Copper", "Mica"], "correct": 1, "exp": "Jharia (Jharkhand) and Raniganj (West Bengal) are major coal mining towns in India."}, {"q": "Which state is a leading producer of Bauxite (Aluminium ore)?", "options": ["Odisha", "Punjab", "Kerala", "Himachal Pradesh"], "correct": 0, "exp": "Odisha, along with Jharkhand, Gujarat, and Chhattisgarh, is a leading Bauxite producer in India."}, {"q": "Malanjkhand in Madhya Pradesh is notable for the mining of:", "options": ["Iron ore", "Copper", "Gold", "Mica"], "correct": 1, "exp": "Malanjkhand (Madhya Pradesh) is a notable Copper mining site, along with Jharkhand and Rajasthan."}, {"q": "Koderma in Jharkhand is a major mining centre for which mineral?", "options": ["Mica", "Manganese", "Petroleum", "Diamond"], "correct": 0, "exp": "Koderma (Jharkhand), along with Andhra Pradesh and Rajasthan, is a major Mica mining centre."}, {"q": "Digboi in Assam is significant as:", "options": ["India's largest coal mining town", "The oldest oilfield in Asia", "India's largest bauxite mine", "The largest gold mine in India"], "correct": 1, "exp": "Digboi, Assam, is the site of the oldest oilfield in Asia."}, {"q": "Which is India's largest offshore petroleum field?", "options": ["Mumbai High", "Digboi", "Ankaleshwar", "Kandla"], "correct": 0, "exp": "Mumbai High is India's largest offshore petroleum field."}, {"q": "Panna in Madhya Pradesh is well known for the mining of:", "options": ["Copper", "Diamonds", "Mica", "Manganese"], "correct": 1, "exp": "Panna, Madhya Pradesh, is well known for diamond mining."}, {"q": "Kolar and Hutti fields in Karnataka are historically significant for the mining of:", "options": ["Iron ore", "Bauxite", "Gold", "Copper"], "correct": 2, "exp": "The Kolar and Hutti gold fields in Karnataka are historically significant gold mining areas in India."}, {"q": "Which plateau is described as India's mineral heartland, rich in coal, iron ore, and mica?", "options": ["Deccan Plateau", "Malwa Plateau", "Chotanagpur Plateau", "Meghalaya Plateau"], "correct": 2, "exp": "The Chotanagpur Plateau is India's mineral heartland, rich in coal, iron ore, and mica."}, {"q": "Jamshedpur is notable as India's first modern industrial town, primarily known for which industry?", "options": ["Textiles", "Iron and steel", "Automobiles", "Petrochemicals"], "correct": 1, "exp": "Jamshedpur, established post-1850, is India's first modern industrial town, known for its iron and steel industry."}, {"q": "Which of the following is a public-sector steel plant town, along with Jamshedpur and Bhilai?", "options": ["Rourkela", "Surat", "Nagpur", "Kochi"], "correct": 0, "exp": "Rourkela, along with Bhilai and Durgapur, is a major public-sector steel plant town in India."}]}, {"title": "22. Transportation in India", "questions": [{"q": "National Highways make up only about 2% of India's total road length but carry approximately what share of road traffic?", "options": ["20%", "40%", "60%", "80%"], "correct": 1, "exp": "National Highways constitute only about 2% of total road length but carry approximately 40% of road traffic in India."}, {"q": "The Golden Quadrilateral connects which four cities?", "options": ["Delhi-Mumbai-Chennai-Kolkata", "Delhi-Bengaluru-Chennai-Kolkata", "Mumbai-Chennai-Kolkata-Hyderabad", "Delhi-Mumbai-Bengaluru-Kolkata"], "correct": 0, "exp": "The Golden Quadrilateral connects Delhi-Mumbai-Chennai-Kolkata, spanning 5,846 km, launched in 2001 and completed in 2012, implemented by the NHAI."}, {"q": "Which is the longest national highway in India, connecting Srinagar to Kanyakumari?", "options": ["NH-27", "NH-44", "NH-8", "NH-19"], "correct": 1, "exp": "NH-44 (Srinagar-Kanyakumari) is India's longest national highway. NH-27 (Porbandar-Silchar) is the 2nd longest, a major East-West corridor."}, {"q": "The Bharatmala Pariyojana, a highway programme for economic corridors, was launched in which year?", "options": ["2001", "2014", "2017", "2020"], "correct": 2, "exp": "The Bharatmala Pariyojana was launched in 2017 for economic corridors and border road connectivity, under the Ministry of Road Transport & Highways, implemented by NHAI."}, {"q": "The Border Roads Organisation (BRO), which builds roads/bridges in the Himalaya/border areas, operates under which ministry?", "options": ["Ministry of Road Transport", "Ministry of Defence", "Ministry of Home Affairs", "Ministry of External Affairs"], "correct": 1, "exp": "The Border Roads Organisation (BRO) operates under the Ministry of Defence, also undertaking projects abroad like Project DANTAK in Bhutan."}, {"q": "India's first railway line, introduced in 1853, ran between:", "options": ["Delhi and Agra", "Mumbai and Thane", "Kolkata and Howrah", "Chennai and Bengaluru"], "correct": 1, "exp": "India's first railway line (1853) ran between Mumbai and Thane."}, {"q": "The Konkan Railway connects Roha (Maharashtra) to which city along the west coast?", "options": ["Kochi", "Mangalore", "Goa", "Panaji"], "correct": 1, "exp": "The Konkan Railway connects Roha (Maharashtra) to Mangalore (Karnataka) along the west coast."}, {"q": "Which port is the largest container port in India, handling around 60-65% of India's containerised cargo?", "options": ["Mundra Port", "Kandla Port", "JNPT (Nhava Sheva)", "Kochi Port"], "correct": 2, "exp": "JNPT (Nhava Sheva), Maharashtra, is India's largest container port, handling about 60-65% of containerised cargo."}, {"q": "Mundra Port, India's largest private port, is owned by which group?", "options": ["Tata Group", "Adani Group", "Reliance Group", "L&T Group"], "correct": 1, "exp": "Mundra Port, Gujarat, is India's largest private port, owned by the Adani Group."}, {"q": "Which port is the top crude-oil import hub on India's east coast, known for its deep-water berths?", "options": ["Chennai", "Visakhapatnam", "Paradip", "Kolkata"], "correct": 2, "exp": "Paradip Port, Odisha, is the top crude-oil import hub on the east coast, due to its deep-water berths."}, {"q": "Which port is known as India's first international container transshipment terminal, built on Willingdon Island?", "options": ["Vizhinjam", "Kochi (Cochin)", "Mormugao", "Kandla"], "correct": 1, "exp": "Kochi (Cochin) Port, on Willingdon Island, is India's first international container transshipment terminal."}, {"q": "Vizhinjam Port in Kerala is notable as:", "options": ["India's oldest port", "India's first deep-water greenfield transshipment port (PPP with Adani)", "India's largest iron-ore exporter", "The deepest landlocked port"], "correct": 1, "exp": "Vizhinjam, Kerala, is India's first deep-water greenfield transshipment port, developed via a PPP with the Adani Group."}, {"q": "Mormugao Port in Goa is notable as India's largest exporter of:", "options": ["Coal", "Iron ore", "Petroleum", "Cotton"], "correct": 1, "exp": "Mormugao Port, Goa, at the entrance of the Zuari estuary, is India's largest iron-ore exporting port."}, {"q": "The Sagarmala Programme, launched in 2015 under the Ministry of Ports, Shipping & Waterways, is built around how many pillars?", "options": ["2", "3", "4", "5"], "correct": 2, "exp": "The Sagarmala Programme has 4 pillars: Port Modernisation, Port Connectivity, Port-led Industrialisation, and Coastal Community Development."}]}, {"title": "23. Tribes in India", "questions": [{"q": "According to Census 2011, the Scheduled Tribe (ST) population of India was approximately:", "options": ["50 million (4% of total)", "104.3 million (8.6% of total)", "201 million (16.6% of total)", "300 million (25% of total)"], "correct": 1, "exp": "India's Scheduled Tribe (ST) population was 104.3 million (8.6% of total population) as per Census 2011."}, {"q": "According nniyakumari"], "correct": 1, "exp": "Indira Col (in the Ladakh/J&K region) marks India's northernmost point."}, {"q": "Kanniyakumari marks India's:", "options": ["Northernmost point", "Southernmost point of the mainland", "Easternmost point", "Westernmost point"], "correct": 1, "exp": "Kanniyakumari is India's southernmost point on the mainland; Indira Point (Great Nicobar) is the southernmost point including islands."}, {"q": "Which point marks India's southernmost extent, including islands?", "options": ["Kanniyakumari", "Indira Point (Great Nicobar)", "Kibithu", "Rameswaram"], "correct": 1, "exp": "Indira Point, on Great Nicobar Island, marks India's southernmost point when including islands (Kanniyakumari is the southernmost point of the mainland only)."}, {"q": "Kibithu, in Arunachal Pradesh, marks India's:", "options": ["Northernmost point", "Southernmost point", "Easternmost point", "Westernmost point"], "correct": 2, "exp": "Kibithu, Arunachal Pradesh, is India's easternmost point."}, {"q": "Ghuar Mota/Gaurav Mota, in Gujarat, marks India's:", "options": ["Northernmost point", "Easternmost point", "Westernmost point", "Southernmost point"], "correct": 2, "exp": "Ghuar Mota (Gaurav Mota), Gujarat, marks India's westernmost point."}, {"q": "Which is the highest peak located within India, and 3rd highest in the world?", "options": ["K2", "Nanda Devi", "Kangchenjunga", "Mount Everest"], "correct": 2, "exp": "Kangchenjunga (Sikkim) is the highest peak within India and the 3rd highest in the world (K2 lies in India-administered but disputed PoK territory)."}, {"q": "Which is the longest river within India, and also has India's largest river basin?", "options": ["Brahmaputra", "Godavari", "Ganga", "Indus"], "correct": 2, "exp": "The Ganga is the longest river within India, and its basin is also India's largest river basin."}, {"q": "Which is the largest Indian state by area?", "options": ["Madhya Pradesh", "Maharashtra", "Rajasthan", "Uttar Pradesh"], "correct": 2, "exp": "Rajasthan is the largest Indian state by area, while Goa is the smallest."}, {"q": "Which is the smallest Indian state by area?", "options": ["Goa", "Sikkim", "Tripura", "Nagaland"], "correct": 0, "exp": "Goa is the smallest Indian state by area."}, {"q": "Which Union Territory has the largest area in India?", "options": ["Lakshadweep", "Puducherry", "Ladakh", "Delhi"], "correct": 2, "exp": "Ladakh is India's largest Union Territory by area, while Lakshadweep is the smallest."}, {"q": "Which Union Territory has the smallest area in India?", "options": ["Lakshadweep", "Puducherry", "Chandigarh", "Daman & Diu"], "correct": 0, "exp": "Lakshadweep is India's smallest Union Territory by area."}]}, {"title": "25. Human Settlements (Rural & Urban)", "questions": [{"q": "A rural settlement with compact, closely built houses, distinct from surrounding farms, is called:", "options": ["Clustered", "Semi-clustered", "Hamleted", "Dispersed"], "correct": 0, "exp": "Clustered settlements have compact, closely built houses distinct from the surrounding farms, common in the Northern Plains and NE states."}, {"q": "A rural settlement pattern where a dominant caste/community occupies the centre, with others on the flanks, fragmented from a large village, is called:", "options": ["Clustered", "Semi-clustered", "Hamleted", "Dispersed"], "correct": 1, "exp": "Semi-clustered settlements are fragmented from a large village, with a dominant caste/community central and others on the flanks \u2014 common in the Gujarat plain and parts of Rajasthan."}, {"q": "A rural settlement pattern where fragmented small units share a common name (like panna, para, palli) is called:", "options": ["Clustered", "Semi-clustered", "Hamleted", "Dispersed"], "correct": 2, "exp": "Hamleted settlements are fragmented into several small units with a common name (panna, para, palli, nagla, dhani), typical of the middle/lower Ganga plain and Chhattisgarh."}, {"q": "Isolated huts or small clusters in remote, hilly, or forested terrain describe which rural settlement type?", "options": ["Clustered", "Semi-clustered", "Hamleted", "Dispersed/Isolated"], "correct": 3, "exp": "Dispersed/Isolated settlements are found in remote, hilly, or forested terrain, such as Meghalaya, Uttarakhand, Himachal Pradesh, and Kerala."}, {"q": "Compact rural settlements for defence/security needs are notably found in which regions?", "options": ["Rajasthan (due to water scarcity)", "Bundelkhand and Nagaland", "Kerala backwaters", "Northeast river valleys"], "correct": 1, "exp": "Compact settlements for security/defence purposes are found in Bundelkhand (Central India) and Nagaland; in Rajasthan, compactness is instead driven by water scarcity."}, {"q": "Under the Census 1991 definition, an 'urban' area must have a minimum population of:", "options": ["2,000", "5,000", "10,000", "20,000"], "correct": 1, "exp": "The Census 1991 urban definition requires minimum population of 5,000, at least 75% male workers in non-agricultural pursuits, and density of at least 400 persons/sq km."}, {"q": "Ancient towns like Varanasi, Prayagraj, and Madurai, over 2000 years old, developed primarily due to their:", "options": ["Industrial significance", "Religious/cultural significance", "Colonial port status", "Mining activity"], "correct": 1, "exp": "Ancient towns like Varanasi, Prayagraj, Patna, and Madurai developed due to their religious/cultural significance, over 2000 years old."}, {"q": "Medieval towns like Delhi, Hyderabad, Jaipur, and Agra developed primarily as:", "options": ["Colonial trading ports", "Fort/principality headquarters", "Modern industrial hubs", "Ancient pilgrimage centres"], "correct": 1, "exp": "Medieval towns such as Delhi, Hyderabad, Jaipur, and Agra developed as fort or principality headquarters."}, {"q": "Modern towns established as British-era ports include:", "options": ["Surat, Mumbai, Chennai, Kolkata", "Chandigarh, Bhubaneswar, Gandhinagar", "Varanasi, Mathura, Amritsar", "Jaipur, Agra, Hyderabad"], "correct": 0, "exp": "Modern towns established as British-era ports include Surat, Mumbai, Chennai, and Kolkata; post-independence planned towns include Chandigarh, Bhubaneswar, and Gandhinagar."}, {"q": "Which of the following is classified as an 'Administrative' function town?", "options": ["Jamshedpur", "Chandigarh", "Varanasi", "Nainital"], "correct": 1, "exp": "Chandigarh is classified as an Administrative town, along with New Delhi, Bhopal, and Gandhinagar; Jamshedpur is Industrial, Varanasi is Religious/Cultural, and Nainital is a Tourist town."}, {"q": "Ambala, Jalandhar, and Mhow are examples of towns with which functional classification?", "options": ["Garrison Cantonment", "Educational", "Mining", "Commercial"], "correct": 0, "exp": "Ambala, Jalandhar, and Mhow are classified as Garrison Cantonment towns."}, {"q": "Roorki, Varanasi, Aligarh, and Pilani are examples of towns with which functional classification?", "options": ["Mining", "Educational", "Transport", "Commercial"], "correct": 1, "exp": "Roorki, Varanasi, Aligarh, and Pilani are classified as Educational function towns."}, {"q": "India's urban population percentage in 1901 was approximately:", "options": ["10.84%", "17.29%", "23.34%", "27.78%"], "correct": 0, "exp": "India's urban population share was 10.84% in 1901, rising to 31.16% (provisional) by 2011 \u2014 roughly an 11-fold increase during the 20th century."}, {"q": "India's urban population percentage in 2011 (provisional) was approximately:", "options": ["17.29%", "23.34%", "27.78%", "31.16%"], "correct": 3, "exp": "India's urban population share reached 31.16% (provisional) in 2011, up from 10.84% in 1901 \u2014 an approximately 11-fold increase during the 20th century, though India remains predominantly rural."}, {"q": "The Smart Cities Mission primarily promotes:", "options": ["Only railway connectivity", "Core infrastructure, sustainability, and quality of life via replicable models", "Rural electrification only", "Coastal port development"], "correct": 1, "exp": "The Smart Cities Mission promotes core infrastructure, sustainability, and quality of life through replicable 'lighthouse' city models."}]}, {"title": "26. World Population \u2014 Distribution, Density & Growth", "questions": [{"q": "Approximately what share of the world's population lives on just ~10% of its land area?", "options": ["50%", "70%", "90%", "99%"], "correct": 2, "exp": "Population distribution is highly uneven: about 90% of the world's population lives on just ~10% of the land area."}, {"q": "Of the world's top 10 most populous countries, how many are located in Asia?", "options": ["3", "6", "8", "10"], "correct": 1, "exp": "6 of the top 10 most populous countries are in Asia, and together the top 10 hold about 60% of the world's population."}, {"q": "Population Density is calculated as:", "options": ["Births minus deaths", "Population divided by Area", "Area divided by Population", "Births plus in-migration"], "correct": 1, "exp": "Density of Population = Population \u00f7 Area, expressed as persons per sq km."}, {"q": "Which of the following is a geographical factor favouring population concentration?", "options": ["Katanga-Zambia copper belt", "Flat plains and gentle slopes with comfortable climate", "Religious significance of a place", "Urbanisation level"], "correct": 1, "exp": "Geographical factors favouring population concentration include water availability, flat plains/gentle slopes, comfortable climate, and fertile soil. (Mining belts like Katanga-Zambia and urbanisation are economic factors.)"}, {"q": "'Natural Growth' of population is calculated as:", "options": ["Births minus deaths", "Births minus deaths plus net migration", "In-migration minus out-migration", "Births divided by deaths"], "correct": 0, "exp": "Natural Growth = Births \u2212 Deaths. Actual Growth = Births \u2212 Deaths + In-migration \u2212 Out-migration."}, {"q": "Crude Birth Rate (CBR) is calculated as:", "options": ["(Live Births \u00f7 Population) \u00d7 1000", "(Deaths \u00f7 Population) \u00d7 1000", "(Live Births \u00f7 Deaths) \u00d7 100", "(Population \u00f7 Live Births) \u00d7 1000"], "correct": 0, "exp": "CBR (Crude Birth Rate) = (Live Births \u00f7 Population) \u00d7 1000."}, {"q": "In the Demographic Transition Theory, Stage I is characterised by:", "options": ["Low birth and low death rates (slow growth)", "High birth and high death rates, cancelling out (slow growth)", "High birth rate with falling death rate (rapid growth)", "Negative population growth"], "correct": 1, "exp": "Stage I of the Demographic Transition Theory features high birth and high death rates that roughly cancel out, resulting in slow population growth \u2014 typical of rural, agrarian, present-day rainforest tribal societies."}, {"q": "In the Demographic Transition Theory, Stage II is characterised by:", "options": ["High birth and high death rates (slow growth)", "High birth rate with falling death rate (rapid/explosive growth)", "Low birth and low death rates (stable growth)", "Negative population growth"], "correct": 1, "exp": "Stage II of the Demographic Transition Theory features a high birth rate but a falling death rate (due to improving health/sanitation), causing rapid/explosive population growth \u2014 exemplified today by countries like Bangladesh and Kenya."}, {"q": "In the Demographic Transition Theory, Stage III, exemplified by countries like Japan, USA, and Canada, is characterised by:", "options": ["High birth and death rates", "Rapid population explosion", "Low birth and death rates, with stable/slow-growing population", "Only negative growth"], "correct": 2, "exp": "Stage III is the Urban, Industrial stage, with both birth and death rates low, resulting in a stable/slow-growing, literate, high-tech population."}, {"q": "Thomas Malthus (1798) theorised that:", "options": ["Population growth always matches food supply growth", "Population grows faster than food supply, leading to eventual famine/disease/war unless checked", "Migration alone solves overpopulation", "Death rates always exceed birth rates in industrial societies"], "correct": 1, "exp": "Thomas Malthus argued population grows faster than food supply, and unchecked growth ends in a 'Malthusian catastrophe' (famine, disease, war) unless preventive checks like family planning are adopted."}, {"q": "According to Malthus, 'preventive checks' such as family planning are preferable to 'positive checks', which include:", "options": ["Migration and urbanisation", "Famine, war, and disease", "Improved healthcare", "Industrialisation"], "correct": 1, "exp": "Malthus considered preventive checks (like family planning) preferable to 'positive checks' such as famine, war, and disease, which naturally limit population when growth outpaces food supply."}, {"q": "India today is generally considered to be transitioning between which stages of the Demographic Transition Theory?", "options": ["Stage I and II", "Stage II and III", "Only Stage I", "Only Stage III"], "correct": 1, "exp": "India is currently transitioning between Stage II and III of the Demographic Transition Theory \u2014 mortality has fallen sharply, and fertility is declining but not yet at replacement level everywhere."}, {"q": "An 'Immigrant' is defined as someone who:", "options": ["Moves out of a place", "Moves into a place", "Moves seasonally for work only", "Moves only within urban areas"], "correct": 1, "exp": "An Immigrant is someone who moves INTO a place, while an Emigrant is someone who moves OUT of a place \u2014 the same person can be both, depending on the reference location."}, {"q": "'Push factors' in migration refer to:", "options": ["Attractive conditions at the destination", "Repelling conditions at the place of origin, like unemployment or political turmoil", "Government policies encouraging migration", "Climate similarities between origin and destination"], "correct": 1, "exp": "Push factors repel people from their place of origin (unemployment, poor living conditions, political turmoil, natural disasters), while pull factors attract them to a destination (better jobs, education, healthcare)."}]}, {"title": "27. Census of India 2011 \u2014 Complete Data Box", "questions": [{"q": "India's first non-synchronous census was conducted in which year?", "options": ["1872", "1881", "1901", "1951"], "correct": 0, "exp": "India's first (non-synchronous) census was conducted in 1872, under Viceroy Lord Mayo."}, {"q": "India's first complete/synchronous census was conducted in which year?", "options": ["1872", "1881", "1901", "1911"], "correct": 1, "exp": "India's first complete/synchronous census was conducted in 1881, under Lord Ripon, with W.C. Plowden as Census Commissioner."}, {"q": "Who is considered the 'Father of Indian Census'?", "options": ["Lord Mayo", "Lord Ripon", "Henry Walter", "W.C. Plowden"], "correct": 2, "exp": "Henry Walter is considered the 'Father of Indian Census'. Lord Mayo oversaw the first non-synchronous census (1872), and Lord Ripon oversaw the first complete/synchronous census (1881)."}, {"q": "India's census is conducted every how many years, with the first census after independence held in 1951?", "options": ["5 years", "10 years", "15 years", "20 years"], "correct": 1, "exp": "India's census is conducted every 10 years; the first census after independence was in 1951. Census 2011 was the 15th census overall and 7th post-independence."}, {"q": "Why was the 2021 Census of India not held?", "options": ["Lack of funding", "COVID-19 pandemic", "Political disputes", "Boundary redrawing"], "correct": 1, "exp": "The 2021 Census was not held due to the COVID-19 pandemic."}, {"q": "Census 2011's motto was:", "options": ["'Our Census, Our Future'", "'India Counts'", "'Every Person Matters'", "'Count Yourself In'"], "correct": 0, "exp": "Census 2011's motto was 'Our Census, Our Future', covering 35 States/UTs and 640 districts."}, {"q": "India's total population according to Census 2011 was approximately:", "options": ["1,000 million", "1,100 million", "1,210.2 million", "1,350 million"], "correct": 2, "exp": "India's total population per Census 2011 was 1,210.2 million (1.21 billion) \u2014 about 17.5% of the world's population."}, {"q": "What was India's decadal population growth rate for 2001-2011?", "options": ["12.5%", "17.64%", "21.5%", "24.8%"], "correct": 1, "exp": "India's decadal growth rate for 2001-2011 was 17.64%, adding 181 million people."}, {"q": "Which decade recorded the highest ever decadal population growth rate in India?", "options": ["1951-61", "1961-71", "1981-91", "2001-11"], "correct": 1, "exp": "1961-71 recorded the highest ever decadal growth rate in India, at 24.8%."}, {"q": "The decade 1911-1921, known as the 'Year of the Great Divide', saw:", "options": ["The highest ever decadal growth rate", "A negative decadal growth rate of -0.31%, due to influenza pandemic and famine", "The introduction of the first census", "The highest recorded sex ratio"], "correct": 1, "exp": "1911-1921 recorded a negative decadal growth rate of -0.31%, due to the influenza pandemic and famine \u2014 called the 'Year of the Great Divide'. The highest ever decadal growth was in 1961-71 at 24.8%."}, {"q": "What was India's Sex Ratio according to Census 2011?", "options": ["933", "940", "943", "950"], "correct": 2, "exp": "India's Sex Ratio in Census 2011 was 943 females per 1000 males (up from 933 in 2001) \u2014 a commonly used trap in MCQs is confusing this with 940 or 950."}, {"q": "India's Child Sex Ratio (0-6 years) in 2011 was 919, showing a trend of:", "options": ["Continuous improvement", "Decline from 927 in 2001", "No change since 1991", "Reaching gender parity"], "correct": 1, "exp": "India's Child Sex Ratio (0-6 yrs) declined from 927 (2001) to 919 (2011) \u2014 a concerning declining trend."}, {"q": "India's overall literacy rate as per Census 2011 was:", "options": ["64.83%", "74.04%", "82.14%", "93.91%"], "correct": 1, "exp": "India's overall literacy rate in Census 2011 was 74.04% (Male 82.14%, Female 65.46%), up from 64.83% in 2001."}, {"q": "India's population density as per Census 2011 was:", "options": ["282 per sq km", "325 per sq km", "382 per sq km", "450 per sq km"], "correct": 2, "exp": "India's population density in 2011 was 382 persons per sq km, up from 325/sq km in 2001."}, {"q": "India's rural-urban population split as per Census 2011 was approximately:", "options": ["50% : 50%", "68.8% : 31.2%", "80% : 20%", "60% : 40%"], "correct": 1, "exp": "As per Census 2011, India's population was split 68.8% rural to 31.2% urban."}, {"q": "As per Census 2011, which state has the highest population in India?", "options": ["Maharashtra", "Bihar", "Uttar Pradesh", "West Bengal"], "correct": 2, "exp": "Uttar Pradesh has the highest population among Indian states (~199.8 million, about 16% of India's population); Sikkim has the lowest."}, {"q": "Which state recorded the highest population density according to Census 2011?", "options": ["Kerala", "West Bengal", "Bihar", "Uttar Pradesh"], "correct": 2, "exp": "Bihar recorded the highest population density among Indian states (1,102/sq km) in Census 2011; Arunachal Pradesh had the lowest (17/sq km)."}, {"q": "Which state recorded the highest Sex Ratio according to Census 2011?", "options": ["Kerala (1,084)", "Haryana (879)", "Tamil Nadu", "Punjab"], "correct": 0, "exp": "Kerala recorded the highest Sex Ratio among states (1,084) in Census 2011; Haryana recorded the lowest (879)."}, {"q": "Which state recorded the highest literacy rate according to Census 2011?", "options": ["Kerala (93.91%)", "Bihar (61.8%)", "Delhi", "Goa"], "correct": 0, "exp": "Kerala recorded the highest literacy rate among states (93.91%) in Census 2011; Bihar recorded the lowest (61.8%)."}, {"q": "Which is the only Indian state to record a negative decadal growth rate as per Census 2011?", "options": ["Kerala", "Nagaland", "Goa", "Sikkim"], "correct": 1, "exp": "Nagaland recorded a negative decadal growth rate (-0.47%) as per Census 2011, the only state to do so."}, {"q": "Which state recorded the highest urbanisation percentage according to Census 2011?", "options": ["Goa (62.17%)", "Himachal Pradesh (10.04%)", "Kerala", "Maharashtra"], "correct": 0, "exp": "Goa recorded the highest urbanisation percentage among states (62.17%); Himachal Pradesh recorded the lowest (10.04%)."}, {"q": "As per Census 2011, which religious community forms the largest share of India's population?", "options": ["Muslims", "Hindus (79.8%)", "Christians", "Sikhs"], "correct": 1, "exp": "Hindus form 79.8% of India's population per Census 2011, followed by Muslims (14.2%), Christians (2.3%), and Sikhs (1.7%)."}, {"q": "As per Census 2011, which religious community showed the highest decadal growth rate?", "options": ["Hindus", "Muslims", "Christians", "Sikhs"], "correct": 1, "exp": "Muslims recorded the highest decadal growth rate (24.6%) among religious communities in Census 2011, while Jains recorded the lowest growth but the highest literacy."}, {"q": "Total Fertility Rate (TFR) is defined as:", "options": ["Deaths of children under 1 year per 1,000 live births", "Expected live births per woman over her reproductive life", "Live births per 1,000 people per year", "Maternal deaths per 100,000 live births"], "correct": 1, "exp": "Total Fertility Rate (TFR) is the expected number of live births per woman over her reproductive life; India's TFR is around 2.0, near the replacement level of 2.1."}, {"q": "Infant Mortality Rate (IMR) measures:", "options": ["Deaths of children under 1 year of age per 1,000 live births", "Maternal deaths per 100,000 live births", "Total births per 1,000 people annually", "The ratio of females to males at birth"], "correct": 0, "exp": "Infant Mortality Rate (IMR) measures deaths of children under 1 year of age per 1,000 live births."}, {"q": "The 'Demographic Dividend' refers to:", "options": ["The economic benefit of a young dependent population", "Growth potential when the working-age population share exceeds the non-working-age share", "A tax rebate for large families", "The decline in birth rates in industrial nations"], "correct": 1, "exp": "Demographic Dividend refers to the growth potential a country gains when its working-age population (15-64) share is greater than its non-working-age share."}]}, {"title": "28. India's Population Growth Phases (1901\u20132011)", "questions": [{"q": "The phase from 1901-1921, marked by high birth and death rates cancelling out, is called the:", "options": ["Steady Growth phase", "Stationary/Stagnant phase", "Population Explosion phase", "High Growth, Slowing phase"], "correct": 1, "exp": "1901-1921 is called the Stationary/Stagnant phase, where high birth and death rates roughly cancelled out, including the negative growth 'Great Divide' of 1911-21 due to the influenza pandemic and famine."}, {"q": "The 'Steady Growth' phase of India's population history (1921-1951) was marked by:", "options": ["Death rates rising sharply", "Death rate beginning to decline while birth rate stayed high", "Both birth and death rates being very low", "The highest ever decadal growth rate"], "correct": 1, "exp": "The Steady Growth phase (1921-1951) saw the death rate begin declining as health/sanitation improved, while the birth rate remained high; 1921 marked the 'Year of Great Divide'."}, {"q": "The 'Population Explosion' phase of India's demographic history occurred during:", "options": ["1901-1921", "1921-1951", "1951-1981", "1981-2011"], "correct": 2, "exp": "1951-1981 is termed the Population Explosion phase, when death rates fell rapidly due to medical advances while fertility remained high, causing a sharp population rise."}, {"q": "The 'High Growth, Slowing' phase (1981-2011) was marked by:", "options": ["A rapidly rising growth rate", "A gradually declining growth rate, though large absolute additions continued", "Negative population growth", "The introduction of the first census"], "correct": 1, "exp": "The 1981-2011 phase saw the growth rate begin declining gradually, but large absolute additions continued (e.g. 182 million added in the 1990s alone)."}, {"q": "India's population growth rate trend shows a decline from 2.22% (1971-81) through to what figure in 2001-11?", "options": ["2.14%", "1.93%", "1.64%", "1.20%"], "correct": 2, "exp": "India's growth rate trend declined: 2.22% (1971-81) \u2192 2.14% (1981-91) \u2192 1.93% (1991-2001) \u2192 1.64% (2001-11, i.e. 17.64% decadal)."}, {"q": "India's Total Fertility Rate declined from 5.2 in 1971 to approximately what value recently, nearing replacement level?", "options": ["1.0", "2.0", "3.5", "4.5"], "correct": 1, "exp": "India's TFR declined from 5.2 (1971) to approximately 2.0 recently, nearing the replacement level of 2.1."}, {"q": "India's population stabilization, targeted by the National Population Policy 2000, is expected around:", "options": ["2020-2025", "2030-2035", "2045-2050", "2060-2070"], "correct": 2, "exp": "The National Population Policy 2000 targets population stabilization for India around 2045-2050."}]}, {"title": "29. Agriculture", "questions": [{"q": "Which cropping season in India runs from June-July sowing to September-October harvesting, coinciding with the South-West Monsoon?", "options": ["Rabi", "Kharif", "Zaid", "Winter season"], "correct": 1, "exp": "Kharif is the monsoon cropping season (sown June-July, harvested Sept-Oct), including crops like rice, maize, cotton, groundnut, jowar, and bajra."}, {"q": "The Rabi cropping season, with crops like wheat, gram, and mustard, is typically sown in which months?", "options": ["Jun-Jul", "Oct-Dec", "Mar-Jun", "Aug-Sep"], "correct": 1, "exp": "Rabi crops are sown Oct-Dec (winter) and harvested Mar-Apr, including wheat, gram, mustard, barley, and peas."}, {"q": "The Zaid cropping season, a short summer season before the monsoon, typically grows crops such as:", "options": ["Rice and jute", "Wheat and barley", "Watermelon, cucumber, and vegetables", "Cotton and groundnut"], "correct": 2, "exp": "Zaid crops (Mar-Jun, short summer season before monsoon) include watermelon, cucumber, vegetables, and fodder."}, {"q": "Rice cultivation requires high temperature and rainfall exceeding what amount (or irrigation)?", "options": ["50 cm", "100 cm", "150 cm", "250 cm"], "correct": 1, "exp": "Rice requires high temperature and rainfall over 100 cm (or irrigation), thriving on alluvial/clayey soil, in states like West Bengal, Punjab, UP, and Andhra Pradesh."}, {"q": "Cotton cultivation in India thrives best on which soil type?", "options": ["Alluvial soil", "Black (Regur) soil", "Laterite soil", "Red soil"], "correct": 1, "exp": "Cotton grows best on Black (Regur) soil, formed from basalt lava, which retains moisture well \u2014 leading states are Gujarat, Maharashtra, and Telangana."}, {"q": "Which state is the largest producer of Tea in India?", "options": ["West Bengal", "Assam", "Kerala", "Tamil Nadu"], "correct": 1, "exp": "Assam is India's largest tea producer, followed by West Bengal (notably Darjeeling)."}, {"q": "Karnataka (Kodagu/Chikmagalur) is India's leading producer of which crop?", "options": ["Tea", "Coffee", "Jute", "Rubber"], "correct": 1, "exp": "Karnataka, particularly the Kodagu and Chikmagalur regions, is India's largest producer of coffee, a hilly, shade-grown crop."}, {"q": "Jute, known as the 'Golden Fibre', is predominantly grown in which state?", "options": ["Bihar", "West Bengal", "Assam", "Odisha"], "correct": 1, "exp": "Jute, the 'Golden Fibre', requiring alluvial soil and high humidity, is predominantly grown in West Bengal."}, {"q": "The Green Revolution, associated with increased foodgrain production, is credited to the leadership of:", "options": ["Dr. Verghese Kurien", "M.S. Swaminathan", "Norman Borlaug alone", "C. Subramaniam alone"], "correct": 1, "exp": "M.S. Swaminathan led India's Green Revolution (1960s-70s), which dramatically boosted foodgrain (especially wheat/rice) production."}, {"q": "The 'White Revolution' (Operation Flood), related to milk production, is associated with:", "options": ["M.S. Swaminathan", "Dr. Verghese Kurien", "Norman Borlaug", "Lal Bahadur Shastri alone"], "correct": 1, "exp": "Dr. Verghese Kurien, the 'Father of the White Revolution', led Operation Flood, which transformed India's milk production."}, {"q": "The 'Blue Revolution' relates to which sector?", "options": ["Milk production", "Fish production/aquaculture", "Oilseed production", "Egg/poultry production"], "correct": 1, "exp": "The Blue Revolution relates to fish production and aquaculture."}, {"q": "The 'Yellow Revolution' relates to which sector?", "options": ["Fish production", "Oilseed production", "Fruit/horticulture production", "Egg/poultry production"], "correct": 1, "exp": "The Yellow Revolution relates to oilseed production."}, {"q": "The 'Golden Revolution' relates to which sector?", "options": ["Fruit/horticulture production", "Onion production", "Potato production", "Poultry production"], "correct": 0, "exp": "The Golden Revolution relates to fruit and horticulture production."}, {"q": "The 'Silver Revolution' relates to which sector?", "options": ["Fish production", "Egg/poultry production", "Cotton production", "Sugarcane production"], "correct": 1, "exp": "The Silver Revolution relates to egg and poultry production."}, {"q": "The 'Round Revolution' relates to which sector?", "options": ["Onion production", "Potato production", "Wheat production", "Milk production"], "correct": 1, "exp": "The Round Revolution relates to potato production."}, {"q": "Zamindari abolition and tenancy reforms were key measures under which post-independence policy area?", "options": ["Land reforms", "Green Revolution", "Irrigation schemes", "Cropping pattern reforms"], "correct": 0, "exp": "Land reforms after independence included the abolition of intermediaries (Zamindari abolition), tenancy reforms, land ceiling acts, and consolidation of holdings."}, {"q": "Shifting cultivation, known as 'Jhum' in Northeast India, is also locally called 'Podu' in which states?", "options": ["Rajasthan and Gujarat", "Andhra Pradesh and Odisha", "Madhya Pradesh only", "Kerala and Tamil Nadu"], "correct": 1, "exp": "Shifting ('slash and burn') cultivation is called Jhum in Northeast India, Podu in Andhra Pradesh/Odisha, and Bewar/Dahiya in Madhya Pradesh."}, {"q": "MSP (Minimum Support Price) for crops in India is recommended by:", "options": ["NITI Aayog", "CACP (Commission for Agricultural Costs & Prices)", "FCI (Food Corporation of India)", "RBI"], "correct": 1, "exp": "The CACP (Commission for Agricultural Costs & Prices) recommends the Minimum Support Price (MSP), the government-guaranteed price for select crops."}]}, {"title": "30. Resources & Industries (World)", "questions": [{"q": "Which of the following is classified as a renewable energy resource?", "options": ["Coal", "Petroleum", "Natural Gas", "Solar/Wind/Hydro"], "correct": 3, "exp": "Solar, Wind, and Hydro power are renewable energy resources, with China, USA, and India (growing rapidly) among the top producers. Coal, Petroleum, and Natural Gas are non-renewable."}, {"q": "Which countries are among the top producers of Coal in the world?", "options": ["China, India, USA, Indonesia, Australia", "Saudi Arabia, Russia, Iran", "Brazil, Canada, Mexico", "Germany, France, UK"], "correct": 0, "exp": "China, India, USA, Indonesia, and Australia are among the top world producers of Coal."}, {"q": "Which industries are classified as 'Agro-based', relying on raw material dependency?", "options": ["Iron & steel, cement, aluminium", "Cotton, sugar, jute, food processing", "Automobile and electronics", "Petrochemical refining"], "correct": 1, "exp": "Agro-based industries (cotton, sugar, jute, food processing) depend on agricultural raw materials, unlike mineral-based industries like iron & steel, cement, and aluminium."}, {"q": "The Kobe-Osaka region in Japan is a classic example cited for:", "options": ["Agricultural output", "Industrial agglomeration attracting dense population via employment", "Renewable energy production", "Desert reclamation"], "correct": 1, "exp": "The Kobe-Osaka region (Japan) is a classic example of industrial agglomeration, attracting dense population through employment opportunities."}, {"q": "The TEN-T (Trans-European Transport Network) connects which modes of transport across Europe?", "options": ["Only roads", "Only railways", "Roads, railways, airports & waterways", "Only airports"], "correct": 2, "exp": "TEN-T is the EU's integrated network connecting roads, railways, airports, and waterways across Europe \u2014 not limited to one mode."}, {"q": "Which canal connects the Mediterranean Sea to the Red Sea, shortening the Europe-Asia sea route?", "options": ["Panama Canal", "Suez Canal", "Kiel Canal", "Corinth Canal"], "correct": 1, "exp": "The Suez Canal connects the Mediterranean Sea to the Red Sea, avoiding the need to sail around Africa on the Europe-Asia route."}, {"q": "The Panama Canal connects which two oceans?", "options": ["Indian and Pacific Oceans", "Atlantic and Pacific Oceans", "Atlantic and Indian Oceans", "Arctic and Pacific Oceans"], "correct": 1, "exp": "The Panama Canal connects the Atlantic and Pacific Oceans, cutting through Central America."}, {"q": "The Strait of Malacca is a key global chokepoint located between:", "options": ["Indonesia and Malaysia", "Saudi Arabia and Iran", "Egypt and Israel", "Spain and Morocco"], "correct": 0, "exp": "The Strait of Malacca, between Indonesia and Malaysia, is a key chokepoint connecting the Indian and Pacific Oceans."}, {"q": "Which Indian cities are major IT/ITES hubs contributing to global services exports?", "options": ["Bengaluru, Hyderabad, Pune", "Jaipur, Lucknow, Patna", "Surat, Nagpur, Indore", "Amritsar, Ludhiana, Jalandhar"], "correct": 0, "exp": "Bengaluru, Hyderabad, and Pune are major IT hubs contributing to India's growing share of global services (IT/ITES) exports."}, {"q": "The Human Development Index (HDI), a composite measure by UNDP, is based on health, education, and:", "options": ["Military strength", "Standard of living (GNI per capita)", "Population density", "Literacy rate alone"], "correct": 1, "exp": "HDI combines health (life expectancy), education (schooling years), and standard of living (GNI per capita), emphasizing human capability over pure economic growth."}, {"q": "A country's advantage from having a large working-age population share relative to non-working-age is called:", "options": ["HDI bonus", "Demographic Dividend", "Malthusian advantage", "Push-pull effect"], "correct": 1, "exp": "The Demographic Dividend refers to the growth potential a country gains when its working-age population (15-64) share exceeds the non-working-age share \u2014 a resource India has, provided skilling and job creation keep pace."}]}]</script>
<script>
const CHAPTERS = JSON.parse(document.getElementById('quiz-data').textContent);
let currentChapter = 0;
// answers[chapterIdx][qIdx] = selectedOptionIndex (or undefined if unanswered)
const answers = CHAPTERS.map(c => new Array(c.questions.length).fill(undefined));

function totalQuestions(){
  return CHAPTERS.reduce((s,c)=>s+c.questions.length,0);
}
function totalAnswered(){
  let s=0;
  answers.forEach(chArr => chArr.forEach(a => { if(a!==undefined) s++; }));
  return s;
}
function totalCorrect(){
  let s=0;
  CHAPTERS.forEach((c,ci)=>{
    c.questions.forEach((q,qi)=>{
      if(answers[ci][qi]===q.correct) s++;
    });
  });
  return s;
}
function chapterAnsweredCount(ci){
  return answers[ci].filter(a=>a!==undefined).length;
}
function chapterCorrectCount(ci){
  let s=0;
  CHAPTERS[ci].questions.forEach((q,qi)=>{ if(answers[ci][qi]===q.correct) s++; });
  return s;
}
function isChapterComplete(ci){
  return chapterAnsweredCount(ci) === CHAPTERS[ci].questions.length;
}

function renderNav(){
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = '';
  CHAPTERS.forEach((c, ci) => {
    const btn = document.createElement('button');
    btn.className = 'chnav-btn' + (ci===currentChapter ? ' active' : '');
    const shortLabel = c.title.replace(/^\d+\.\s*/, '').split('(')[0].trim();
    const num = c.title.match(/^\d+/)[0];
    btn.textContent = num;
    btn.title = shortLabel;
    if(isChapterComplete(ci)){
      btn.innerHTML = num + '<span class="done-mark">✓</span>';
    }
    btn.onclick = () => { currentChapter = ci; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); };
    nav.appendChild(btn);
  });
}

function renderScorebar(){
  document.getElementById('overallScore').textContent = `Score: ${totalCorrect()} / ${totalAnswered()} answered (of ${totalQuestions()})`;
  document.getElementById('chapterScore').textContent = `Chapter: ${chapterCorrectCount(currentChapter)} / ${chapterAnsweredCount(currentChapter)} answered`;
}

function selectOption(ci, qi, oi){
  if(answers[ci][qi] !== undefined) return; // already answered, lock it
  answers[ci][qi] = oi;
  renderQuestionCard(ci, qi);
  renderScorebar();
  renderNav();
}

function renderQuestionCard(ci, qi){
  const card = document.getElementById(`qcard-${ci}-${qi}`);
  if(!card) return;
  const q = CHAPTERS[ci].questions[qi];
  const chosen = answers[ci][qi];
  const optsWrap = card.querySelector('.opts');
  optsWrap.innerHTML = '';
  q.options.forEach((optText, oi) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.disabled = chosen !== undefined;
    let label = optText;
    if(chosen !== undefined){
      if(oi === q.correct){
        b.classList.add('correct');
        label += '<span class="tag">✓ Correct</span>';
      } else if(oi === chosen){
        b.classList.add('incorrect');
        label += '<span class="tag">✗ Your answer</span>';
      }
    }
    b.innerHTML = label;
    b.onclick = () => selectOption(ci, qi, oi);
    optsWrap.appendChild(b);
  });
  const exp = card.querySelector('.explain');
  if(chosen !== undefined){
    exp.classList.add('show');
    exp.innerHTML = `<b>${chosen===q.correct ? '✅ Correct — ' : '❌ Not quite — '}</b>${q.exp}`;
  } else {
    exp.classList.remove('show');
    exp.innerHTML = '';
  }
}

function renderChapter(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const c = CHAPTERS[currentChapter];

  const titleEl = document.createElement('h2');
  titleEl.className = 'chapter-title';
  titleEl.textContent = c.title;
  main.appendChild(titleEl);

  const prog = document.createElement('div');
  prog.className = 'chapter-progress';
  prog.id = 'chapterProgressText';
  main.appendChild(prog);

  c.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = `qcard-${currentChapter}-${qi}`;
    card.innerHTML = `
      <div class="qnum">Question ${qi+1} of ${c.questions.length}</div>
      <div class="qtext">${q.q}</div>
      <div class="opts"></div>
      <div class="explain"></div>
    `;
    main.appendChild(card);
    renderQuestionCard(currentChapter, qi);
  });

  const navBtns = document.createElement('div');
  navBtns.className = 'chapter-nav-buttons';
  const prevBtn = document.createElement('button');
  prevBtn.className = 'navbtn secondary';
  prevBtn.textContent = '← Previous chapter';
  prevBtn.disabled = currentChapter === 0;
  prevBtn.onclick = () => { currentChapter--; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); };
  const nextBtn = document.createElement('button');
  nextBtn.className = 'navbtn';
  nextBtn.textContent = currentChapter === CHAPTERS.length-1 ? 'Last chapter' : 'Next chapter →';
  nextBtn.disabled = currentChapter === CHAPTERS.length-1;
  nextBtn.onclick = () => { currentChapter++; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); };
  navBtns.appendChild(prevBtn);
  navBtns.appendChild(nextBtn);
  main.appendChild(navBtns);

  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.textContent = 'Tap any option — the correct answer and explanation appear immediately.';
  main.appendChild(hint);

  updateProgressText();
}

function updateProgressText(){
  const el = document.getElementById('chapterProgressText');
  if(!el) return;
  const answered = chapterAnsweredCount(currentChapter);
  const total = CHAPTERS[currentChapter].questions.length;
  const correct = chapterCorrectCount(currentChapter);
  el.textContent = answered === total
    ? `Chapter complete — ${correct} / ${total} correct`
    : `${answered} / ${total} answered in this chapter`;
}

function renderAll(){
  renderNav();
  renderChapter();
  renderScorebar();
}

document.getElementById('resetBtn').onclick = () => {
  if(!confirm('Reset all your answers across all 30 chapters?')) return;
  answers.forEach(chArr => chArr.fill(undefined));
  renderAll();
};

renderAll();
</script>
</body>
</html>
