<style>
:root{
  --bg:#faf8f4;
  --card:#ffffff;
  --ink:#232323;
  --ink-soft:#55524d;
  --rule:#e4ddd0;
  --accent:#0f6b5c;

  --red:#a63d3d;

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;

  color:var(--ink);

}

header.masthead{
  padding:18px 18px 14px;
  border-bottom:1px solid var(--rule);

  position:sticky; top:0; z-index:20;
}
header.masthead h1{font-size:1.25rem; font-weight:700;}
header.masthead p{margin:4px 0 0; color:var(--ink-soft); font-size:.82rem;}

.scorebar{
  display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap;
}
.score-pill{
  background:var(--accent); color:#fff; border-radius:20px; padding:5px 12px;

}

.reset-btn{
  margin-left:auto; background:none; border:1px solid var(--rule); color:var(--ink-soft);
  border-radius:20px; padding:5px 12px; font-size:.76rem; font-weight:600; cursor:pointer;
}
.reset-btn:active{ background:var(--tab-bg); }

nav.chapter-nav{
  display:flex; gap:6px; overflow-x:auto; padding:10px 14px;
  background:var(--tab-bg); border-bottom:2px solid var(--accent);
  -webkit-overflow-scrolling:touch; scrollbar-width:thin;
}
nav.chapter-nav::-webkit-scrollbar{height:5px;}
nav.chapter-nav::-webkit-scrollbar-thumb{background:#c9bfa8; border-radius:4px;}
.chnav-btn{
  flex:0 0 auto; padding:7px 13px; border-radius:16px; background:#fff;
  border:1px solid var(--rule); font-size:.78rem; font-weight:600; color:var(--ink);
  cursor:pointer; white-space:nowrap; position:relative;
}
.chnav-btn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
.chnav-btn .dot{
  display:inline-block; width:7px; height:7px; border-radius:50%; margin-left:6px;
  background:#cfead f; vertical-align:middle;
}

main{max-width:720px; margin:0 auto; padding:18px 14px 70px;}

.chapter-title{
  font-size:1.3rem; border-bottom:3px solid var(--accent); padding-bottom:8px; margin-bottom:4px;
}
.chapter-progress{ color:var(--ink-soft); font-size:.82rem; margin-bottom:16px; }

.qcard{
  background:var(--card); border:1px solid var(--rule); border-radius:10px;
  padding:16px; margin-bottom:16px; box-shadow:var(--shadow);
}
.qnum{
  font-family:'JetBrains Mono',monospace; font-size:.72rem; font-weight:700;
  color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;
}
.qtext{ font-size:1rem; font-weight:600; color:#16352f; margin-bottom:12px; }

.opt-btn{
  display:block; width:100%; text-align:left; background:#fff; border:1.5px solid var(--rule);
  border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:.92rem; color:var(--ink);
  cursor:pointer; font-family:'Inter'; transition:background .1s, border-color .1s;
}
.opt-btn:active{ background:var(--tab-bg); }
.opt-btn.correct{ background:var(--green-soft); border-color:var(--green); font-weight:600; }
.opt-btn.incorrect{ background:var(--red-soft); border-color:var(--red); font-weight:600; }
.opt-btn.reveal-correct{ background:var(--green-soft); border-color:var(--green); }
.opt-btn[disabled]{ cursor:default; }
.opt-btn .tag{ float:right; font-size:.78rem; font-weight:700; }
.opt-btn.correct .tag{ color:var(--green); }
.opt-btn.incorrect .tag{ color:var(--red); }

.explain{
  margin-top:10px; padding:10px 12px; border-radius:8px; font-size:.86rem;
  background:var(--gold-soft); border:1px solid #e8d2a3; display:none;
}
.explain.show{ display:block; }
.explain b{ color:var(--gold); }

.chapter-nav-buttons{
  display:flex; justify-content:space-between; margin-top:8px; gap:10px;
}
.navbtn{
  flex:1; background:var(--accent); color:#fff; border:none; border-radius:8px;
  padding:12px; font-size:.9rem; font-weight:700; cursor:pointer;
}
.navbtn.secondary{ background:#fff; color:var(--accent); border:1.5px solid var(--accent); }
.navbtn:disabled{ opacity:.4; }

.hint{ font-size:.74rem; color:var(--ink-soft); text-align:center; margin-top:10px; font-style:italic; }
</style>

<script id="quiz-data" type="application/json">[{"title": "1. Introduction to Geography & Geological Time Scale", "questions": [{"q": "The word 'Geography' derives from Greek words meaning:", "options": ["Study of stars", "To describe the earth", "Study of rocks", "Study of life"], "correct": 1, "exp": "Geography comes from Greek 'geo' (earth) + 'graphien' (to describe) \u2014 literally 'to describe the earth'."}, {"q": "Geography is broadly divided into which two branches?", "options": ["Physical Geography and Human Geography", "Ancient Geography and Modern Geography", "World Geography and Regional Geography", "Political Geography and Economic Geography"], "correct": 0, "exp": "Geography's two broad branches are Physical Geography (landforms, climate, oceans) and Human Geography (population, settlements, economy)."}, {"q": "What is the correct order of geological time units, from largest to smallest?", "options": ["Periods \u2192 Eons \u2192 Eras \u2192 Epochs", "Eons \u2192 Eras \u2192 Periods \u2192 Epochs", "Eras \u2192 Eons \u2192 Epochs \u2192 Periods", "Epochs \u2192 Periods \u2192 Eras \u2192 Eons"], "correct": 1, "exp": "Earth's 4.6-billion-year history is divided, largest to smallest, into Eons \u2192 Eras \u2192 Periods \u2192 Epochs."}, {"q": "What is the correct order of Earth's Eons, oldest to newest?", "options": ["Archean \u2192 Hadean \u2192 Proterozoic \u2192 Phanerozoic", "Hadean \u2192 Archean \u2192 Proterozoic \u2192 Phanerozoic", "Hadean \u2192 Proterozoic \u2192 Archean \u2192 Phanerozoic", "Phanerozoic \u2192 Proterozoic \u2192 Archean \u2192 Hadean"], "correct": 1, "exp": "The Eons, oldest to newest, are: Hadean \u2192 Archean \u2192 Proterozoic \u2192 Phanerozoic."}, {"q": "The Phanerozoic Eon (the eon of 'visible life') is divided into which three Eras?", "options": ["Paleozoic \u2192 Mesozoic \u2192 Cenozoic", "Hadean \u2192 Archean \u2192 Proterozoic", "Jurassic \u2192 Triassic \u2192 Cretaceous", "Cenozoic \u2192 Mesozoic \u2192 Paleozoic"], "correct": 0, "exp": "The Phanerozoic Eon has 3 Eras, oldest to newest: Paleozoic \u2192 Mesozoic \u2192 Cenozoic \u2014 we currently live in the Cenozoic."}, {"q": "Which era is known as the 'Age of Reptiles/Dinosaurs'?", "options": ["Paleozoic", "Mesozoic", "Cenozoic", "Proterozoic"], "correct": 1, "exp": "The Mesozoic Era (252\u201366 mya) is called the Age of Reptiles/Dinosaurs; it ended with a mass extinction 66 mya caused by an asteroid impact."}, {"q": "The Cenozoic Era (66 mya\u2013present), often called the 'Age of Mammals', includes which period in which humans arose?", "options": ["Jurassic Period", "Cretaceous Period", "Quaternary Period", "Triassic Period"], "correct": 2, "exp": "The Cenozoic Era is the Age of Mammals and includes the Quaternary Period, during which humans arose."}, {"q": "The Paleozoic Era (541\u2013252 mya) is chiefly marked by the appearance of:", "options": ["Dinosaurs and reptiles", "First fish, land plants, and amphibians", "Modern mammals and birds", "The first humans"], "correct": 1, "exp": "The Paleozoic Era's key feature was the appearance of the first fish, land plants, and amphibians."}, {"q": "The Mesozoic Era ended 66 million years ago due to:", "options": ["A supervolcano eruption", "A mass extinction caused by an asteroid impact", "Gradual climate cooling only", "A collision between tectonic plates"], "correct": 1, "exp": "The Mesozoic Era ended with a mass extinction 66 mya, caused by an asteroid impact \u2014 this also ended the age of dinosaurs."}, {"q": "Which theory explains Earth's formation as the gradual sticking together of dust and gas particles orbiting the young Sun?", "options": ["Big Bang Theory", "Nebular Hypothesis", "Accretion Theory", "Continental Drift Theory"], "correct": 2, "exp": "The Accretion Theory describes Earth forming through the gradual accumulation (sticking together) of dust and gas particles orbiting the young Sun."}, {"q": "Who proposed the Big Bang Theory of the universe's origin?", "options": ["Alfred Wegener", "Edwin Hubble", "Georges Lema\u00eetre", "Immanuel Kant"], "correct": 2, "exp": "Georges Lema\u00eetre proposed the Big Bang Theory \u2014 the universe began ~13.8 billion years ago from an extremely dense, hot point and has been expanding ever since (evidence: redshift of galaxies, observed by Edwin Hubble)."}, {"q": "Which theory explains the origin of the solar system as a rotating cloud of gas and dust collapsing under gravity?", "options": ["Big Bang Theory", "Accretion Theory", "Nebular Hypothesis (Kant-Laplace)", "Continental Drift Theory"], "correct": 2, "exp": "The Nebular Hypothesis (Kant-Laplace) holds that the solar system formed from a rotating nebula (cloud of gas and dust) that collapsed under gravity."}]}, {"title": "2. The Earth & The Universe", "questions": [{"q": "What is the correct order of planets outward from the Sun?", "options": ["Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune", "Mercury, Earth, Venus, Mars, Jupiter, Saturn, Neptune, Uranus", "Venus, Mercury, Earth, Mars, Saturn, Jupiter, Uranus, Neptune", "Mercury, Venus, Mars, Earth, Jupiter, Saturn, Uranus, Neptune"], "correct": 0, "exp": "The correct order from the Sun is: Mercury \u2192 Venus \u2192 Earth \u2192 Mars \u2192 Jupiter \u2192 Saturn \u2192 Uranus \u2192 Neptune (mnemonic: 'My Very Educated Mother Just Served Us Nachos')."}, {"q": "Which of these are classified as Inner/Terrestrial (rocky) planets?", "options": ["Jupiter, Saturn, Uranus, Neptune", "Mercury, Venus, Earth, Mars", "Earth, Mars, Jupiter, Saturn", "Mercury, Venus, Jupiter, Neptune"], "correct": 1, "exp": "Mercury, Venus, Earth, and Mars are the Inner/Terrestrial (rocky) planets; Jupiter, Saturn, Uranus, and Neptune are the Outer/Jovian (gas/ice giant) planets."}, {"q": "Which is the largest planet in the solar system?", "options": ["Saturn", "Jupiter", "Neptune", "Earth"], "correct": 1, "exp": "Jupiter is the largest planet in the solar system."}, {"q": "Which is the smallest planet in the solar system?", "options": ["Mars", "Mercury", "Venus", "Pluto"], "correct": 1, "exp": "Mercury is the smallest planet in the solar system. (Pluto is no longer classified as a planet.)"}, {"q": "Why is Venus the hottest planet, despite Mercury being closer to the Sun?", "options": ["It has the shortest day", "Its thick atmosphere causes an intense greenhouse effect", "It is the largest terrestrial planet", "It is closest to the asteroid belt"], "correct": 1, "exp": "Venus is the hottest planet because its thick atmosphere traps heat via an intense greenhouse effect, even though Mercury is closer to the Sun."}, {"q": "Mars is called the 'Red Planet' because of:", "options": ["Its thick red clouds", "Iron oxide (rust) on its surface", "Reflected sunlight from Jupiter", "Its red-coloured rings"], "correct": 1, "exp": "Mars appears red due to iron oxide (rust) covering its surface."}, {"q": "Which planet has the fastest rotation (shortest day), at around 10 hours?", "options": ["Saturn", "Jupiter", "Earth", "Mercury"], "correct": 1, "exp": "Jupiter has the fastest rotation among the planets, completing a rotation in about 10 hours."}, {"q": "Which planet has the slowest rotation, with a day longer than its own year?", "options": ["Mercury", "Mars", "Venus", "Uranus"], "correct": 2, "exp": "Venus rotates so slowly that its day (243 Earth days) is longer than its year \u2014 the slowest rotation and longest day of any planet."}, {"q": "Venus is also known by which nicknames due to its visibility in the sky?", "options": ["'Red Planet'", "'Morning Star' / 'Evening Star'", "'Ringed Planet'", "'Blue Planet'"], "correct": 1, "exp": "Venus is called the 'Morning Star' or 'Evening Star' because of its brightness and visibility near sunrise/sunset."}, {"q": "Which planet has the most prominent ring system?", "options": ["Jupiter", "Saturn", "Uranus", "Neptune"], "correct": 1, "exp": "Saturn has the most prominent ring system, though Jupiter, Uranus, and Neptune also have rings."}, {"q": "Which planet currently holds the record for the most moons (146+), surpassing Jupiter?", "options": ["Jupiter", "Saturn", "Uranus", "Neptune"], "correct": 1, "exp": "Saturn now holds the record for the most moons (146+), having surpassed Jupiter."}, {"q": "Ceres, the largest object in the asteroid belt, is classified as a:", "options": ["Moon of Mars", "Dwarf planet", "Comet", "Meteoroid"], "correct": 1, "exp": "Ceres is the largest asteroid/object in the asteroid belt and is classified as a dwarf planet."}, {"q": "Mars's two small, irregularly shaped moons \u2014 believed to be captured asteroids \u2014 are named:", "options": ["Titan and Triton", "Phobos and Deimos", "Io and Europa", "Ganymede and Callisto"], "correct": 1, "exp": "Mars's two moons, Phobos and Deimos, are small and irregular, believed to be captured asteroids."}, {"q": "In 2006, the IAU reclassified Pluto as a:", "options": ["Terrestrial planet", "Jovian planet", "Dwarf planet", "Asteroid"], "correct": 2, "exp": "Pluto was reclassified as a dwarf planet in 2006 by the IAU because it has not cleared its orbital neighbourhood. The five recognised dwarf planets are Ceres, Pluto, Haumea, Makemake and Eris."}, {"q": "Which of the following is NOT one of the 5 recognised dwarf planets?", "options": ["Haumea", "Makemake", "Eris", "Titan"], "correct": 3, "exp": "The 5 recognised dwarf planets are Ceres, Pluto, Haumea, Makemake, and Eris. Titan is actually a moon of Saturn, not a dwarf planet."}, {"q": "The Sun is composed mainly of which two elements?", "options": ["Oxygen and Nitrogen", "Hydrogen and Helium", "Carbon and Helium", "Hydrogen and Oxygen"], "correct": 1, "exp": "The Sun is composed of roughly Hydrogen ~70% and Helium ~26.5%, with other elements making up the remaining ~3.5%; its diameter is about 109 times Earth's."}, {"q": "Sunspots vary in a solar cycle of approximately:", "options": ["5 years", "11 years", "20 years", "50 years"], "correct": 1, "exp": "Sunspots \u2014 cooler, dark patches on the Sun's surface \u2014 vary in an 11-year solar cycle."}, {"q": "Solar flares and Coronal Mass Ejections (CMEs) can cause geomagnetic storms, which may disrupt:", "options": ["Only ocean tides", "GPS, power grids, and submarine cables", "Only the Moon's orbit", "The Coriolis effect"], "correct": 1, "exp": "Solar flares/CMEs are huge bursts of radiation/particles from the Sun's corona that cause geomagnetic storms, disrupting GPS, power grids, and submarine cables/pipelines via geomagnetically induced currents."}, {"q": "What is the correct life-cycle sequence of a Sun-like star?", "options": ["Nebula \u2192 Red Giant \u2192 Main Sequence \u2192 White Dwarf", "Nebula \u2192 Protostar \u2192 Main Sequence \u2192 Red Giant \u2192 White Dwarf", "Protostar \u2192 White Dwarf \u2192 Main Sequence \u2192 Red Giant", "Main Sequence \u2192 Nebula \u2192 Protostar \u2192 Red Giant"], "correct": 1, "exp": "A Sun-like star's life cycle: Nebula \u2192 Protostar \u2192 Main Sequence (fuses H\u2192He for most of its life) \u2192 Red Giant \u2192 White Dwarf."}, {"q": "Our galaxy, the Milky Way, is classified as which type of galaxy?", "options": ["Elliptical", "Irregular", "Spiral", "Lenticular"], "correct": 2, "exp": "The Milky Way is a Spiral galaxy (with distinct arms). Other galaxy types include Elliptical, Irregular (no defined shape, active star formation), and Lenticular."}, {"q": "A comet develops a visible tail when nearing the Sun because:", "options": ["Solar wind pushes its rocky core apart", "Heat causes sublimation of its icy material, releasing gas and dust", "It collides with asteroids", "Its orbit becomes circular"], "correct": 1, "exp": "Comets are icy bodies; as they near the Sun, heat causes sublimation (ice turning to gas), releasing gas and dust that form the visible tail \u2014 e.g. comet C/2020 F3 (NEOWISE)."}, {"q": "The Asteroid Belt, home to most asteroids and meteoroids, is located between which two planets?", "options": ["Earth and Mars", "Mars and Jupiter", "Jupiter and Saturn", "Venus and Earth"], "correct": 1, "exp": "The Asteroid Belt lies between Mars and Jupiter and contains most of the solar system's asteroids and meteoroids."}, {"q": "A meteoroid that survives its fiery passage through the atmosphere and reaches the ground is called a:", "options": ["Meteor", "Meteorite", "Comet", "Exoplanet"], "correct": 1, "exp": "A meteoroid burning up in the atmosphere is called a 'meteor' (shooting star); if it reaches the ground, it is called a meteorite."}, {"q": "An 'exoplanet' refers to:", "options": ["Any dwarf planet in our solar system", "A planet orbiting a star outside our solar system", "A moon that has broken free of its orbit", "Any planet beyond Neptune"], "correct": 1, "exp": "An exoplanet is a planet that orbits a star outside our own solar system."}, {"q": "2024 PT5 became notable in 2024 as a:", "options": ["Newly discovered dwarf planet", "Temporary 'mini-moon' that briefly orbited Earth", "New comet visible from Earth", "New moon of Mars"], "correct": 1, "exp": "2024 PT5 was a temporary 'mini-moon' that briefly orbited Earth for about two months in 2024."}, {"q": "Earth is called the 'Blue Planet' because:", "options": ["Of its blue-tinted atmosphere", "About 71% of its surface is water", "It reflects blue light from the Sun", "Its poles appear blue from space"], "correct": 1, "exp": "Earth is called the 'Blue Planet' because about 71% of its surface is covered by water."}, {"q": "Among the planets, Earth is:", "options": ["The largest planet overall", "The densest planet in the solar system", "The smallest terrestrial planet", "The farthest planet from the Sun"], "correct": 1, "exp": "Earth is the densest planet in the solar system; it is the 5th largest planet overall and the largest of the four terrestrial planets."}, {"q": "Earth's average distance from the Sun, defined as 1 Astronomical Unit (AU), is approximately:", "options": ["93,000 km", "1.5 million km", "149.6 million km", "384,000 km"], "correct": 2, "exp": "Earth's average distance from the Sun is about 149.6 million km, defined as 1 Astronomical Unit (AU)."}, {"q": "Of all the water on Earth, approximately what percentage is fresh water?", "options": ["Only about 3%", "About 25%", "About 50%", "About 71%"], "correct": 0, "exp": "Only about 3% of Earth's water is fresh water; the remaining 97% is saline (ocean water)."}, {"q": "Earth's shape \u2014 an oblate spheroid, flattened at the poles and bulging at the equator \u2014 is technically called:", "options": ["Ellipsoid", "Geoid", "Sphere", "Torus"], "correct": 1, "exp": "Earth's shape is called a Geoid ('earth-like shape'), an oblate spheroid caused by centrifugal force and rotation; the equatorial bulge is about 42.72 km."}, {"q": "Earth's rotation on its axis, from West to East, causes:", "options": ["Seasons", "Day and night", "Ocean tides", "Leap years"], "correct": 1, "exp": "Rotation (spin on its own axis, West\u2192East, appearing anti-clockwise viewed from above the North Pole) causes day and night."}, {"q": "Earth's speed of rotation at the equator is approximately:", "options": ["500 km/hr", "1,000 km/hr", "1,674 km/hr", "3,000 km/hr"], "correct": 2, "exp": "Earth's rotational speed at the equator is approximately 1,674 km/hr."}, {"q": "What causes Earth's seasons?", "options": ["Earth's varying distance from the Sun", "The Moon's gravitational pull", "Earth's axial tilt of 23.5\u00b0", "Solar flares"], "correct": 2, "exp": "Seasons are caused by Earth's axial tilt (23.5\u00b0) \u2014 NOT by varying distance from the Sun and NOT by the Moon. This is a commonly tested trap."}, {"q": "Earth's revolution (orbit) around the Sun takes approximately how many days, defining one year?", "options": ["360 days", "364 days", "365.25 days", "366 days"], "correct": 2, "exp": "Earth's revolution around the Sun takes about 365.25 days (1 year); the orbit is elliptical, not circular."}, {"q": "An extra day (February 29) is added every four years in a Leap Year to correct for:", "options": ["A 0.25 day/year surplus in Earth's revolution", "A leap in Earth's rotation speed", "A shift in the axial tilt", "Differences in time zones"], "correct": 0, "exp": "A Leap Year adds an extra day (Feb 29) every 4 years to correct for the 0.25 day/year surplus from Earth's 365.25-day revolution."}, {"q": "'Perihelion', when Earth is closest to the Sun, occurs around:", "options": ["January 3", "March 21", "July 4", "December 22"], "correct": 0, "exp": "Perihelion (Earth closest to the Sun) occurs around January 3; Aphelion (Earth farthest from the Sun) occurs around July 4."}, {"q": "Which date marks the Summer Solstice (longest day in the Northern Hemisphere)?", "options": ["March 20/21", "June 21", "September 22/23", "December 22"], "correct": 1, "exp": "The Summer Solstice (longest day, N. Hemisphere) falls around June 21; the Winter Solstice (shortest day) falls around December 22."}, {"q": "A Lunar Eclipse occurs during which lunar phase?", "options": ["New Moon", "Full Moon", "First Quarter", "Last Quarter"], "correct": 1, "exp": "A Lunar Eclipse (Earth between Sun and Moon) occurs at Full Moon, while a Solar Eclipse (Moon between Sun and Earth) occurs at New Moon. These are frequently swapped in MCQs."}]}, {"title": "3. Latitudes, Longitudes & Standard Time", "questions": [{"q": "Latitudes are imaginary circles running in which direction, parallel to the Equator?", "options": ["North-South", "East-West", "Diagonal", "They converge at the poles"], "correct": 1, "exp": "Latitudes are imaginary east-west circles parallel to the Equator, used to measure location north or south."}, {"q": "The distance between two successive latitudes is approximately:", "options": ["111 km, and it decreases towards the poles", "111 km, and remains constant everywhere", "70 km, constant everywhere", "It varies with longitude"], "correct": 1, "exp": "Unlike longitudes, the distance between two latitudes is a constant ~111 km everywhere on Earth."}, {"q": "The Equator divides the Earth into which two hemispheres?", "options": ["Eastern and Western Hemisphere", "Northern and Southern Hemisphere", "Torrid and Temperate Hemisphere", "Frigid and Temperate Hemisphere"], "correct": 1, "exp": "The Equator (0\u00b0 latitude, the longest latitude) divides the Earth into the Northern and Southern Hemispheres."}, {"q": "The Sun is directly overhead the Tropic of Cancer (23.5\u00b0N) around which month?", "options": ["December", "March", "June", "September"], "correct": 2, "exp": "The Sun is directly overhead the Tropic of Cancer (23.5\u00b0N) in June, and overhead the Tropic of Capricorn (23.5\u00b0S) in December."}, {"q": "The Arctic Circle and Antarctic Circle are located at approximately which latitude?", "options": ["23.5\u00b0 N/S", "45\u00b0 N/S", "66.5\u00b0 N/S", "90\u00b0 N/S"], "correct": 2, "exp": "The Arctic Circle (66.5\u00b0N) and Antarctic Circle (66.5\u00b0S) are the northernmost and southernmost of the 5 major latitude circles."}, {"q": "The 'Torrid Zone' (Tropics), lying between the Tropic of Cancer and Tropic of Capricorn, is characterised by:", "options": ["Coldest climate with midnight sun", "Mild climate with all four seasons", "The hottest climate, with the sun overhead seasonally", "Permanent polar night"], "correct": 2, "exp": "The Torrid Zone (Tropics), between the Tropic of Cancer and Tropic of Capricorn, is the hottest zone, with the sun directly overhead at different times of year."}, {"q": "The 'Frigid Zones', lying between the poles and the polar circles, are known for:", "options": ["Mild climate with four seasons", "Coldest climate, with midnight sun and polar night", "The hottest climate on Earth", "Heavy monsoon rainfall"], "correct": 1, "exp": "The Frigid Zones (Pole to Polar Circle) are the coldest zones, experiencing the midnight sun and polar night phenomena."}, {"q": "Longitudes are imaginary lines that:", "options": ["Run parallel to the Equator", "Are semi-circles running north-south, converging at the poles", "Are constant in distance from each other everywhere", "Measure north-south position only"], "correct": 1, "exp": "Longitudes are north-south semi-circular lines converging at the poles, used to measure location east or west of the Prime Meridian."}, {"q": "The Prime Meridian (0\u00b0), passing through Greenwich, divides the Earth into which hemispheres?", "options": ["Northern and Southern", "Eastern and Western", "Torrid and Temperate", "Frigid and Temperate"], "correct": 1, "exp": "The Prime Meridian (0\u00b0, Greenwich) splits the Earth into the Eastern and Western Hemispheres."}, {"q": "Unlike latitudes, the distance between two longitudes:", "options": ["Stays constant everywhere", "Decreases towards the poles", "Increases towards the poles", "Is always 111 km"], "correct": 1, "exp": "Unlike latitudes (constant spacing), the distance between longitudes decreases towards the poles, converging to zero at the poles."}, {"q": "Since Earth rotates 360\u00b0 in 24 hours, how many degrees of longitude correspond to a time difference of 1 hour?", "options": ["1\u00b0", "10\u00b0", "15\u00b0", "24\u00b0"], "correct": 2, "exp": "Earth rotates 360\u00b0 in 24 hours, so 15\u00b0 of longitude = 1 hour of time difference (equivalently, 4 minutes per degree)."}, {"q": "The International Date Line (IDL) runs approximately along which longitude?", "options": ["0\u00b0", "90\u00b0", "180\u00b0", "45\u00b0"], "correct": 2, "exp": "The International Date Line runs along the 180\u00b0 longitude, curving near the Bering Strait and Fiji to avoid splitting countries; crossing it changes the date by exactly one day."}, {"q": "If a traveller crosses the International Date Line going from Asia to America (West to East), the date should be:", "options": ["Advanced by one day", "Put back by one day", "Unchanged", "Advanced by two days"], "correct": 1, "exp": "Travelling West\u2192East across the IDL, you subtract a day (put the calendar back); travelling East\u2192West, you add a day."}, {"q": "Indian Standard Time (IST) is based on the longitude:", "options": ["77\u00b030\u2032 E", "82\u00b030\u2032 E", "90\u00b00\u2032 E", "68\u00b07\u2032 E"], "correct": 1, "exp": "IST is based on 82\u00b030\u2032 E longitude, which passes near Mirzapur (Uttar Pradesh), giving IST = GMT + 5:30."}, {"q": "India's longitudinal extent of about 30\u00b0 causes an actual sunrise time difference of approximately how many hours between Arunachal Pradesh and Gujarat?", "options": ["No difference", "About 1 hour", "About 2 hours", "About 4 hours"], "correct": 2, "exp": "India's ~30\u00b0 longitudinal extent causes about a 2-hour actual sunrise difference between Arunachal Pradesh (east) and Gujarat (west), although a single IST is used for uniformity."}, {"q": "How many standard time zones does the world have, given each is 15\u00b0 wide?", "options": ["12", "15", "24", "36"], "correct": 2, "exp": "The world has 24 standard time zones, each 15\u00b0 of longitude wide."}, {"q": "How many time zones does Russia use, historically?", "options": ["5", "9", "11", "15"], "correct": 2, "exp": "Russia historically has 11 time zones (though around 9 are used practically today), while the USA and Canada each use 5 time zones."}]}, {"title": "4. Earth's Magnetism", "questions": [{"q": "Earth's magnetic field is primarily generated by:", "options": ["Radioactive decay in the crust", "Convection currents in the molten outer core (geodynamo effect)", "The Moon's gravitational pull", "Solar wind interaction with the atmosphere"], "correct": 1, "exp": "Earth behaves like a giant bar magnet due to convection currents in the molten iron-nickel outer core \u2014 known as the 'geodynamo' effect."}, {"q": "The magnetosphere is best described as:", "options": ["The layer of the atmosphere containing ozone", "The region around Earth dominated by its magnetic field, shielding it from solar wind and cosmic radiation", "The boundary between the crust and mantle", "The zone where meteors burn up"], "correct": 1, "exp": "The magnetosphere is the region around Earth dominated by its magnetic field; it shields Earth from solar wind and cosmic radiation."}, {"q": "Earth's Magnetic North/South Poles differ from the Geographic North/South Poles because:", "options": ["They are fixed and never move", "Magnetic poles shift over time and are not aligned with geographic poles", "They only exist during geomagnetic storms", "They are located at the equator"], "correct": 1, "exp": "Magnetic poles are not the same as geographic poles, and they shift position over time."}, {"q": "A 'geomagnetic storm' refers to:", "options": ["Regular seasonal changes in Earth's magnetic field", "A temporary disturbance of the magnetosphere caused by solar wind shockwaves/CMEs", "A type of volcanic eruption", "The formation of the Van Allen belts"], "correct": 1, "exp": "A geomagnetic storm is a temporary disturbance of the magnetosphere caused by solar wind shockwaves or CMEs, which can disrupt satellites, GPS, and power grids."}, {"q": "The Aurora Borealis and Aurora Australis are caused by:", "options": ["Volcanic ash in the stratosphere", "Charged solar particles trapped by Earth's magnetic field near the poles", "Reflection of sunlight off polar ice", "Ozone depletion"], "correct": 1, "exp": "Charged solar particles trapped by Earth's magnetic field near the poles create the glowing Aurora Borealis (north) and Aurora Australis (south)."}]}, {"title": "5. Interior of the Earth", "questions": [{"q": "Which of these is a direct source of information about Earth's interior?", "options": ["Seismic waves", "Gravitational studies", "Deep drilling / mining", "Meteorite composition"], "correct": 2, "exp": "Direct sources of information about Earth's interior include mining and deep drilling (and volcanic eruptions/lava). Seismic waves, gravity, magnetism and meteorites are indirect sources."}, {"q": "The deepest borehole drilled into the Earth, the Kola Superdeep Borehole, reaches a depth of approximately:", "options": ["2 km", "6 km", "12 km", "35 km"], "correct": 2, "exp": "The Kola Superdeep Borehole, the deepest direct drilling into Earth, reaches about 12 km \u2014 still far short of even the crust's average thickness variations at depth."}, {"q": "Which seismic wave is the fastest, and can travel through solid, liquid, and gas?", "options": ["S-waves", "P-waves", "Surface (L) waves", "Rayleigh waves"], "correct": 1, "exp": "P-waves (Primary waves) are the fastest seismic body waves and can travel through solids, liquids, and gases, moving with a push-pull motion."}, {"q": "Which seismic wave can travel only through solids, proving the outer core is liquid?", "options": ["P-waves", "S-waves", "Surface (L) waves", "Love waves"], "correct": 1, "exp": "S-waves (Secondary waves) travel only through solids and cannot pass through the liquid outer core \u2014 this is key evidence that the outer core is liquid."}, {"q": "Which type of seismic wave is the slowest, yet the most destructive?", "options": ["P-waves", "S-waves", "Surface waves (L-waves)", "Compressional waves"], "correct": 2, "exp": "Surface waves (L-waves) travel along the Earth's surface; they are the slowest but most destructive of the seismic waves."}, {"q": "Which is the correct order of Earth's layers from surface to centre?", "options": ["Crust \u2192 Outer Core \u2192 Mantle \u2192 Inner Core", "Mantle \u2192 Crust \u2192 Outer Core \u2192 Inner Core", "Crust \u2192 Mantle \u2192 Outer Core \u2192 Inner Core", "Crust \u2192 Mantle \u2192 Inner Core \u2192 Outer Core"], "correct": 2, "exp": "Earth's layered structure from surface to centre is: Crust \u2192 Mantle \u2192 Outer Core (liquid) \u2192 Inner Core (solid)."}, {"q": "SIAL (Silica + Aluminium) and SIMA (Silica + Magnesium) refer to the composition of which layer?", "options": ["Mantle", "Crust (continental and oceanic respectively)", "Outer Core", "Inner Core"], "correct": 1, "exp": "SIAL (continental crust, rich in Silica+Aluminium) and SIMA (oceanic crust, rich in Silica+Magnesium) describe the composition of the Crust, Earth's thinnest layer (0-35 km average)."}, {"q": "The 'asthenosphere', a partly molten layer that is the source of magma, lies within the:", "options": ["Crust", "Mantle", "Outer Core", "Inner Core"], "correct": 1, "exp": "The asthenosphere is a semi-solid, partly molten part of the upper Mantle, and serves as the source of magma."}, {"q": "The Outer Core, extending roughly from 2,900-5,150 km depth, is composed of:", "options": ["Solid iron-nickel", "Liquid iron-nickel, which generates the magnetic field", "Molten silicate rock", "Solid granite"], "correct": 1, "exp": "The Outer Core is liquid iron-nickel, and its convection currents generate Earth's magnetic field (the geodynamo effect)."}, {"q": "Despite extreme heat, the Inner Core remains solid because of:", "options": ["Its low temperature", "Immense pressure", "Its composition of light elements", "Magnetic field effects"], "correct": 1, "exp": "The Inner Core remains solid, despite extreme heat, due to the immense pressure at Earth's centre."}, {"q": "The term 'Barysphere' refers to:", "options": ["The crust", "The core (Earth's heaviest layer)", "The atmosphere", "The lithosphere"], "correct": 1, "exp": "Barysphere refers to the core, the heaviest sphere of the Earth."}, {"q": "The 'Lithosphere' consists of:", "options": ["Only the crust", "The crust plus the uppermost solid mantle, broken into tectonic plates", "The entire mantle", "The outer and inner core together"], "correct": 1, "exp": "The Lithosphere = crust + uppermost solid mantle; it is rigid and broken into the tectonic plates."}, {"q": "How does density change with depth inside the Earth?", "options": ["It decreases with depth", "It stays constant throughout", "It increases with depth, from ~2.7-3 g/cm\u00b3 at the crust to ~13 g/cm\u00b3 at the core", "It fluctuates randomly"], "correct": 2, "exp": "Density increases with depth: Crust ~2.7-3 g/cm\u00b3 increasing to the Core at ~13 g/cm\u00b3."}]}, {"title": "6. Origin & Evolution of Earth + Rocks & Rock Cycle", "questions": [{"q": "Which rock type is formed by the cooling and solidification of magma or lava, and is called the 'primary rock'?", "options": ["Sedimentary", "Metamorphic", "Igneous", "Karst"], "correct": 2, "exp": "Igneous rock, the 'primary rock', forms from cooling and solidification of magma/lava \u2014 e.g. granite (intrusive) and basalt (extrusive)."}, {"q": "Granite is an example of which category of igneous rock?", "options": ["Intrusive (cools below the surface)", "Extrusive (cools on the surface)", "Metamorphic", "Sedimentary"], "correct": 0, "exp": "Granite is an intrusive igneous rock (cools slowly below the surface), while basalt is extrusive (cools quickly on the surface, e.g. from lava)."}, {"q": "Which sedimentary rock may contain fossils and forms through compaction and cementation of sediments?", "options": ["Granite", "Gneiss", "Sandstone", "Basalt"], "correct": 2, "exp": "Sandstone is a sedimentary rock formed by compaction and cementation of sediments; sedimentary rocks are layered/stratified and may contain fossils."}, {"q": "Which of these is an example of a sedimentary rock, often associated with fuel resources?", "options": ["Slate", "Quartzite", "Coal", "Gneiss"], "correct": 2, "exp": "Coal is a sedimentary rock, along with sandstone, limestone, and shale."}, {"q": "Marble is a metamorphic rock formed from which sedimentary rock?", "options": ["Sandstone", "Shale", "Limestone", "Coal"], "correct": 2, "exp": "Marble is formed from limestone under heat and pressure. (Slate forms from shale, and Quartzite forms from sandstone.)"}, {"q": "Which metamorphic rock forms from shale under heat and pressure?", "options": ["Marble", "Slate", "Quartzite", "Gneiss"], "correct": 1, "exp": "Slate is the metamorphic rock formed from shale. (Marble forms from limestone, Quartzite from sandstone.)"}, {"q": "The Rock Cycle mnemonic 'I See Mud' represents which natural transformation order?", "options": ["Igneous \u2192 Sedimentary \u2192 Metamorphic", "Sedimentary \u2192 Igneous \u2192 Metamorphic", "Metamorphic \u2192 Igneous \u2192 Sedimentary", "Igneous \u2192 Metamorphic \u2192 Sedimentary"], "correct": 0, "exp": "'I See Mud' stands for Igneous \u2192 Sedimentary \u2192 Metamorphic, the natural order in the rock transformation cycle before metamorphic rock can melt again into magma."}, {"q": "The process by which heavier materials like iron and nickel sank to Earth's core during its early molten stage is called:", "options": ["Accretion", "Differentiation", "Subduction", "Weathering"], "correct": 1, "exp": "Differentiation is the process where heavier materials (iron, nickel) sank to form Earth's core while lighter materials rose, during the early molten stage of the planet."}, {"q": "Earth's early atmosphere and oceans formed later mainly through:", "options": ["Meteorite bombardment alone", "Volcanic outgassing and cometary/asteroid water delivery", "Photosynthesis by early plants", "Condensation of the solar nebula directly"], "correct": 1, "exp": "Earth's atmosphere and oceans formed through volcanic outgassing and water delivery via comets/asteroids, after the initial molten stage and differentiation."}]}, {"title": "7. Plate Tectonics & Distribution of Oceans/Continents", "questions": [{"q": "Who proposed the Continental Drift Theory in 1912?", "options": ["Alfred Wegener", "Harry Hess", "Charles Darwin", "Georges Lema\u00eetre"], "correct": 0, "exp": "Alfred Wegener proposed the Continental Drift Theory (1912), suggesting all continents were once joined as the supercontinent Pangaea, surrounded by the ocean Panthalassa."}, {"q": "According to the Continental Drift Theory, all continents were once joined together as the supercontinent:", "options": ["Laurasia", "Gondwanaland", "Pangaea", "Eurasia"], "correct": 2, "exp": "Pangaea was the single supercontinent, surrounded by the ocean Panthalassa, that broke apart and drifted into today's continents."}, {"q": "Pangaea first split into which two landmasses?", "options": ["Asia and America", "Laurasia (north) and Gondwanaland (south)", "Eurasia and Africa", "Indian Plate and Pacific Plate"], "correct": 1, "exp": "Pangaea first split into Laurasia (north) and Gondwanaland (south), which later broke further into today's continents."}, {"q": "The Plate Tectonic Theory, developed in the 1960s, states that the lithosphere is broken into rigid plates driven by:", "options": ["Ocean tides", "Mantle convection currents", "The Coriolis force", "Solar radiation"], "correct": 1, "exp": "The Plate Tectonic Theory holds that the lithosphere is broken into rigid tectonic plates floating on the semi-molten asthenosphere, driven by mantle convection currents."}, {"q": "Which of the following is classified as a major tectonic plate?", "options": ["Nazca Plate", "Philippine Plate", "Indian Plate", "Caroline Plate"], "correct": 2, "exp": "The Indian Plate is one of the 7 major tectonic plates (along with Eurasian, Pacific, North American, South American, African, and Antarctic). Nazca, Philippine, Cocos, and Caroline are minor plates."}, {"q": "At a divergent (constructive) plate boundary, what typically forms?", "options": ["Ocean trenches and volcanoes", "Mountains like the Himalayas", "Mid-ocean ridges and rift valleys, with new crust forming", "Major transform-fault earthquakes only"], "correct": 2, "exp": "At divergent (constructive) boundaries, plates move apart, forming mid-ocean ridges and rift valleys as new crust is created (e.g. Mid-Atlantic Ridge)."}, {"q": "The Himalayas were formed due to which type of plate boundary?", "options": ["Divergent", "Convergent", "Transform", "Passive"], "correct": 1, "exp": "The Himalayas formed by convergent (destructive) collision of the Indian Plate with the Eurasian Plate; convergent boundaries also form ocean trenches and volcanoes."}, {"q": "The San Andreas Fault is a classic example of which type of plate boundary?", "options": ["Divergent", "Convergent", "Transform", "Subduction"], "correct": 2, "exp": "The San Andreas Fault is a transform boundary, where plates slide past each other \u2014 no new crust is created or destroyed, but major earthquakes occur."}, {"q": "Before splitting apart, the Indian Plate was once located:", "options": ["North of the equator, near present-day Europe", "South of the equator, and included the present-day Australian plate", "Entirely within the Arctic Circle", "Fused permanently with the Pacific Plate"], "correct": 1, "exp": "The Indian Plate was once south of the equator and much larger, having included the present-day Australian plate, before splitting and moving north to collide with the Eurasian Plate."}, {"q": "The Nazca Plate, which subducts under South America to form the Andes, lies between South America and which other plate?", "options": ["Indian Plate", "Pacific Plate", "African Plate", "Antarctic Plate"], "correct": 1, "exp": "The Nazca Plate lies between South America and the Pacific Plate, subducting under South America to form the Andes mountains."}, {"q": "The Caroline Plate, a minor tectonic plate, is located:", "options": ["Between the Philippine and Indian plates, north of New Guinea", "Between North America and Eurasia", "Beneath the Himalayas", "Along the Mid-Atlantic Ridge"], "correct": 0, "exp": "The Caroline Plate is a minor plate located between the Philippine and Indian plates, north of New Guinea."}, {"q": "Which of the following is NOT typically cited as evidence for plate tectonics/continental drift?", "options": ["Matching coastlines of continents", "Fossil correlation across continents (e.g. Mesosaurus)", "Seafloor spreading and magnetic striping", "Uniform ocean salinity worldwide"], "correct": 3, "exp": "Evidence for plate tectonics includes matching coastlines, fossil correlation (e.g. Mesosaurus), matching rock strata, paleoclimatic evidence, and seafloor spreading with magnetic striping \u2014 not ocean salinity, which is unrelated."}]}, {"title": "8. Earthquakes, Volcanism & Tsunamis", "questions": [{"q": "The point inside the Earth where an earthquake rupture originates is called the:", "options": ["Epicentre", "Focus (Hypocentre)", "Fault plane", "Seismic gap"], "correct": 1, "exp": "The Focus (or Hypocentre) is the point inside the Earth where the earthquake's rupture originates."}, {"q": "The point on Earth's surface directly above the point where an earthquake originates is called the:", "options": ["Focus", "Epicentre", "Hypocentre", "Fault line"], "correct": 1, "exp": "The Epicentre is the point on the surface directly above the Focus (Hypocentre), the point inside the Earth where the rupture originates; it experiences the strongest shaking."}, {"q": "Which scale measures earthquake intensity based on observed damage, rather than magnitude?", "options": ["Richter Scale", "Mercalli Scale", "Beaufort Scale", "Fujita Scale"], "correct": 1, "exp": "The Mercalli Scale measures earthquake intensity/observed damage, while the Richter Scale measures magnitude on a logarithmic scale (each whole number = 10x amplitude)."}, {"q": "Which of India's seismic zones represents the highest earthquake risk, including areas like Kashmir and the Kachchh region?", "options": ["Zone II", "Zone III", "Zone IV", "Zone V"], "correct": 3, "exp": "Zone V represents the highest seismic risk in India (e.g. Kashmir, NE states, Kachchh), while Zone II represents the lowest risk."}, {"q": "Besides natural tectonic causes, which of the following is a man-made trigger of earthquakes?", "options": ["Ocean tides", "Reservoir-induced seismicity and mining", "Solar flares", "Volcanic ash fall"], "correct": 1, "exp": "Man-made triggers of earthquakes include reservoir-induced seismicity (from large dams) and mining activities, in addition to natural causes like plate tectonic movement, volcanic activity, and faulting."}, {"q": "Volcanism refers to the movement of molten material called 'magma' while inside the Earth, and after reaching the surface is called:", "options": ["Ash", "Lava", "Tephra", "Pyroclast"], "correct": 1, "exp": "Molten material is called 'magma' while inside the Earth, and 'lava' once it reaches the surface."}, {"q": "A volcano that is inactive but may erupt again in the future is classified as:", "options": ["Active", "Dormant", "Extinct", "Composite"], "correct": 1, "exp": "A Dormant volcano is currently inactive but may erupt again in the future, unlike an Extinct volcano, which is unlikely ever to erupt again."}, {"q": "A shield volcano, such as those in Hawaii, is characterised by:", "options": ["Steep slopes and explosive eruptions", "Broad, gentle slopes and basaltic lava", "A large collapsed crater only", "Alternating layers of lava and ash"], "correct": 1, "exp": "Shield volcanoes (e.g. Hawaii) have broad, gentle slopes built from basaltic lava, unlike steep, explosive composite/strato volcanoes like Mt. Fuji."}, {"q": "Mt. Fuji is a classic example of which type of volcano?", "options": ["Shield volcano", "Composite/Strato volcano", "Caldera", "Mid-ocean ridge volcano"], "correct": 1, "exp": "Mt. Fuji is a Composite/Strato volcano \u2014 steep-sided, with alternating layers of lava and ash, and typically explosive eruptions."}, {"q": "A large collapsed volcanic crater is known as a:", "options": ["Caldera", "Cirque", "Crater lake only", "Guyot"], "correct": 0, "exp": "A Caldera is a large collapsed crater formed after a volcanic eruption."}, {"q": "The Pacific Ring of Fire is associated with approximately what share of the world's active/dormant volcanoes?", "options": ["25%", "50%", "75%", "90%"], "correct": 2, "exp": "The Pacific Ring of Fire, a horseshoe-shaped zone with many subduction zones, hosts about 75% of the world's active/dormant volcanoes and most earthquakes."}, {"q": "India's only active volcano is located at:", "options": ["Barren Island (Andaman & Nicobar)", "Lakshadweep", "Deccan Plateau", "Kachchh"], "correct": 0, "exp": "Barren Island, in the Andaman & Nicobar Islands, is India's only active volcano."}, {"q": "Tsunamis are most commonly triggered by:", "options": ["Undersea earthquakes", "Full moon tides", "Strong monsoon winds", "Coral reef erosion"], "correct": 0, "exp": "Tsunamis, series of massive ocean waves, are most commonly triggered by undersea earthquakes, though volcanic eruptions or landslides can also cause them."}, {"q": "The 2004 Indian Ocean Tsunami was triggered by:", "options": ["A volcanic eruption in Indonesia", "A massive undersea earthquake off Sumatra", "A landslide in the Andaman Sea", "A cyclone in the Bay of Bengal"], "correct": 1, "exp": "The 2004 Indian Ocean Tsunami (26 December 2004) was triggered by a massive undersea earthquake off Sumatra, devastating the Andaman & Nicobar Islands and coastal areas of India, Sri Lanka, Thailand and Indonesia."}]}, {"title": "9. Endogenic & Exogenic Forces (Geomorphic Processes) + Mountains", "questions": [{"q": "Forces that build up landforms using Earth's internal heat (e.g. mountain building, volcanism) are called:", "options": ["Exogenic forces", "Endogenic forces", "Denudational forces", "Erosional forces"], "correct": 1, "exp": "Endogenic forces, powered by Earth's internal heat, build up landforms through diastrophism and volcanism (mountain building, earthquakes, plate tectonics)."}, {"q": "Exogenic forces, powered by solar energy and gravity, act to:", "options": ["Build up new mountains", "Wear down landforms through weathering and erosion (denudation)", "Generate Earth's magnetic field", "Cause plate tectonic movement"], "correct": 1, "exp": "Exogenic forces act via weathering and erosion (agents like rivers, wind, glaciers, waves) to wear down landforms \u2014 a process called denudation."}, {"q": "The in-situ breakdown of rocks without any transport of material is called:", "options": ["Erosion", "Weathering", "Mass wasting", "Deposition"], "correct": 1, "exp": "Weathering is the in-situ breakdown of rocks with no transport (physical, chemical, or biological); Erosion involves both breakdown and transport by agents like water, wind, ice, or waves."}, {"q": "The downslope movement of weathered material under gravity, such as landslides and soil creep, is called:", "options": ["Erosion", "Mass wasting", "Deposition", "Weathering"], "correct": 1, "exp": "Mass wasting refers to the downslope movement of weathered material under gravity, including landslides and soil creep."}, {"q": "Fold mountains, such as the Himalayas, Alps, and Andes, form due to:", "options": ["Faulting between uplifted blocks", "Compression at convergent plate boundaries", "Accumulation of volcanic material", "Erosion of older plateaus"], "correct": 1, "exp": "Fold mountains form through compression at convergent plate boundaries \u2014 examples include the Himalayas, Alps, and Andes."}, {"q": "Block mountains, such as the Vosges and Black Forest, are formed primarily by:", "options": ["Compression at convergent boundaries", "Faulting \u2014 uplifted blocks between faults (horst)", "Accumulation of volcanic material", "Erosion of plateaus"], "correct": 1, "exp": "Block mountains form by faulting, where an uplifted block between faults (a horst) creates a mountain \u2014 examples include the Vosges, Black Forest, and Satpura in India."}, {"q": "The Aravalli Range in India is an example of which type of mountain?", "options": ["Fold mountain (young)", "Block mountain", "Volcanic mountain", "Residual/Relict mountain"], "correct": 3, "exp": "The Aravalli is the oldest fold mountain range in India, now heavily eroded \u2014 classified as a Residual/Relict mountain formed by erosion of an older mountain range."}, {"q": "Kilimanjaro is an example of which type of mountain?", "options": ["Fold mountain", "Block mountain", "Volcanic mountain", "Residual mountain"], "correct": 2, "exp": "Kilimanjaro, along with Mt. Fuji, is a Volcanic Mountain, formed by the accumulation of volcanic material."}]}, {"title": "10. Landforms and Their Evolution", "questions": [{"q": "In the youthful (upper course) stage of a river, which landforms are typically found?", "options": ["Meanders and ox-bow lakes", "V-shaped valleys, gorges, waterfalls, and potholes", "Deltas and sand bars", "Levees and floodplains"], "correct": 1, "exp": "The youthful (upper course) stage of a river produces erosional landforms like V-shaped valleys, gorges, waterfalls, rapids, and potholes."}, {"q": "Levees and flood plains are depositional landforms typical of which stage of a river's course?", "options": ["Youthful (upper course)", "Mature (middle course)", "Old age (lower course)", "None \u2014 they are erosional, not depositional"], "correct": 1, "exp": "Levees and flood plains are depositional landforms of the Mature (middle course) stage, where meanders also begin to form."}, {"q": "An ox-bow lake is formed when:", "options": ["A meander loop is cut off from the main river channel", "A glacier melts and leaves a depression", "Wind erodes a hollow in the desert", "Limestone dissolves to form a sinkhole"], "correct": 0, "exp": "An ox-bow lake forms when a meander loop is cut off from the main river channel, typical of the old-age (lower course) stage of a river."}, {"q": "The Sunderbans, the world's largest delta, is formed at the mouth of which river system?", "options": ["Indus", "Ganga-Brahmaputra", "Godavari-Krishna", "Narmada-Tapi"], "correct": 1, "exp": "The Sunderbans is the delta of the Ganga-Brahmaputra river system, and is the world's largest delta \u2014 a depositional fluvial landform."}, {"q": "Arid and desert landforms are shaped mainly by which agent?", "options": ["River (fluvial) action", "Wind (aeolian) action, plus occasional flash floods", "Glacial ice movement", "Wave action"], "correct": 1, "exp": "Arid/desert landforms are shaped mainly by wind (aeolian) action, along with occasional flash floods."}, {"q": "Mushroom rocks (Zeugen), Yardangs, and Inselbergs are examples of which type of desert landform?", "options": ["Depositional", "Erosional", "Fluvial", "Glacial"], "correct": 1, "exp": "Mushroom rocks (Zeugen), Yardangs, Inselbergs, and Deflation hollows/Blowouts are erosional desert (arid) landforms."}, {"q": "Crescent-shaped sand dunes formed transverse to wind direction are called:", "options": ["Seif dunes", "Barchans", "Yardangs", "Loess"], "correct": 1, "exp": "Barchans are crescent-shaped sand dunes formed transverse (perpendicular) to wind direction; Seif dunes are longitudinal, running parallel to the wind."}, {"q": "A 'Playa' is best described as:", "options": ["A permanent freshwater lake in mountains", "A shallow temporary desert lake that leaves salt deposits after evaporating", "A river delta", "A coastal lagoon"], "correct": 1, "exp": "A Playa is a shallow, temporary desert lake \u2014 after the water evaporates, it leaves salt deposits, a key inland-drainage feature of deserts."}, {"q": "Sea cliffs, sea caves, sea arches, and stacks are marine (coastal) landforms formed by which process?", "options": ["Deposition", "Erosion", "Weathering only", "Glaciation"], "correct": 1, "exp": "Sea cliffs, sea caves, sea arches, and stacks are erosional marine landforms, shaped by wave action, tides, and currents. (Beaches, spits, bars, tombolos, and lagoons are depositional marine landforms.)"}, {"q": "A 'tombolo', a depositional marine landform, connects:", "options": ["Two river banks", "An island to the mainland (or another island) via a sand/shingle bar", "A cave to a cliff", "Two glacial valleys"], "correct": 1, "exp": "A tombolo is a depositional landform where a sand or shingle bar connects an island to the mainland or another island."}, {"q": "A cirque, an ar\u00eate, and a horn (e.g. the Matterhorn) are all landforms created by:", "options": ["Rivers", "Wind", "Glaciers", "Waves"], "correct": 2, "exp": "Cirques (armchair-shaped hollows), ar\u00eates (sharp ridges) and horns (pyramidal peaks like the Matterhorn) are all erosional landforms created by glaciers."}, {"q": "Moraines, eskers, drumlins, and outwash plains are all examples of which type of glacial landform?", "options": ["Erosional", "Depositional", "Fluvial", "Aeolian"], "correct": 1, "exp": "Moraines (lateral, medial, terminal, ground), eskers, drumlins, and outwash plains are all depositional glacial landforms, formed by material deposited by moving ice."}, {"q": "Karst topography develops through chemical weathering (solution) of which type of rock?", "options": ["Granite", "Basalt", "Limestone", "Sandstone"], "correct": 2, "exp": "Karst topography forms through carbonation \u2014 chemical weathering by slightly acidic water \u2014 mainly on soluble limestone; the name comes from the Karst region of Slovenia."}, {"q": "A cave feature that hangs from the ceiling is called a:", "options": ["Stalagmite", "Stalactite", "Doline", "Sinkhole"], "correct": 1, "exp": "A Stalactite hangs from the cave ceiling ('hold on Tight'), while a Stalagmite grows up from the cave floor (Ground). Where the two meet, a pillar forms."}, {"q": "Famous karst topography in India, including limestone caves near Cherrapunji/Mawsynram, is found in which state?", "options": ["Meghalaya", "Rajasthan", "Kerala", "Odisha"], "correct": 0, "exp": "Meghalaya contains India's famous karst areas, including limestone caves near Cherrapunji/Mawsynram."}, {"q": "'Sinkholes' (dolines) and 'limestone pavements' are examples of which category of karst feature?", "options": ["Underground features", "Surface features", "Fluvial features", "Coastal features"], "correct": 1, "exp": "Sinkholes (dolines), karst windows, and limestone pavements are surface features of karst topography, while caves, stalactites, stalagmites, and pillars are underground features."}]}, {"title": "11. Composition & Structure of Atmosphere", "questions": [{"q": "Approximately what percentage of the atmosphere's mass lies within 32 km of the Earth's surface?", "options": ["50%", "75%", "99%", "100% is evenly distributed"], "correct": 2, "exp": "About 99% of the atmosphere's mass lies within 32 km of the Earth's surface."}, {"q": "Nitrogen and Oxygen make up approximately what share of the atmosphere's composition?", "options": ["Nitrogen ~50%, Oxygen ~40%", "Nitrogen ~78%, Oxygen ~21%", "Nitrogen ~21%, Oxygen ~78%", "Nitrogen ~90%, Oxygen ~5%"], "correct": 1, "exp": "The atmosphere is composed of roughly Nitrogen ~78% and Oxygen ~21%, plus Argon (~0.93%), CO\u2082 (~0.04%), and trace gases."}, {"q": "Which gas is the main contributor to the greenhouse effect because it absorbs outgoing longwave terrestrial radiation?", "options": ["Nitrogen", "Oxygen", "Carbon dioxide", "Argon"], "correct": 2, "exp": "CO\u2082 is transparent to incoming shortwave solar radiation but absorbs outgoing longwave terrestrial radiation, making it the main greenhouse gas."}, {"q": "The ozone layer, which absorbs harmful UV radiation, is mainly concentrated in the:", "options": ["Troposphere", "Stratosphere", "Mesosphere", "Exosphere"], "correct": 1, "exp": "The ozone (O\u2083) layer is concentrated in the Stratosphere (roughly 10\u201350 km up), acting as Earth's 'sunscreen' against harmful UV radiation."}, {"q": "Water vapour content in the atmosphere can reach up to what percentage by volume in humid tropics?", "options": ["Less than 1%", "Up to 4%", "Up to 25%", "Up to 50%"], "correct": 1, "exp": "Water vapour can reach up to about 4% of air by volume in humid tropics, but less than 1% in deserts/polar regions; it is found only up to about 90 km altitude."}, {"q": "Above approximately what altitude does oxygen become negligible in the atmosphere?", "options": ["10 km", "32 km", "80 km", "120 km"], "correct": 3, "exp": "Oxygen becomes negligible above about 120 km altitude."}, {"q": "Dust particles in the atmosphere (sea salt, soil, smoke, ash, pollen) act as:", "options": ["Reflectors of radio waves", "Hygroscopic nuclei for cloud/condensation", "Sources of the greenhouse effect", "Sources of ozone"], "correct": 1, "exp": "Dust particles act as hygroscopic nuclei, around which water vapour condenses to form clouds/precipitation."}, {"q": "Almost all weather phenomena occur in which layer of the atmosphere?", "options": ["Stratosphere", "Troposphere", "Mesosphere", "Thermosphere"], "correct": 1, "exp": "The Troposphere (0\u201313 km average) is where nearly all weather occurs; temperature falls about 1\u00b0C per 165 m of altitude here."}, {"q": "Which layer of the atmosphere is ideal for aircraft due to its stability and lack of turbulence?", "options": ["Troposphere", "Stratosphere", "Mesosphere", "Thermosphere"], "correct": 1, "exp": "The Stratosphere (13-50 km), which contains the ozone layer, is stable with no turbulence, making it ideal for aircraft."}, {"q": "Which layer of the atmosphere is the coldest, reaching temperatures as low as -100\u00b0C, and is where meteors burn up?", "options": ["Stratosphere", "Mesosphere", "Thermosphere", "Exosphere"], "correct": 1, "exp": "The Mesosphere (50\u201380 km) is the coldest atmospheric layer, dropping to about -100\u00b0C; meteors burn up here."}, {"q": "Which layer of the atmosphere includes the ionosphere and has temperature rising with height, reflecting radio waves?", "options": ["Stratosphere", "Mesosphere", "Thermosphere", "Exosphere"], "correct": 2, "exp": "The Thermosphere (80-400+ km), which includes the ionosphere (80-400 km), has rising temperatures with height, and its ionosphere reflects radio waves."}, {"q": "The outermost layer of the atmosphere, which merges into outer space, is the:", "options": ["Thermosphere", "Ionosphere", "Exosphere", "Mesopause"], "correct": 2, "exp": "The Exosphere is the outermost, extremely rarefied layer that merges into outer space, beyond the thermosphere."}, {"q": "The boundary between the troposphere and stratosphere is called the:", "options": ["Mesopause", "Tropopause", "Stratopause", "Thermocline"], "correct": 1, "exp": "The Tropopause is the boundary between the troposphere and stratosphere, at roughly -80\u00b0C over the equator and -45\u00b0C over the poles."}, {"q": "Geographers mainly focus on which two layers of the atmosphere, since these directly affect climate/weather and UV protection?", "options": ["Mesosphere and Thermosphere", "Troposphere and Stratosphere", "Exosphere and Ionosphere", "Stratosphere and Exosphere"], "correct": 1, "exp": "Geographers mainly focus on the Troposphere and Stratosphere, since these two layers directly affect weather/climate and UV protection."}]}, {"title": "12. Winds (Planetary & Local), Temperature & Humidity", "questions": [{"q": "Trade winds blow in the region:", "options": ["0\u00b0-30\u00b0 N/S, towards the Equator", "30\u00b0-60\u00b0 N/S", "60\u00b0-90\u00b0 N/S", "Only at the poles"], "correct": 0, "exp": "Trade winds blow between 0\u00b0-30\u00b0 N/S towards the Equator \u2014 NE trades in the Northern Hemisphere and SE trades in the Southern Hemisphere."}, {"q": "The Westerlies, blowing from the subtropical high to the sub-polar low, are found between:", "options": ["0\u00b0-30\u00b0 N/S", "30\u00b0-60\u00b0 N/S", "60\u00b0-90\u00b0 N/S", "Only over oceans"], "correct": 1, "exp": "The Westerlies blow between 30\u00b0-60\u00b0 N/S; in the Southern Hemisphere they are nicknamed the 'Roaring Forties'."}, {"q": "Polar Easterlies, cold and dry winds blowing from the poles, are found between:", "options": ["0\u00b0-30\u00b0 N/S", "30\u00b0-60\u00b0 N/S", "60\u00b0-90\u00b0 N/S", "Equatorial regions only"], "correct": 2, "exp": "Polar Easterlies are cold, dry winds found between 60\u00b0-90\u00b0 N/S, blowing from the poles."}, {"q": "The force that deflects winds to the right in the Northern Hemisphere and to the left in the Southern Hemisphere is called:", "options": ["Gravitational force", "Coriolis force", "Centripetal force", "Pressure gradient force"], "correct": 1, "exp": "The Coriolis force, caused by Earth's rotation, deflects winds to the right in the Northern Hemisphere and to the left in the Southern Hemisphere."}, {"q": "The daily cycle of sea breeze (day) and land breeze (night) is caused by:", "options": ["The Coriolis force", "Differential heating and cooling of land versus water", "Ocean currents", "The jet stream"], "correct": 1, "exp": "Land and Sea Breeze cycles occur due to the differential heating (day) and cooling (night) of land compared to water \u2014 sea breeze blows sea\u2192land by day, land breeze blows land\u2192sea by night."}, {"q": "'Loo' refers to:", "options": ["A cold winter wind in North India", "A hot, dry summer wind of North Indian plains", "A sea breeze in coastal India", "A monsoon wind from the Bay of Bengal"], "correct": 1, "exp": "Loo is a hot, dry summer wind that blows over the North Indian plains."}, {"q": "The Chinook (North America) and Foehn (Alps) are examples of:", "options": ["Cold winds descending windward mountain slopes", "Warm, dry winds descending leeward mountain slopes", "Cold winds in southern France", "Monsoon winds"], "correct": 1, "exp": "Chinook (N. America) and Foehn (Alps) are warm, dry winds descending the leeward slopes of mountains."}, {"q": "The Mistral is a notable cold, local wind found in:", "options": ["Southern France", "Northern India", "The Alps (warm wind)", "North America"], "correct": 0, "exp": "The Mistral is a cold local wind found in southern France."}, {"q": "'Insolation', or incoming solar radiation, varies with all of the following EXCEPT:", "options": ["Latitude", "Angle of the sun's rays", "Day length", "Ocean salinity"], "correct": 3, "exp": "Insolation varies with latitude, the angle of the sun's rays, day length, and the transparency of the atmosphere \u2014 not ocean salinity, which is unrelated."}, {"q": "Which of the following is NOT typically a factor controlling temperature distribution?", "options": ["Latitude", "Altitude", "Distance from the sea", "Political boundaries"], "correct": 3, "exp": "Factors controlling temperature distribution include latitude, altitude, distance from the sea, ocean currents, and prevailing winds \u2014 not political boundaries."}, {"q": "Relative humidity is defined as:", "options": ["The actual water vapour content in the air (g/m\u00b3)", "The ratio of actual to maximum possible water vapour at a given temperature", "The total mass of water vapour in the atmosphere", "The dew point temperature"], "correct": 1, "exp": "Relative humidity is the ratio of actual water vapour present to the maximum possible water vapour at that temperature (expressed as %); it drops as temperature rises even if absolute moisture stays the same, since warmer air can hold more moisture."}]}, {"title": "13. Precipitation, Clouds & Climate Classification (+ Indian Monsoon context)", "questions": [{"q": "Convectional rainfall, common in equatorial regions, is characterised by:", "options": ["Long, steady drizzle all day", "Short, intense, afternoon showers as warm air rises and condenses", "Winter frontal storms", "Orographic uplift only"], "correct": 1, "exp": "Convectional rainfall occurs when warm air rises, cools, and condenses, producing short, intense, typically afternoon showers, common in equatorial regions."}, {"q": "Rainfall caused by moist air being forced up a mountain barrier is called:", "options": ["Convectional rainfall", "Cyclonic/Frontal rainfall", "Orographic (Relief) rainfall", "Conventional rainfall"], "correct": 2, "exp": "Orographic (Relief) rainfall occurs when moist air is forced up a mountain barrier, cooling and condensing on the windward side \u2014 e.g. the Western Ghats and Himalayan foothills."}, {"q": "Cyclonic (Frontal) rainfall occurs when:", "options": ["Moist air rises over mountains", "Warm and cold air masses meet at a front", "Warm air rises due to surface heating alone", "Ice crystals fall from cirrus clouds"], "correct": 1, "exp": "Cyclonic (Frontal) rainfall occurs when warm and cold air masses meet at a front, typical of temperate regions."}, {"q": "The dry leeward side of a mountain after orographic rainfall on the windward side is called a:", "options": ["Rain shadow region", "Convectional zone", "Frontal zone", "Monsoon trough"], "correct": 0, "exp": "The dry leeward side is called a rain shadow region \u2014 e.g. the Deccan Plateau, which lies east of and drier than the Western Ghats."}, {"q": "Which cloud type is thin, wispy, high-altitude, and made of ice crystals?", "options": ["Cumulus", "Stratus", "Cirrus", "Nimbostratus"], "correct": 2, "exp": "Cirrus clouds are thin, wispy, high-altitude clouds made of ice crystals."}, {"q": "Which cloud type is puffy and cotton-like, associated with fair weather but can build into thunderstorms?", "options": ["Cirrus", "Cumulus", "Stratus", "Nimbostratus"], "correct": 1, "exp": "Cumulus clouds are puffy, cotton-like, and typically indicate fair weather, but can develop into cumulonimbus clouds, which bring thunderstorms."}, {"q": "Which cloud type is flat, layered, grey, and often brings drizzle, covering the sky like a blanket?", "options": ["Cirrus", "Cumulus", "Stratus", "Cumulonimbus"], "correct": 2, "exp": "Stratus clouds are flat, layered, and grey, covering the sky like a blanket and often bringing drizzle."}, {"q": "The prefix/suffix 'Nimbus' in cloud names (e.g. Nimbostratus, Cumulonimbus) indicates that the cloud is:", "options": ["High-altitude", "Rain-bearing", "Made of ice crystals only", "Associated with clear skies"], "correct": 1, "exp": "'Nimbus' as a prefix or suffix in cloud names indicates a rain-bearing cloud, such as Nimbostratus or Cumulonimbus."}, {"q": "In the K\u00f6ppen climate classification, Group 'A' represents:", "options": ["Dry (arid/semi-arid) climate", "Tropical climate (no winter)", "Polar climate", "Continental climate"], "correct": 1, "exp": "In K\u00f6ppen's classification, Group A = Tropical (no winter, e.g. Amazon, Congo); B = Dry; C = Temperate (mild winter); D = Continental (cold winter); E = Polar."}, {"q": "In the K\u00f6ppen climate classification, which group represents 'Dry (arid/semi-arid)' climates, such as the Sahara and Thar deserts?", "options": ["Group A", "Group B", "Group C", "Group D"], "correct": 1, "exp": "Group B in the K\u00f6ppen classification represents Dry (arid/semi-arid) climates, exemplified by the Sahara and Thar deserts."}]}, {"title": "14. Oceanography", "questions": [{"q": "The shallow, gently sloping submerged margin of a continent, rich in fishing and mineral resources, is called the:", "options": ["Continental Slope", "Continental Shelf", "Abyssal Plain", "Mid-Ocean Ridge"], "correct": 1, "exp": "The Continental Shelf is the shallow, gently sloping submerged margin of a continent, rich in fishing and mineral resources."}, {"q": "The steep drop from the continental shelf down to the ocean floor is called the:", "options": ["Continental Shelf", "Continental Slope", "Abyssal Plain", "Guyot"], "correct": 1, "exp": "The Continental Slope is the steep drop from the continental shelf to the ocean floor."}, {"q": "The flat ocean floor of the deep sea is called the:", "options": ["Continental Shelf", "Continental Slope", "Abyssal Plain", "Mid-Ocean Ridge"], "correct": 2, "exp": "The Abyssal Plain is the flat, deep-sea ocean floor."}, {"q": "The Mariana Trench, the deepest point on Earth, is an example of which ocean relief feature?", "options": ["Continental shelf", "Mid-ocean ridge", "Abyssal plain", "Ocean/deep-sea trench"], "correct": 3, "exp": "The Mariana Trench is a deep-sea trench, formed at a subduction zone, and is the deepest point on Earth."}, {"q": "An underwater mountain chain formed at a divergent plate boundary, such as the Mid-Atlantic Ridge, is called a:", "options": ["Guyot", "Mid-Ocean Ridge", "Continental Slope", "Abyssal Plain"], "correct": 1, "exp": "A Mid-Ocean Ridge is an underwater mountain chain formed at a divergent boundary, e.g. the Mid-Atlantic Ridge."}, {"q": "A flat-topped submerged volcanic seamount is called a:", "options": ["Guyot", "Trench", "Shelf", "Ridge"], "correct": 0, "exp": "A Guyot is a flat-topped submerged volcanic seamount."}, {"q": "Average ocean salinity is approximately:", "options": ["15 parts per thousand", "35 parts per thousand", "55 parts per thousand", "75 parts per thousand"], "correct": 1, "exp": "Average ocean salinity is about 35 parts per thousand (\u2030); it's highest in seas with high evaporation and low inflow like the Red Sea/Dead Sea, and lowest near river mouths and polar regions."}, {"q": "How does ocean temperature typically change with depth and increasing latitude?", "options": ["It increases with depth and latitude", "It decreases with both depth and increasing latitude", "It stays constant regardless of depth or latitude", "It increases with depth but decreases with latitude"], "correct": 1, "exp": "Ocean temperature decreases with depth and with increasing latitude."}, {"q": "Warm ocean currents like the Gulf Stream generally flow:", "options": ["From poles to the equator", "From the equator towards the poles", "Only along coastlines", "In a fixed north-south direction"], "correct": 1, "exp": "Warm currents (e.g. the Gulf Stream) flow from the equator towards the poles, while cold currents (e.g. the Labrador Current) flow from the poles towards the equator."}, {"q": "Tides are periodic rises and falls of sea level caused mainly by:", "options": ["Wind patterns", "The gravitational pull of the Moon (and Sun)", "Ocean currents", "Earth's rotation alone"], "correct": 1, "exp": "Tides are caused mainly by the gravitational pull of the Moon, with the Sun's gravity also playing a role."}, {"q": "Spring tides, the highest tides, occur during:", "options": ["First and last quarter moon", "New and Full Moon", "Only during Full Moon", "Only during eclipses"], "correct": 1, "exp": "Spring tides (highest tides) occur during New and Full Moon, when the Sun, Earth, and Moon are aligned and their gravitational pulls add up."}, {"q": "Neap tides, with the lowest tidal range, occur during:", "options": ["New and Full Moon", "First and last quarter moon, when Sun and Moon pull at right angles", "Only during solar eclipses", "Perihelion"], "correct": 1, "exp": "Neap tides (lowest tide range) occur during the first/last quarter moon, when the Sun and Moon's gravitational pulls are at right angles and partially cancel out."}]}, {"title": "15. Location & Extent of India", "questions": [{"q": "India's mainland extends latitudinally from Kashmir in the north to which point in the south?", "options": ["Kanniyakumari", "Indira Point", "Rameswaram", "Kavaratti"], "correct": 0, "exp": "India's mainland extends from Kashmir (north) to Kanniyakumari (south)."}, {"q": "India's latitudinal extent is approximately:", "options": ["6\u00b045\u2032 N to 37\u00b06\u2032 N (~30\u00b0)", "0\u00b0 to 45\u00b0 N", "10\u00b0 N to 40\u00b0 N (~30\u00b0)", "20\u00b0 N to 50\u00b0 N (~30\u00b0)"], "correct": 0, "exp": "India's latitudinal extent is 6\u00b045\u2032 N to 37\u00b06\u2032 N, spanning approximately 30\u00b0."}, {"q": "India's total area of about 3.28 million sq km makes it the ______ largest country in the world.", "options": ["5th", "7th", "9th", "3rd"], "correct": 1, "exp": "India is the 7th largest country in the world by area; countries larger than India are Russia, Canada, USA, China, Brazil, and Australia."}, {"q": "India's territorial waters extend how far from the coast?", "options": ["3 nautical miles", "12 nautical miles (~21.9 km)", "24 nautical miles", "200 nautical miles"], "correct": 1, "exp": "India's territorial waters extend 12 nautical miles (~21.9 km) from the coast."}, {"q": "India's total coastline, including islands, measures approximately:", "options": ["6,100 km", "7,517 km", "9,000 km", "12,000 km"], "correct": 1, "exp": "India's coastline, including islands, measures about 7,517 km (the mainland coastline alone is about 6,100 km)."}, {"q": "India's Standard Meridian (82\u00b030\u2032 E) passes through which town?", "options": ["Allahabad", "Mirzapur", "Varanasi", "Kanpur"], "correct": 1, "exp": "India's Standard Meridian, 82\u00b030\u2032 E, passes through Mirzapur in Uttar Pradesh, giving IST = GMT + 5:30."}, {"q": "India's East-West distance is shorter than its North-South distance mainly because:", "options": ["India has fewer rivers running east-west", "Longitude convergence increases towards the poles, and India lies in northern/sub-tropical latitudes", "The Himalayas block east-west measurement", "Of the curvature of the Tropic of Cancer"], "correct": 1, "exp": "India's East-West distance (~2,933 km) is shorter than North-South (~3,214 km) because longitudes converge towards the poles, and India's latitudinal position (northern/sub-tropical) means its east-west spread is compressed compared to its north-south spread."}, {"q": "The northern part of India lies within which climatic zone, contributing to its diversity of landforms, climate, soils and vegetation?", "options": ["Equatorial zone", "Sub-tropical/warm temperate zone", "Polar zone", "Mediterranean zone"], "correct": 1, "exp": "While the southern part of India lies within the Tropics, the northern part lies in the sub-tropical/warm temperate zone \u2014 this range is responsible for India's huge diversity in landforms, climate, soils, and vegetation."}, {"q": "India is separated from Sri Lanka by the:", "options": ["Ten Degree Channel", "Nine Degree Channel", "Gulf of Mannar & Palk Strait", "Andaman Sea"], "correct": 2, "exp": "The Gulf of Mannar and Palk Strait separate India from Sri Lanka."}, {"q": "Which country shares the longest official land border with India?", "options": ["China", "Nepal", "Bangladesh", "Pakistan"], "correct": 2, "exp": "Bangladesh has the longest official land frontier with India (China shares a long disputed/contested border, but Bangladesh's official border is longer)."}, {"q": "Which two countries are India's island neighbours?", "options": ["Sri Lanka and Maldives", "Indonesia and Thailand", "Myanmar and Bangladesh", "Sri Lanka and Bangladesh"], "correct": 0, "exp": "Sri Lanka and Maldives are India's island neighbours."}]}, {"title": "16. Physiographic Divisions of India", "questions": [{"q": "How many major geological divisions is India broadly split into?", "options": ["2", "3", "4", "6"], "correct": 1, "exp": "India has 3 geological divisions: The Peninsular Block, The Himalayas & other Peninsular Mountains, and the Indo-Ganga-Brahmaputra Plain."}, {"q": "The Peninsular Block is composed mainly of which rock types, making it ancient and stable?", "options": ["Sandstone and shale", "Gneiss and granite", "Basalt and limestone", "Marble and slate"], "correct": 1, "exp": "The Peninsular Block, part of the Indo-Australian Plate, is made of ancient, rigid gneiss and granite, making it the oldest and most stable landmass in India."}, {"q": "The Indo-Ganga-Brahmaputra Plain is best described as:", "options": ["An ancient, rigid landmass", "A young, tectonically active fold mountain zone", "A filled geo-synclinal depression, with alluvium depth 1,000-2,000 m", "A volcanic plateau"], "correct": 2, "exp": "The Indo-Ganga-Brahmaputra Plain is a filled geo-synclinal depression, with an alluvium depth of 1,000-2,000 m."}, {"q": "How many major physiographic divisions is India generally divided into?", "options": ["4", "5", "6", "7"], "correct": 2, "exp": "India has 6 physiographic divisions: Northern & N-E Mountains, Northern Plain, Peninsular Plateau, Indian Desert, Coastal Plains, and Islands."}, {"q": "Which is the outermost and youngest range of the Himalayas?", "options": ["Greater Himalaya (Himadri)", "Lesser Himalaya (Himachal)", "Shiwaliks", "Trans-Himalaya"], "correct": 2, "exp": "The Shiwaliks are the outermost and youngest range of the Himalayas, which also include the Greater Himalaya (Himadri) and Lesser Himalaya (Himachal)."}, {"q": "The Great Himalayan range's orientation changes across regions \u2014 in Kashmir it runs NW-SE, while in Sikkim/Darjeeling it runs:", "options": ["N-S", "E-W", "NE-SW", "It doesn't change"], "correct": 1, "exp": "The Himalayan orientation changes region to region: NW-SE in Kashmir, E-W in Sikkim/Darjeeling, and N-S in Nagaland/Manipur/Mizoram."}, {"q": "The Northern Plain of India, formed by alluvium of the Indus, Ganga, and Brahmaputra, has an approximate length of:", "options": ["1,000 km", "2,000 km", "3,200 km", "5,000 km"], "correct": 2, "exp": "The Northern Plain is about 3,200 km long and 150-300 km wide, with an elevation of 50-150 m."}, {"q": "In the Northern Plain, the narrow, coarse-gravel belt lying just below the Shiwaliks is called:", "options": ["Tarai", "Bhabar", "Khadar", "Bhangar"], "correct": 1, "exp": "The Bhabar is a narrow (8\u201310 km) belt of coarse gravel just below the Shiwaliks; further south lies the marshy Tarai, then the alluvial plains (Bhangar = older alluvium/upland, Khadar = newer alluvium/floodplain)."}, {"q": "'Bhangar' and 'Khadar' refer to which type of land in the Northern Plain?", "options": ["Older alluvium (upland) and newer alluvium (floodplain), respectively", "Marshy and forested zones", "Desert dune belts", "Coastal delta regions"], "correct": 0, "exp": "Bhangar is the older alluvium forming upland areas, while Khadar is the newer alluvium forming the floodplain."}, {"q": "Which two states/UT form the water divide between the Indus and Ganga river systems?", "options": ["Punjab and Rajasthan", "Haryana and Delhi", "Uttar Pradesh and Bihar", "Himachal Pradesh and Punjab"], "correct": 1, "exp": "Haryana and Delhi form the water divide between the Indus and Ganga river systems in the Northern Plain."}, {"q": "The Peninsular Plateau rises to an elevation of approximately:", "options": ["100-300 m", "600-900 m", "1,500-2,000 m", "Over 3,000 m"], "correct": 1, "exp": "The Peninsular Plateau rise
