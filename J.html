<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pinnacle SSC CGL Vocabulary Coach – Offline</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');
:root{
  --bg:#f0f4ff;--sf:#fff;--sf2:#f1f5fb;--bd:#e2e8f0;
  --ac:#3b5bdb;--acl:#eef2ff;
  --gn:#059669;--gnl:#ecfdf5;
  --rd:#dc2626;--rdl:#fef2f2;
  --am:#d97706;--aml:#fffbeb;
  --vl:#7c3aed;--vll:#ede9fe;
  --sk:#0ea5e9;--skl:#f0f9ff;
  --tx:#1e293b;--mu:#64748b;--lt:#94a3b8;
  --r:12px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --sh2:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1e3a8a,#3b5bdb 55%,#0ea5e9);color:#fff;padding:24px 20px 20px;text-align:center;}
.hdr h1{font-family:'Playfair Display',serif;font-size:clamp(1.25rem,4vw,1.85rem);font-weight:700;margin-bottom:5px;letter-spacing:-.01em;}
.hdr p{font-size:.8rem;opacity:.88;margin-bottom:14px;}
.stats{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.st{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;font-size:.72rem;font-weight:500;}
/* TABS */
.tnw{background:var(--sf);border-bottom:2px solid var(--bd);overflow-x:auto;scrollbar-width:none;}
.tnw::-webkit-scrollbar{display:none;}
.tabs{display:flex;min-width:max-content;padding:0 8px;}
.tab{padding:11px 15px;border:none;background:none;font-family:'Inter',sans-serif;font-size:.79rem;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .2s,border-color .2s;display:flex;align-items:center;gap:5px;}
.tab:hover{color:var(--ac);}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);}
.cnt{background:var(--acl);color:var(--ac);border-radius:10px;padding:1px 6px;font-size:.66rem;font-weight:700;}
.tab.on .cnt{background:var(--ac);color:#fff;}
/* MAIN */
#app{padding:14px 12px;max-width:860px;margin:0 auto;}
/* SCORE BAR */
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 13px;margin-bottom:12px;display:flex;gap:14px;font-size:.74rem;flex-wrap:wrap;align-items:center;}
.sci{display:flex;align-items:center;gap:4px;}
.scd{width:7px;height:7px;border-radius:50%;}
/* FILTER */
.fb{display:flex;gap:7px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.srch{flex:1;min-width:150px;padding:7px 12px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:.81rem;font-family:'Inter',sans-serif;background:var(--sf);color:var(--tx);outline:none;}
.srch:focus{border-color:var(--ac);}
.pi{font-size:.74rem;color:var(--mu);white-space:nowrap;}
.pb{padding:6px 11px;border:1.5px solid var(--bd);border-radius:8px;background:var(--sf);font-size:.76rem;font-weight:500;cursor:pointer;color:var(--tx);transition:all .18s;}
.pb:hover:not(:disabled){border-color:var(--ac);color:var(--ac);}
.pb:disabled{opacity:.4;cursor:not-allowed;}
.prg{height:3px;background:var(--bd);border-radius:2px;margin-bottom:12px;}
.prgf{height:100%;border-radius:2px;transition:width .3s;}
/* CARD */
.qc{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--sh);transition:box-shadow .2s;}
.qc:hover{box-shadow:var(--sh2);}
.qh{padding:12px 14px 9px;border-bottom:1px solid var(--bd);display:flex;gap:9px;align-items:flex-start;}
.qn{min-width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;}
.qt{font-size:.86rem;font-weight:600;flex:1;line-height:1.5;}
.qe{font-size:.64rem;color:var(--lt);margin-top:2px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:10px 14px;}
@media(max-width:440px){.opts{grid-template-columns:1fr;}}
.opt{padding:8px 10px;border:1.5px solid var(--bd);border-radius:7px;background:var(--sf2);font-size:.79rem;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;color:var(--tx);transition:all .15s;display:flex;align-items:center;gap:6px;width:100%;}
.opt:hover:not([disabled]){border-color:var(--ac);background:var(--acl);}
.opt.cor{border-color:var(--gn);background:var(--gnl);color:#065f46;font-weight:600;}
.opt.wrg{border-color:var(--rd);background:var(--rdl);color:#991b1b;}
.ol{font-weight:700;font-size:.68rem;min-width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.07);flex-shrink:0;}
.qf{padding:7px 14px 11px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.bex{padding:6px 12px;background:linear-gradient(135deg,var(--ac),#4f6ef7);color:#fff;border:none;border-radius:7px;font-size:.76rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s,transform .1s;}
.bex:hover:not([disabled]){opacity:.9;transform:translateY(-1px);}
.bex[disabled]{opacity:.45;cursor:not-allowed;transform:none;}
.brv{padding:6px 11px;background:var(--sf2);color:var(--mu);border:1.5px solid var(--bd);border-radius:7px;font-size:.76rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;}
.brv:hover{border-color:var(--am);color:var(--am);}
.bdg{font-size:.68rem;font-weight:600;margin-left:auto;}
.bc{color:var(--gn);}.bw{color:var(--rd);}.br2{color:var(--mu);}
/* EXPLANATION */
.ep{margin:0 14px 11px;border:1.5px solid var(--bd);border-radius:var(--r);display:none;}
.ep.show{display:block;}
.epi{padding:15px 16px;font-size:.81rem;line-height:1.78;color:var(--tx);}
.epi h3{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--ac);margin:14px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--acl);}
.epi h3:first-child{margin-top:0;}
.epi h4{font-size:.8rem;color:var(--vl);margin:9px 0 3px;font-weight:600;}
.epi p{margin-bottom:6px;}
.epi ul,.epi ol{margin:4px 0 6px 16px;}
.epi li{margin-bottom:2px;}
.epi strong{color:var(--ac);}
.epi em{color:var(--vl);font-style:italic;}
.epi table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.75rem;}
.epi th{background:var(--acl);color:var(--ac);padding:6px 8px;text-align:left;font-weight:600;border:1px solid var(--bd);}
.epi td{padding:5px 8px;border:1px solid var(--bd);vertical-align:top;}
.epi tr:nth-child(even) td{background:var(--sf2);}
/* Coaching boxes */
.mb{background:linear-gradient(135deg,#fef9c3,#fef3c7);border-left:3px solid var(--am);border-radius:0 8px 8px 0;padding:8px 12px;margin:6px 0;font-size:.79rem;}
.vb{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-left:3px solid var(--vl);border-radius:0 8px 8px 0;padding:8px 12px;margin:6px 0;font-size:.79rem;}
.tb{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-left:3px solid var(--gn);border-radius:0 8px 8px 0;padding:7px 12px;margin:5px 0;font-size:.77rem;}
.rb{background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:1.5px solid #fda4af;border-radius:8px;padding:10px 12px;margin:8px 0;}
.cb{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-left:3px solid var(--sk);border-radius:0 8px 8px 0;padding:8px 12px;margin:6px 0;font-size:.79rem;}
.wb{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-left:3px solid #f97316;border-radius:0 8px 8px 0;padding:8px 12px;margin:6px 0;font-size:.79rem;}
/* empty */
.empty{text-align:center;padding:40px 16px;color:var(--mu);}
.ei{font-size:2.2rem;margin-bottom:8px;}
/* scroll top */
#sto{position:fixed;bottom:18px;right:16px;width:40px;height:40px;background:linear-gradient(135deg,#3b5bdb,#0ea5e9);color:#fff;border:none;border-radius:50%;font-size:1.1rem;cursor:pointer;box-shadow:var(--sh2);display:none;align-items:center;justify-content:center;z-index:999;}
#sto:hover{opacity:.9;}
#sto.vis{display:flex;}
/* Notice banner */
.nb{background:var(--gnl);border:1px solid #86efac;border-radius:var(--r);padding:9px 13px;margin-bottom:12px;font-size:.76rem;color:#065f46;}

</style>
</head>

 சேகரிப்பவர் (Thapal Thalai Sekaripavar)", "root": "Greek: philos = loving + ateleia = tax exemption (stamps show tax paid)", "trick": "PHIL(love) + ATELI(atel=stamp) + ST = loves stamps with atelic devotion!", "visual": "A person with a magnifying glass carefully examining a tiny stamp album", "synonyms": "Stamp collector", "antonyms": "N/A", "example": "The philatelist had stamps from over 100 countries."}, "PHILANTHROPIST": {"meaning": "A person who seeks to promote the welfare of others; especially through donations", "tamil": "பரோபகாரி (Paropakari)", "root": "Greek: philos = loving + anthropos = human", "trick": "PHILAN(loving) + THRO(throw) + PIST = throws money to help humans!", "visual": "A wealthy person handing out checks to hospitals and schools", "synonyms": "Humanitarian, Benefactor, Patron, Donor", "antonyms": "Misanthrope, Miser", "example": "The philanthropist donated ₹100 crores to build rural schools."}, "DILETTANTE": {"meaning": "A person who cultivates an area of interest without real commitment; amateur", "tamil": "ஆர்வலர் / சோற்றுக் கலைஞர் (Aaruvar)", "root": "Italian: dilettante = one who delights in (from dilettare = to delight)", "trick": "DILLE + TANTE = DILL + AUNT = aunt who tries cooking with dill but is no chef!", "visual": "A person painting a canvas badly but calling themselves 'an artist'", "synonyms": "Amateur, Dabbler, Trifler", "antonyms": "Expert, Professional, Virtuoso", "example": "He was a dilettante musician — he played guitar only at parties."}, "PRODIGY": {"meaning": "A person with exceptional qualities, especially a child with talent", "tamil": "அதிசய திறமை (Athisaya Thiramaiyanavar)", "root": "Latin: prodigium = omen/wonder", "trick": "PRODIGY = PRO + DIGY — a PRO from DIGI(tal age) — born with pro-level talent!", "visual": "A 7-year-old playing a complex Beethoven piece on the piano", "synonyms": "Genius, Wonder child, Phenomenon, Virtuoso", "antonyms": "Dunce, Mediocrity", "example": "Mozart was a musical prodigy who composed at age five."}, "CYNICAL": {"meaning": "Believing that people are motivated by self-interest; distrustful of sincerity", "tamil": "நம்பிக்கையற்ற (Nambikkaiatra)", "root": "Greek: kynikos = dog-like (Cynics were called dogs for their contempt)", "trick": "CYNIC sounds like CYNIC(al dog) — snarling dog who trusts no one!", "visual": "A person rolling eyes and saying 'Yeah, right!' at everything positive", "synonyms": "Skeptical, Distrustful, Pessimistic", "antonyms": "Idealistic, Trusting, Optimistic", "example": "His cynical view of politics made him dismiss all promises."}, "AGNOSTIC": {"meaning": "A person who believes that nothing is known about God's existence", "tamil": "இறைவன் இருக்கிறானா என்று தெரியாது என்பவர்", "root": "Greek: a = without + gnostos = known", "trick": "A + GNOSTIC = without KNOWLEDGE of God — not sure either way!", "visual": "A person shrugging with a question mark between two doors labeled 'God' and 'No God'", "synonyms": "Skeptic, Non-believer (tentative)", "antonyms": "Theist, Atheist (both are certain in their positions)", "example": "As an agnostic, he neither accepted nor denied the existence of God."}, "CREDULOUS": {"meaning": "Having too great a readiness to believe things; gullible", "tamil": "எளிதில் நம்பும் (Elidhil Nambum)", "root": "Latin: credulus = easily believing (from credere = to believe)", "trick": "CREDULOUS = CREDIT + ULOUS — gives CREDIT(belief) too easily!", "visual": "A person handing over cash to a stranger who says 'I'm a prince'", "synonyms": "Gullible, Naive, Trusting, Unsuspecting", "antonyms": "Skeptical, Cynical, Suspicious", "example": "The credulous tourist was cheated by every street vendor."}, "MAGNANIMOUS": {"meaning": "Generous or forgiving, especially toward a rival or less powerful person", "tamil": "பெருந்தன்மையான (Perunthanmaiyaana)", "root": "Latin: magnus = great + animus = soul", "trick": "MAGNA + ANIMUS = MAGNA ANIMA — great soul like Mahatma (Maha Atma)!", "visual": "A winner graciously shaking hands and hugging the loser", "synonyms": "Generous, Benevolent, Charitable, Noble", "antonyms": "Petty, Mean, Vindictive", "example": "The magnanimous victor helped rebuild the defeated nation."}, "ENIGMATIC": {"meaning": "Difficult to interpret or understand; mysterious", "tamil": "மர்ம நிறைந்த (Marma Niraintha)", "root": "Greek: ainigma = riddle", "trick": "ENIGMA + TIC = ENIGMATIC TICK — a mysterious clock nobody can solve!", "visual": "The Mona Lisa's unexplained smile that art historians debate for centuries", "synonyms": "Mysterious, Cryptic, Puzzling, Inscrutable", "antonyms": "Transparent, Clear, Obvious", "example": "The sphinx's enigmatic expression has puzzled visitors for millennia."}, "NONCHALANT": {"meaning": "Feeling or appearing casually calm and relaxed; not displaying anxiety", "tamil": "கவலையில்லாத (Kavalaiyillatha)", "root": "French: non + chalant (from chaloir = to care)", "trick": "NON + CHALANT = NON-CARING — doesn't care, always cool!", "visual": "A person filing nails while the building behind them is on fire", "synonyms": "Casual, Indifferent, Cool, Blasé", "antonyms": "Anxious, Concerned, Worried", "example": "He was nonchalant about the exam, even though he hadn't studied."}, "ADAMANT": {"meaning": "Refusing to be persuaded or to change one's mind; unyielding", "tamil": "உறுதியான (Uruthiyaana)", "root": "Greek: adamantos = very hard (a=not + daman=to tame)", "trick": "ADAMANT = ADAM + ANT — even an ANT won't move ADAM when he's decided!", "visual": "A person with arms crossed and feet planted, refusing all arguments", "synonyms": "Unyielding, Firm, Resolute, Stubborn", "antonyms": "Flexible, Yielding, Amenable", "example": "She was adamant about not accepting the lower offer."}, "INDIGENOUS": {"meaning": "Native to or originating in a particular region", "tamil": "பூர்வீகமான (Poorveekamaana)", "root": "Latin: indigena = native born within", "trick": "INDIA + GENE = native genes of India — born and rooted here!", "visual": "Aboriginal people in traditional dress in their ancestral land", "synonyms": "Native, Aboriginal, Autochthonous", "antonyms": "Foreign, Exotic, Alien, Immigrant", "example": "Neem is indigenous to the Indian subcontinent."}, "CONCISE": {"meaning": "Giving a lot of information clearly and in a few words; brief but comprehensive", "tamil": "சுருக்கமான (Surukkamaana)", "root": "Latin: concisus = cut short (con=together + caedere=to cut)", "trick": "CON + CISE = SCISSORS — scissors cut short! Concise cuts words short!", "visual": "Scissors neatly cutting a long scroll into a short, tidy note", "synonyms": "Brief, Succinct, Terse, Pithy", "antonyms": "Verbose, Wordy, Prolix", "example": "Write a concise paragraph of no more than 50 words."}, "ALLEVIATE": {"meaning": "To make suffering or a problem less severe", "tamil": "குறைக்கும் (Kuraikum)", "root": "Latin: alleviare = to lighten (ad=to + levis=light)", "trick": "ALL + EVIATE = ALL EASED — alleviates ALL the pain!", "visual": "A nurse giving medicine to a patient whose pained face slowly relaxes", "synonyms": "Ease, Relieve, Mitigate, Assuage", "antonyms": "Aggravate, Worsen, Exacerbate", "example": "Ice packs help alleviate the pain from bruises."}, "MITIGATE": {"meaning": "Make less severe, serious, or painful; lessen", "tamil": "தீவிரத்தை குறைத்தல் (Theevirathai Kuraithal)", "root": "Latin: mitigare = to soften (mitis=soft + agere=to do)", "trick": "MITI + GATE = open the gate to let pain out — reduce severity!", "visual": "A fire being brought under control with a steady stream of water", "synonyms": "Alleviate, Reduce, Moderate, Temper", "antonyms": "Aggravate, Exacerbate, Intensify", "example": "Planting trees helps mitigate the effects of climate change."}, "IMPECCABLE": {"meaning": "In accordance with the highest standards; faultless; having no flaws", "tamil": "குற்றமற்ற (Kutramatra)", "root": "Latin: impeccabilis = not liable to sin (im=not + peccare=to sin)", "trick": "IM + PECCA + BLE = IM-PECK-ABLE — can't even peck (find a flaw)!", "visual": "A spotless white shirt with not a single wrinkle or stain", "synonyms": "Flawless, Faultless, Perfect, Exemplary", "antonyms": "Flawed, Defective, Imperfect", "example": "Her impeccable English impressed the interviewers."}, "ALTRUISTIC": {"meaning": "Showing a selfless concern for the well-being of others", "tamil": "பிறர் நலனில் அக்கறை (Pirar Nalanil Akkurai)", "root": "French: altruisme (from Latin: alter = other)", "trick": "ALTRU + ISTIC = ALTER-ISTIC — alters own benefit for others!", "visual": "A person giving their umbrella to a stranger in rain, getting drenched", "synonyms": "Selfless, Philanthropic, Benevolent", "antonyms": "Selfish, Egotistical, Self-serving", "example": "Her altruistic decision to donate a kidney saved her friend's life."}, "PARSIMONIOUS": {"meaning": "Unwilling to spend money or use resources; extremely frugal to the point of stinginess", "tamil": "கஞ்சத்தனமான (Kanjatthanamaana)", "root": "Latin: parsimonia = frugality (from parcere = to spare)", "trick": "PARSIMO = PARSE + MONEY — parses every rupee before spending!", "visual": "A person counting coins for an hour before buying a ₹5 candy", "synonyms": "Miserly, Stingy, Cheap, Tight-fisted", "antonyms": "Generous, Lavish, Extravagant", "example": "The parsimonious landlord refused to fix a leaking tap for months."}, "ESOTERIC": {"meaning": "Intended for or understood by only a small number of people with specialized knowledge", "tamil": "மறைந்த / ஒரு சிலருக்கே தெரிந்த (Maraindha)", "root": "Greek: esoteros = inner (esoterikos = of the inner circle)", "trick": "ESO + TERIC = ESO(inner) + TERROR of understanding — only few can grasp!", "visual": "A secret society meeting where only initiates understand the rituals", "synonyms": "Arcane, Abstruse, Obscure, Recondite", "antonyms": "Accessible, Popular, Common, Mainstream", "example": "Quantum physics is esoteric knowledge beyond most people's grasp."}, "ABSTRUSE": {"meaning": "Difficult to understand; obscure", "tamil": "புரிவதற்கு கஷ்டமான (Purivadharku Kashtamaana)", "root": "Latin: abstrusus = pushed away (from abstrudere = to hide)", "trick": "AB + STRUSE = ABSTRACT + RUSE — an abstract ruse nobody can figure out!", "visual": "A philosopher's equation on a blackboard that everyone stares at blankly", "synonyms": "Arcane, Esoteric, Obscure, Cryptic", "antonyms": "Clear, Simple, Accessible", "example": "His abstruse theory confused even his doctoral students."}, "EXTRAVAGANT": {"meaning": "Lacking restraint in spending money; exceeding what is reasonable", "tamil": "சேம்ப்பு இல்லாமல் செலவழிக்கும் (Seymbillamal)", "root": "Latin: extravagari = to wander beyond (extra=beyond + vagari=to wander)", "trick": "EXTRA + VAGANT = EXTRA VAGRANT spending — wandering EXTRA far with money!", "visual": "A person buying 5 cars when they only need one", "synonyms": "Lavish, Profligate, Wasteful, Excessive", "antonyms": "Frugal, Thrifty, Economical", "example": "His extravagant lifestyle led to massive debt."}, "BENIGN": {"meaning": "Gentle and kindly; not harmful; (of tumor) not malignant", "tamil": "நன்மையான / அச்சுறுத்தாத (Nanmaiyana)", "root": "Latin: benignus = well-born/kind (bene=well + gnus=born)", "trick": "BENIGN = BENI(benefit) + GN(gentle) — provides gentle benefits!", "visual": "A warm, smiling doctor saying 'Don't worry, it's harmless'", "synonyms": "Gentle, Harmless, Mild, Kind", "antonyms": "Malignant, Harmful, Dangerous", "example": "The doctor confirmed that the tumor was benign."}, "MALIGNANT": {"meaning": "Very virulent or infectious; (of tumor) tending to invade and kill; evil in nature", "tamil": "தீங்கு விளைவிக்கும் / ஆபத்தான", "root": "Latin: malignus = evil-born (male=badly + gnus=born)", "trick": "MALI + GNANT = MALI(evil) + GRANT — grants evil intentions!", "visual": "A dark cancer cell aggressively spreading through tissue", "synonyms": "Deadly, Virulent, Harmful, Malicious", "antonyms": "Benign, Harmless, Benevolent", "example": "The malignant tumor required immediate surgery."}, "TRANSIENT": {"meaning": "Lasting only for a short time; temporary; passing", "tamil": "தற்காலிகமான (Tharkaalikamaana)", "root": "Latin: transiens = going across (trans=across + ire=to go)", "trick": "TRANSIT + ENT = like a transit — just passing through, not staying!", "visual": "A bus stopping briefly at a station and then driving away", "synonyms": "Fleeting, Ephemeral, Temporary, Momentary", "antonyms": "Permanent, Enduring, Lasting, Persistent", "example": "His happiness was transient — it lasted only a few minutes."}, "EXORBITANT": {"meaning": "Unreasonably high in price or amount", "tamil": "மிகவும் அதிகமான (Migavum Adhikamaana)", "root": "Latin: exorbitare = to go out of the track (ex=out + orbita=track)", "trick": "EX + ORBIT + ANT = goes out of ORBIT like an ANT flying to the moon!", "visual": "A price tag with so many zeros the cashier needs a calculator", "synonyms": "Excessive, Extortionate, Unreasonable, Steep", "antonyms": "Reasonable, Moderate, Affordable", "example": "The hotel charged an exorbitant price during the festival."}, "GARRULOUS": {"meaning": "Excessively talkative; especially about trivial matters", "tamil": "அதிகமாக பேசும் (Adhikamaaga Pesum)", "root": "Latin: garrulus = talkative (from garrire = to chatter)", "trick": "GARRU + LOUS = GARBLE + LOUSE — garbles endless louse-level chatter!", "visual": "A parrot that won't stop squawking, filling every room with noise", "synonyms": "Talkative, Loquacious, Verbose, Chatty", "antonyms": "Taciturn, Reticent, Silent", "example": "The garrulous passenger talked for the entire 3-hour flight."}, "PERSPICACIOUS": {"meaning": "Having a ready insight into things; shrewd; having sharp mental perception", "tamil": "கூர்மையான புரிந்துணர்வுள்ள (Koormaiyaana Purindhunarvu)", "root": "Latin: perspicax = sharp-sighted (per=through + specere=to look)", "trick": "PER + SPICA + CIOUS = can PERCEIVE through the spica (spiky details)!", "visual": "A detective seeing the key clue that ev     <span class="sci"><span class="scd" style="background:var(--gn)"></span><strong>${s.c}</strong>&nbsp;Correct</span>
    <span class="sci"><span class="scd" style="background:var(--rd)"></span><strong>${s.w}</strong>&nbsp;Wrong</span>
    <span class="sci"><span class="scd" style="background:var(--lt)"></span><strong>${(AQ[name]||[]).length}</strong>&nbsp;Total</span>
    ${att>0?`<span style="margin-left:auto;font-size:.74rem;font-weight:600;color:var(--gn)">${Math.round(s.c/att*100)}% accuracy</span>`:''}
  </div>`;
  h+=`<div class="fb">
    <input type="text" class="srch" placeholder="🔍 Search questions, words…" value="${e(SR[name])}" oninput="osr('${name}',this.value)">
    <button class="pb" onclick="cp('${name}',-1)" ${pg<=1?'disabled':''}>← Prev</button>
    <span class="pi">Page ${pg}/${tp} · ${tot}Q</span>
    <button class="pb" onclick="cp('${name}',1)" ${pg>=tp?'disabled':''}>Next →</button>
  </div>`;
  h+=`<div class="prg"><div class="prgf" style="width:${(pg/tp*100).toFixed(1)}%;background:${m.color}"></div></div>`;

  if(!sl.length){
    h+='<div class="empty"><div class="ei">🔍</div><p>No questions found. Try a different search.</p></div>';
  } else {
    sl.forEach(q=>{ h+=rc(q,name); });
  }
  h+=`<div class="fb" style="margin-top:12px;justify-content:center;">
    <button class="pb" onclick="cp('${name}',-1)" ${pg<=1?'disabled':''}>← Prev</button>
    <span class="pi" style="margin:0 8px">Page ${pg} of ${tp}</span>
    <button class="pb" onclick="cp('${name}',1)" ${pg>=tp?'disabled':''}>Next →</button>
  </div>`;
  document.getElementById('app').innerHTML=h;
}

function rc(q,sec){
  const qid=sec+'-'+q.num;
  const done=AN[qid];
  const rev=done!==undefined;
  const m=SMETA[sec];
  let h=`<div class="qc" id="C${qid}">`;
  h+=`<div class="qh"><div class="qn" style="background:linear-gradient(135deg,${m.color},${m.color}bb)">Q${q.num}</div>`;
  h+=`<div><div class="qt">${e(q.question)}</div>`;
  if(q.exam) h+=`<div class="qe">📅 ${e(q.exam)}</div>`;
  h+=`</div></div><div class="opts">`;
  ['a','b','c','d'].forEach(l=>{
    const v=q.options&&q.options[l];
    if(!v) return;
    let cl='opt';
    if(rev){if(l===q.answer) cl+=' cor'; else if(l===done&&done!==q.answer) cl+=' wrg';}
    h+=`<button class="${cl}" ${rev?'disabled':''} onclick="pk('${qid}','${l}','${q.answer}','${sec}')"><span class="ol">${l.toUpperCase()}</span>${e(v)}</button>`;
  });
  h+=`</div><div class="qf" id="F${qid}">`;
  h+=`<button class="bex" id="E${qid}" onclick="tx('${qid}','${sec}')" ${rev?'':'disabled'}>🧠 Explain</button>`;
  if(!rev) h+=`<button class="brv" onclick="rv('${qid}','${q.answer}','${sec}')">👁 Reveal</button>`;
  else h+=`<span class="bdg ${done===q.answer?'bc':done==='__r'?'br2':'bw'}">${done===q.answer?'✅ Correct!':done==='__r'?'👁 Revealed':'❌ Wrong'}</span>`;
  h+=`</div><div class="ep" id="P${qid}"></div></div>`;
  return h;
}

function pk(qid,chosen,correct,sec){
  if(AN[qid]!==undefined) return;
  AN[qid]=chosen;
  if(chosen===correct) SC[sec].c++; else SC[sec].w++;
  const card=document.getElementById('C'+qid);
  card.querySelectorAll('.opt').forEach((b,i)=>{
    const l=['a','b','c','d'][i];
    if(l===correct) b.classList.add('cor');
    else if(l===chosen&&chosen!==correct) b.classList.add('wrg');
    b.disabled=true;
  });
  const f=document.getElementById('F'+qid);
  const rb=f.querySelector('.brv');if(rb)rb.remove();
  document.getElementById('E'+qid).disabled=false;
  const bd=document.createElement('span');
  bd.className='bdg '+(chosen===correct?'bc':'bw');
  bd.textContent=chosen===correct?'✅ Correct!':'❌ Wrong';
  f.appendChild(bd);
}

function rv(qid,correct,sec){
  AN[qid]='__r';
  const card=document.getElementById('C'+qid);
  card.querySelectorAll('.opt').forEach((b,i)=>{
    if(['a','b','c','d'][i]===correct) b.classList.add('cor');
    b.disabled=true;
  });
  const f=document.getElementById('F'+qid);
  const rb=f.querySelector('.brv');if(rb)rb.remove();
  document.getElementById('E'+qid).disabled=false;
  const bd=document.createElement('span');bd.className='bdg br2';bd.textContent='👁 Revealed';f.appendChild(bd);
}

function tx(qid,sec){
  const p=document.getElementById('P'+qid);
  const b=document.getElementById('E'+qid);
  if(p.classList.contains('show')){p.classList.remove('show');b.textContent='🧠 Explain';return;}
  const [s,ns]=qid.split('-');
  const qData=(AQ[s]||[]).find(q=>q.num===parseInt(ns));
  if(!qData) return;
  p.innerHTML='<div class="epi">'+bld(qData,sec)+'</div>';
  p.classList.add('show');
  b.textContent='🔼 Hide';
}

function wd(word){
  const k=word.toUpperCase().trim();
  return WDB[k]||WDB[k.replace(/[^A-Z]/g,'')]||null;
}

function gwd(word){
  const d=wd(word);
  if(d) return d;
  return {
    meaning:`"${word}" — a vocabulary word frequently tested in SSC CGL exams.`,
    tamil:`${word} — (Tamil: இந்த சொல்லின் பொருள் அகராதியில் பாருங்கள்)`,
    root:`Study the prefix/suffix/root of "${word}" to understand its family.`,
    trick:`Associate "${word}" with a similar-sounding word you already know.`,
    visual:`Imagine a vivid scene where "${word}" perfectly fits as the key word.`,
    synonyms:'Study related words in SSC vocabulary lists.',
    antonyms:'Think of the direct opposite concept.',
    example:`"${word}" is used in SSC CGL exams to test vocabulary depth.`
  };
}

function bld(q,sec){
  const opts=q.options||{};
  const aL=q.answer||'';
  const aV=opts[aL]||'N/A';
  const wO=Object.entries(opts).filter(([l])=>l!==aL);
  if(sec==='OWS') return bOWS(q,opts,aL,aV,wO);
  if(sec==='Idioms') return bIdi(q,opts,aL,aV,wO);
  if(sec==='Synonyms') return bSyn(q,opts,aL,aV,wO);
  if(sec==='Antonyms') return bAnt(q,opts,aL,aV,wO);
  if(sec==='Spelling') return bSpl(q,opts,aL,aV,wO);
  if(sec==='Homonyms') return bHom(q,opts,aL,aV,wO);
  return '<p>Explanation not available.</p>';
}

/* ===== STEP 1: OWS ===== */
function bOWS(q,opts,aL,aV,wO){
  const d=gwd(aV);
  let h='';
  h+=`<h3>📝 STEP 1 — The Question</h3>`;
  h+=`<p><strong>Definition:</strong> ${e(q.question)}</p>`;
  if(q.exam) h+=`<p><em>Source: ${e(q.exam)}</em></p>`;

  h+=`<h3>✅ STEP 2 — Correct Answer: (${aL.toUpperCase()}) "${e(aV)}"</h3>`;
  h+=`<p><strong>Simple Meaning:</strong> ${e(d.meaning)}</p>`;
  h+=`<div class="tb">🇮🇳 <strong>Tamil Meaning:</strong> ${e(d.tamil)}</div>`;
  h+=`<p><strong>🌿 Root Word / Etymology:</strong> ${e(d.root)}</p>`;
  h+=`<div class="mb">💡 <strong>Memory Trick:</strong> ${e(d.trick)}</div>`;
  h+=`<div class="vb">🎨 <strong>Visual Association:</strong> ${e(d.visual)}</div>`;
  h+=`<p><strong>Synonyms:</strong> ${e(d.synonyms||'—')} &nbsp;|&nbsp; <strong>Antonyms:</strong> ${e(d.antonyms||'—')}</p>`;
  h+=`<p><strong>SSC Example:</strong> <em>"${e(d.example||'Used in SSC CGL exams frequently.')}"</em></p>`;

  if(wO.length){
    h+=`<h3>❌ STEP 3 — Why Other Options Are Wrong</h3>`;
    wO.forEach(([l,v])=>{
      const vd=gwd(v);
      h+=`<h4>(${l.toUpperCase()}) ${e(v)}</h4>`;
      h+=`<p><strong>Meaning:</strong> ${e(vd.meaning)}</p>`;
      h+=`<div class="wb">⚠️ <strong>Why Wrong:</strong> "${e(v)}" has a different meaning — it does NOT fit the given definition. ${e(vd.trick||'')}</div>`;
    });
  }

  h+=`<h3>📊 STEP 4 — All Options Compared</h3>`;
  h+=`<table><thead><tr><th>Option</th><th>Word</th><th>Meaning</th><th>Tamil</th><th>✓?</th></tr></thead><tbody>`;
  Object.entries(opts).forEach(([l,v])=>{
    const vd=gwd(v);
    const ok=l===aL;
    h+=`<tr ${ok?'style="background:var(--gnl)"':''}><td>(${l.toUpperCase()})</td><td><strong>${e(v)}</strong></td><td>${e(vd.meaning.slice(0,60))}…</td><td>${e((vd.tamil||'—').slice(0,30))}</td><td>${ok?'✅':'❌'}</td></tr>`;
  });
  h+=`</tbody></table>`;

  h+=`<h3>🔁 STEP 5 — Recall Challenge</h3>`;
  h+=`<div class="rb">`;
  h+=`<p><strong>Fill in the blank:</strong> "The doctor who specialises in the study of _______?" <em>(Think about the definition you just read)</em></p>`;
  h+=`<p><strong>Word Breakdown:</strong> ${e(d.root.split('(')[0]||aV)}</p>`;
  h+=`<p><strong>Similar OWS Words:</strong> Study misanthrope, philanthropist, recluse, epicurean — they all describe types of people!</p>`;
  h+=`</div>`;
  return h;
}

/* ===== IDIOMS ===== */
function bIdi(q,opts,aL,aV,wO){
  const idiom=q.question;
  let h='';
  h+=`<h3>💬 STEP 1 — The Idiom: "${e(idiom)}"</h3>`;
  h+=`<p><strong>Literal (word-by-word):</strong> Reading each word literally gives a completely different picture from the real meaning!</p>`;
  h+=`<p><strong>✅ Actual Meaning:</strong> <strong>${e(aV)}</strong></p>`;
  if(q.exam) h+=`<p><em>Source: ${e(q.exam)}</em></p>`;

  h+=`<div class="tb">🇮🇳 <strong>Tamil Meaning:</strong> "${e(idiom)}" என்றால் "${e(aV)}" என்று பொருளாகும். (இது ஒரு நாவடைச்சொல் — figurative meaning)</div>`;
  h+=`<div class="vb">🎨 <strong>Visual Cartoon Scene:</strong> Imagine drawing the idiom literally — the absurdity of that image will help you remember the REAL figurative meaning of "${e(idiom)}"!</div>`;
  h+=`<div class="mb">💡 <strong>Memory Trick:</strong> Focus on the KEY words in "${e(idiom.split(' ').slice(0,3).join(' '))}" — they hint at the meaning: "${e(aV.slice(0,50))}"</div>`;
  h+=`<p><strong>Example Sentence:</strong> <em>"${e(idiom)}" — used to mean: ${e(aV)}</em></p>`;

  if(wO.length){
    h+=`<h3>❌ STEP 3 — Why Other Options Are Traps</h3>`;
    wO.forEach(([l,v])=>{
      h+=`<p><strong>(${l.toUpperCase()}) "${e(v)}"</strong> — ⚠️ This option is a <strong>distractor</strong>. It may seem plausible based on the literal words, but the actual figurative meaning of this idiom is different.</p>`;
    });
  }

  h+=`<h3>📊 STEP 4 — Similar SSC Idioms to Know</h3>`;
  h+=`<table><thead><tr><th>Idiom</th><th>Meaning</th><th>Tamil</th></tr></thead><tbody>
    <tr><td>Beat around the bush</td><td>Avoid the main topic</td><td>நேரடியாக பேசாமல் தவிர்க்கும்</td></tr>
    <tr><td>Hit the nail on the head</td><td>Be exactly right</td><td>சரியாக சொல்லுவது</td></tr>
    <tr><td>Bite the bullet</td><td>Endure pain bravely</td><td>வலியை தைரியமாக தாங்குவது</td></tr>
    <tr><td>Spill the beans</td><td>Reveal a secret</td><td>இரகசியம் வெளியிடுவது</td></tr>
    <tr><td>Under the weather</td><td>Feeling ill</td><td>உடல் நலமில்லாமல் இருப்பது</td></tr>
  </tbody></table>`;

  h+=`<h3>🔁 STEP 5 — Recall Challenge</h3>`;
  h+=`<div class="rb"><p><strong>Complete this sentence:</strong> "When the manager found out the project failed, he said the team needed to ___________." [Use the idiom "${e(idiom)}"]</p>
  <p><strong>Quick Test:</strong> What does "${e(idiom)}" mean? <em>(Cover the answer above and try to recall!)</em></p></div>`;
  return h;
}

/* ===== SYNONYMS ===== */
function bSyn(q,opts,aL,aV,wO){
  const raw=q.question.replace(/^Select the SYNONYM of:\s*/i,'').trim();
  const word=raw.replace(/\s*Q\.\d+\..*$/,'').trim().split(' ')[0];
  const d=gwd(word);
  const ad=gwd(aV);
  let h='';

  h+=`<h3>🔤 STEP 1 — Target Word: "${e(word)}"</h3>`;
  h+=`<p><strong>Full context:</strong> ${e(raw)}</p>`;
  h+=`<p><strong>Simple Meaning:</strong> ${e(d.meaning)}</p>`;
  h+=`<p><strong>🌿 Root Word:</strong> ${e(d.root)}</p>`;
  h+=`<div class="tb">🇮🇳 <strong>Tamil Meaning:</strong> ${e(d.tamil)}</div>`;
  h+=`<div class="mb">💡 <strong>Memory Trick:</strong> ${e(d.trick)}</div>`;
  h+=`<div class="vb">🎨 <strong>Visual Story:</strong> ${e(d.visual)}</div>`;

  h+=`<h3>✅ STEP 2 — Correct Synonym: (${aL.toUpperCase()}) "${e(aV)}"</h3>`;
  h+=`<p><strong>Meaning of "${e(aV)}":</strong> ${e(ad.meaning)}</p>`;
  h+=`<p><strong>Connection:</strong> Both "${e(word)}" and "${e(aV)}" share the same core meaning — they can substitute each other in most contexts.</p>`;
  h+=`<div class="tb">🇮🇳 <strong>Tamil:</strong> ${e(ad.tamil||'—')}</div>`;

  if(wO.length){
    h+=`<h3>❌ STEP 3 — Confusing Options Explained</h3>`;
    wO.forEach(([l,v])=>{
      const vd=gwd(v);
      h+=`<h4>(${l.toUpperCase()}) ${e(v)}</h4>`;
      h+=`<p><strong>Meaning:</strong> ${e(vd.meaning)}</p>`;
      h+=`<div class="wb">⚠️ <strong>Why NOT a synonym:</strong> "${e(v)}" has a different meaning from "${e(word)}" — they are NOT interchangeable.</div>`;
    });
  }

  h+=`<h3>📊 STEP 4 — Word Family Table</h3>`;
  h+=`<table><thead><tr><th>Word</th><th>Meaning</th><th>Tamil</th><th>Relation to "${e(word)}"</th></tr></thead><tbody>`;
  Object.entries(opts).forEach(([l,v])=>{
    const vd=gwd(v);
    h+=`<tr ${l===aL?'style="background:var(--gnl)"':''}><td><strong>${e(v)}</strong></td><td>${e(vd.meaning.slice(0,55))}…</td><td>${e((vd.tamil||'—').slice(0,30))}</td><td>${l===aL?'✅ SYNONYM':'❌ Different'}</td></tr>`;
  });
  h+=`</tbody></table>`;

  h+=`<h3>🔁 STEP 5 — Recall Quiz</h3>`;
  h+=`<div class="rb"><p><strong>Fill in:</strong> "Her _________ attitude made everyone uncomfortable." (Word meaning: ${e(d.meaning.slice(0,50))}…)</p>
  <p><strong>Word Forms:</strong> Study noun/adjective/verb/adverb forms of "${e(word)}" for SSC comprehension questions.</p>
  <p><strong>Confusable Words:</strong> Be careful not to mix up "${e(word)}" with similar-looking words in the exam!</p></div>`;
  return h;
}

/* ===== ANTONYMS ===== */
function bAnt(q,opts,aL,aV,wO){
  const raw=q.question.replace(/^Select the ANTONYM of:\s*/i,'').trim();
  const word=raw.split(' ')[0].replace(/[^A-Za-z]/g,'');
  const d=gwd(word);
  const ad=gwd(aV);
  let h='';

  h+=`<h3>↔️ STEP 1 — The Opposite Pair</h3>`;
  h+=`<p style="font-size:.95rem"><strong>${e(word)}</strong> <span style="color:var(--ac);font-size:1.3rem">↔</span> <strong>${e(aV)}</strong></p>`;
  h+=`<p>• <strong>${e(word)}:</strong> ${e(d.meaning)}</p>`;
  h+=`<p>• <strong>${e(aV)}:</strong> ${e(ad.meaning)}</p>`;
  h+=`<div class="tb">🇮🇳 <strong>Tamil:</strong> ${e(word)} = ${e((d.tamil||'—').split('(')[0].trim())} | ${e(aV)} = ${e((ad.tamil||'—').split('(')[0].trim())}</div>`;

  h+=`<div class="vb">🌓 <strong>Visual Contrast:</strong><br>
  🌅 <strong>${e(word)}</strong>: ${e(d.visual||'Imagine a scene that perfectly represents this word.')}<br>
  🌑 <strong>${e(aV)}</strong>: ${e(ad.visual||'Now imagine the exact opposite scene.')}</div>`;

  h+=`<p><strong>🌿 Root Analysis:</strong></p>`;
  h+=`<p>• <strong>${e(word)}:</strong> ${e(d.root)}</p>`;
  h+=`<p>• <strong>${e(aV)}:</strong> ${e(ad.root)}</p>`;
  h+=`<div class="mb">💡 <strong>Opposite Pair Trick:</strong> Link "${e(word)}" and "${e(aV)}" as permanent opposites in your mind — like Day ↔ Night or Hot ↔ Cold!</div>`;

  if(wO.length){
    h+=`<h3>❌ STEP 3 — Near-Miss Traps</h3>`;
    wO.forEach(([l,v])=>{
      const vd=gwd(v);
      h+=`<p><strong>(${l.toUpperCase()}) ${e(v)}:</strong> ${e(vd.meaning.slice(0,80))} — <span style="color:var(--rd)">NOT a true antonym</span> of "${e(word)}".</p>`;
    });
  }

  h+=`<h3>📊 STEP 4 — Antonym Table</h3>`;
  h+=`<table><thead><tr><th>Word</th><th>Meaning</th><th>Tamil</th><th>Relation</th></tr></thead><tbody>`;
  Object.entries(opts).forEach(([l,v])=>{
    const vd=gwd(v);
    h+=`<tr ${l===aL?'style="background:var(--gnl)"':''}><td><strong>${e(v)}</strong></td><td>${e(vd.meaning.slice(0,55))}…</td><td>${e((vd.tamil||'—').slice(0,28))}</td><td>${l===aL?'✅ ANTONYM':'❌ Not antonym'}</td></tr>`;
  });
  h+=`</tbody></table>`;

  h+=`<h3>🔁 STEP 5 — Recall Quiz</h3>`;
  h+=`<div class="rb"><p><strong>Opposite Pair Test:</strong> What is the antonym of "${e(word)}"? → <em>(Try to recall before looking above!)</em></p>
  <p><strong>Use in sentences:</strong><br>
  1. "${e(word)}" sentence: ___<br>
  2. "${e(aV)}" sentence: ___</p></div>`;
  return h;
}

/* ===== SPELLING ===== */
function bSpl(q,opts,aL,aV,wO){
  const syllables=aV.replace(/([aeiouAEIOU])/g,'·$1').replace(/^·/,'');
  let h='';
  h+=`<h3>✍️ STEP 1 — The Question</h3>`;
  h+=`<p>${e(q.question)}</p>`;
  h+=`<p><strong>✅ Correct Answer: (${aL.toUpperCase()}) "${e(aV)}"</strong></p>`;
  if(q.exam) h+=`<p><em>Source: ${e(q.exam)}</em></p>`;

  h+=`<h3>🔤 STEP 2 — Word Analysis</h3>`;
  const spd=gwd(aV);
  h+=`<p><strong>Meaning:</strong> ${e(spd.meaning)}</p>`;
  h+=`<div class="tb">🇮🇳 <strong>Tamil:</strong> ${e(spd.tamil||'—')} | 🔊 <strong>Pronunciation:</strong> ${aV.toLowerCase().split('').join('-')}</div>`;
  h+=`<h3>🌿 STEP 3 — Word Breakdown</h3>`;
  h+=`<p><strong>Syllable split:</strong> ${e(syllables)}</p>`;
  h+=`<p><strong>Root/Origin:</strong> ${e(spd.root||'Study the prefix, root, and suffix of this word.')}</p>`;
  h+=`<p><strong>Letter count:</strong> ${aV.length} letters — write it slowly: ${aV.split('').join(' · ')}</p>`;

  h+=`<h3>⚠️ STEP 4 — Why Students Misspell This</h3>`;
  h+=`<div class="cb">📌 Common errors: double letters, silent letters, vowel confusion (e/i, a/e), or adding/removing letters.</div>`;
  h+=`<div class="mb">💡 <strong>Spelling Trick:</strong> ${e(spd.trick||`Break "${aV}" into parts and memorize each part separately!`)}</div>`;

  if(wO.length){
    h+=`<h3>❌ STEP 5 — Wrong Options Analyzed</h3>`;
    wO.forEach(([l,v])=>{
      h+=`<p><strong>(${l.toUpperCase()}) ${e(v)}:</strong> `;
      if(v.length!==aV.length) h+=`Wrong number of letters (${v.length} vs ${aV.length}). `;
      let diff='';
      const min=Math.min(v.length,aV.length);
      for(let i=0;i<min;i++){
        if(v[i]!==aV[i]) diff+=`Position ${i+1}: "${v[i]}" should be "${aV[i]}". `;
      }
      h+=e(diff||'Incorrect spelling — does not follow English spelling rules.')+`</p>`;
    });
  }

  h+=`<h3>🔁 STEP 6 — Spell It Right Challenge</h3>`;
  h+=`<div class="rb">
  <p><strong>Write it 3 times slowly:</strong> ${e(aV)} &nbsp;•&nbsp; ${e(aV)} &nbsp;•&nbsp; ${e(aV)}</p>
  <p><strong>Syllable drill:</strong> ${e(syllables)}</p>
  <p><strong>Letter sequence:</strong> ${aV.split('').map((c,i)=>`<strong>${c}</strong>(${i+1})`).join(' ')}</p>
  </div>`;
  return h;
}

/* ===== HOMONYMS ===== */
function bHom(q,opts,aL,aV,wO){
  let h='';
  h+=`<h3>🔄 STEP 1 — The Homonym Question</h3>`;
  h+=`<p>${e(q.question)}</p>`;
  if(q.exam) h+=`<p><em>Source: ${e(q.exam)}</em></p>`;

  h+=`<h3>🔄 STEP 2 — Understanding Homonyms</h3>`;
  h+=`<p><strong>Homonyms</strong> = Words that sound the same (or are spelled the same) but have <strong>different meanings</strong>.</p>`;
  h+=`<p><strong>✅ Correct Answer: (${aL.toUpperCase()})</strong> ${e(aV)}</p>`;

  const d=gwd(aV.split(' ')[0]);
  h+=`<div class="tb">🇮🇳 <strong>Tamil:</strong> "${e(aV.split(' ')[0])}" can mean different things — context determines which meaning applies!</div>`;

  h+=`<div class="vb">🎨 <strong>Visual Difference:</strong><br>
  🖼️ Scene A: The word in one meaning context<br>
  🖼️ Scene B: The same word in a completely different context<br>
  The sentence in this question shows context A or B — read carefully!</div>`;

  h+=`<div class="mb">💡 <strong>Memory Trick:</strong> For homonyms, always focus on the <strong>CONTEXT</strong> of the sentence — the surrounding words tell you which meaning is intended!</div>`;

  if(wO.length){
    h+=`<h3>❌ STEP 3 — Why Other Options Are Wrong</h3>`;
    wO.forEach(([l,v])=>{
      h+=`<p><strong>(${l.toUpperCase()}) "${e(v)}"</strong> — This option uses a different word or the wrong sense of the homonym. The sentence context does NOT support this meaning.</p>`;
    });
  }

  h+=`<h3>📊 STEP 4 — Common Homonym Pairs in SSC</h3>`;
  h+=`<table><thead><tr><th>Word</th><th>Meaning 1</th><th>Meaning 2</th></tr></thead><tbody>
    <tr><td><strong>Bear</strong></td><td>Animal (जानवर)</td><td>To endure (सहना)</td></tr>
    <tr><td><strong>Bark</strong></td><td>Dog sound (भौंकना)</td><td>Tree covering (छाल)</td></tr>
    <tr><td><strong>Bank</strong></td><td>Financial institution (बैंक)</td><td>River bank (नदी किनारा)</td></tr>
    <tr><td><strong>Lead</strong></td><td>To guide (नेतृत्व)</td><td>Metal (सीसा)</td></tr>
    <tr><td><strong>Left</strong></td><td>Direction (बाईं ओर)</td><td>Past tense of leave (छोड़ा)</td></tr>
  </tbody></table>`;

  h+=`<h3>🔁 STEP 5 — Recall Challenge</h3>`;
  h+=`<div class="rb">
  <p><strong>Write two sentences using the key word in this question — one for each meaning:</strong></p>
  <p>1. Sentence with Meaning 1: ___</p>
  <p>2. Sentence with Meaning 2: ___</p>
  <p><strong>Rule:</strong> Context is KING for homonyms. Never memorize meaning in isolation — always attach it to a sentence!</p>
  </div>`;
  return h;
}
