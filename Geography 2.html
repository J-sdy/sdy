      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;🎋 &lt;span class=&quot;kw&quot;&gt;Sugarcane&lt;/span&gt;&lt;/td&gt;&lt;td&gt;21–27°C, 7–12 months&lt;/td&gt;&lt;td&gt;Deep Alluvial, Black&lt;/td&gt;&lt;td&gt;UP, Maharashtra, Karnataka, TN&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Uttar Pradesh&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🍵 &lt;span class=&quot;kw&quot;&gt;Tea&lt;/span&gt;&lt;/td&gt;&lt;td&gt;20–30°C; 150 cm+ rain; well-drained slopes&lt;/td&gt;&lt;td&gt;Deep, Acidic, Humus-rich&lt;/td&gt;&lt;td&gt;Assam, WB, Kerala, TN&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Assam&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;☕ &lt;span class=&quot;kw&quot;&gt;Coffee&lt;/span&gt;&lt;/td&gt;&lt;td&gt;15–28°C; shade sensitive; frost-sensitive&lt;/td&gt;&lt;td&gt;Well-drained Volcanic/Red&lt;/td&gt;&lt;td&gt;Karnataka, Kerala, TN&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Karnataka&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🪢 &lt;span class=&quot;kw&quot;&gt;Jute&lt;/span&gt;&lt;/td&gt;&lt;td&gt;24–35°C; humidity 80–90%; fresh running water&lt;/td&gt;&lt;td&gt;New Alluvial (Floodplains)&lt;/td&gt;&lt;td&gt;WB, Bihar, Assam, Odisha&lt;/td&gt;&lt;td&gt;&lt;strong&gt;West Bengal&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🌳 &lt;span class=&quot;kw&quot;&gt;Rubber&lt;/span&gt;&lt;/td&gt;&lt;td&gt;25–35°C; 200 cm+ evenly distributed rain&lt;/td&gt;&lt;td&gt;Laterite, Alluvial&lt;/td&gt;&lt;td&gt;Kerala, TN, Karnataka, Tripura&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Kerala&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🚬 &lt;span class=&quot;kw&quot;&gt;Tobacco&lt;/span&gt;&lt;/td&gt;&lt;td&gt;20–30°C; bright sunshine; moderate rain&lt;/td&gt;&lt;td&gt;Sandy Loam, Red&lt;/td&gt;&lt;td&gt;AP, Gujarat, Karnataka, UP&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Andhra Pradesh&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Cash Crops Leading Producers Trick:&lt;/strong&gt;&lt;br&gt;
    &lt;em&gt;&quot;UP Assam Karnataka Kerala West-Bengal Andhra&quot;&lt;/em&gt;&lt;br&gt;
    → Sugarcane · Tea · Coffee · Rubber · Jute · Tobacco
  &lt;/div&gt;

  &lt;div class=&quot;summary-box&quot;&gt;
    &lt;h3&gt;⚡ QUICK RECALL&lt;/h3&gt;
    &lt;ul class=&quot;no-border&quot;&gt;
      &lt;li&gt;&lt;strong&gt;West Bengal&lt;/strong&gt; → Leads Rice production&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Rajasthan&lt;/strong&gt; → Leads Mustard, Barley, Bajra, Moong Dal&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;MP&lt;/strong&gt; → Leads Soyabean &amp;amp; Gram (Pulses)&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Gujarat&lt;/strong&gt; → Leads Cotton&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Karnataka&lt;/strong&gt; → Leads Maize &amp;amp; Coffee&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Kerala&lt;/strong&gt; → Leads Rubber&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════ TAB 4: GREEN REVOLUTION ═══════════════════ --&gt;
&lt;div id=&quot;t4&quot; class=&quot;tab-content&quot;&gt;
  &lt;h2&gt;🟢 Green Revolution – Overview&lt;/h2&gt;

  &lt;div class=&quot;quote-block&quot;&gt;
    &quot;If agriculture fails, everything else will fail.&quot; — &lt;strong&gt;M.S. Swaminathan&lt;/strong&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;Most significant turning point in Indian agriculture&lt;/li&gt;
      &lt;li&gt;Transformed India from a &lt;span class=&quot;kw&quot;&gt;&quot;begging bowl&quot;&lt;/span&gt; → &lt;span class=&quot;kw&quot;&gt;&quot;breadbasket&quot;&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;⚠️ Pre-Green Revolution Crisis (Before mid-1960s)&lt;/h3&gt;
  &lt;div class=&quot;card card-red&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;🚢 &lt;strong&gt;&quot;Ship-to-Mouth&quot; existence&lt;/strong&gt; – heavy dependence on food imports; especially from USA under &lt;span class=&quot;kw&quot;&gt;PL-480 program&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;📉 &lt;strong&gt;Stagnant yields&lt;/strong&gt; – traditional seeds, no irrigation&lt;/li&gt;
      &lt;li&gt;🌾 &lt;strong&gt;Frequent famines&lt;/strong&gt; – memory of &lt;span class=&quot;yr&quot;&gt;1943 Bengal Famine&lt;/span&gt;; back-to-back droughts in &lt;span class=&quot;yr&quot;&gt;1964 &amp;amp; 1965&lt;/span&gt; → brink of mass starvation&lt;/li&gt;
      &lt;li&gt;🏚️ &lt;strong&gt;Feudal structure&lt;/strong&gt; – primitive technological base despite land reforms&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;✅ Why Was It Needed?&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card card-teal&quot;&gt;
      &lt;h4&gt;🍚 Food Security&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Feed a rapidly growing population&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-blue&quot;&gt;
      &lt;h4&gt;🏳️ Economic Sovereignty&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Foreign food aid = threat to &lt;strong&gt;independent foreign policy&lt;/strong&gt;&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-green&quot;&gt;
      &lt;h4&gt;👨‍🌾 Rural Poverty&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Increase farmer income + stabilize food prices for urban poor&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;👨‍🔬 The Architects – Key People&lt;/h3&gt;
  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Person&lt;/th&gt;&lt;th&gt;Role / Title&lt;/th&gt;&lt;th&gt;Contribution&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;🌍 &lt;span class=&quot;kw&quot;&gt;Norman Borlaug&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Father of Green Revolution (Global)&lt;/td&gt;&lt;td&gt;Developed &lt;strong&gt;HYV semi-dwarf wheat&lt;/strong&gt; in Mexico&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🇮🇳 &lt;span class=&quot;kw&quot;&gt;M.S. Swaminathan&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Father of Green Revolution (India)&lt;/td&gt;&lt;td&gt;Advocated Borlaug&#x27;s seeds adapted to Indian conditions&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🏛️ &lt;span class=&quot;kw&quot;&gt;C. Subramaniam&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Union Minister for Agriculture&lt;/td&gt;&lt;td&gt;Provided &lt;strong&gt;political leadership&lt;/strong&gt; to overhaul agricultural administration&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;h2&gt;⚙️ Components of Green Revolution&lt;/h2&gt;

  &lt;h3&gt;🧬 Core Biological Innovation&lt;/h3&gt;
  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;strong&gt;HYV (High-Yielding Varieties)&lt;/strong&gt; – &quot;dwarf&quot; seeds for wheat &amp;amp; rice → &lt;strong&gt;2–3× more grain&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Short Duration&lt;/strong&gt; – faster maturity → &lt;strong&gt;multiple crops per year&lt;/strong&gt; (↑ cropping intensity)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;🧪 Critical Input Requirements&lt;/h3&gt;
  &lt;div class=&quot;card card-amber&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;⚠️ &lt;strong&gt;Chemical Intensification&lt;/strong&gt; – HYVs are &quot;hungry&quot; crops; need massive &lt;strong&gt;NPK (4:2:1)&lt;/strong&gt; + pesticides&lt;/li&gt;
      &lt;li&gt;💧 &lt;strong&gt;Controlled Irrigation&lt;/strong&gt; – can&#x27;t survive on erratic monsoon alone → massive expansion of &lt;strong&gt;canal &amp;amp; tube-well irrigation&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;⚡ &lt;strong&gt;Rural Electrification&lt;/strong&gt; – needed to power pumps &amp;amp; machinery&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;🏗️ Structural &amp;amp; Institutional Support&lt;/h3&gt;
  &lt;div class=&quot;card card-blue&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;🚜 &lt;strong&gt;Farm Mechanization&lt;/strong&gt; – animal power → tractors &amp;amp; harvesters&lt;/li&gt;
      &lt;li&gt;🏦 &lt;strong&gt;Credit &amp;amp; Finance&lt;/strong&gt; – rural banking networks for expensive inputs&lt;/li&gt;
      &lt;li&gt;📜 &lt;strong&gt;Land Reforms&lt;/strong&gt; – consolidated fragmented holdings; abolished Zamindari system&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;🏛️ Policy &amp;amp; Infrastructure&lt;/h3&gt;
  &lt;div class=&quot;card card-purple&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;📋 &lt;span class=&quot;kw&quot;&gt;CADP (Command Area Development Program)&lt;/span&gt; – &lt;span class=&quot;yr&quot;&gt;5th Five Year Plan&lt;/span&gt;
        &lt;ul style=&quot;margin-top:4px; padding-left:12px;&quot;&gt;
          &lt;li style=&quot;font-size:0.82rem; border:none;&quot;&gt;On-Farm: channels, leveling&lt;/li&gt;
          &lt;li style=&quot;font-size:0.82rem; border:none;&quot;&gt;Off-Farm: roads, markets, connectivity&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/li&gt;
      &lt;li&gt;💰 &lt;span class=&quot;kw&quot;&gt;MSP (Minimum Support Price)&lt;/span&gt; – price guarantee → encouraged market-oriented production&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Components Mnemonic: &quot;BCLIE-PM&quot;&lt;/strong&gt;&lt;br&gt;
    &lt;strong&gt;B&lt;/strong&gt;iological (HYV) · &lt;strong&gt;C&lt;/strong&gt;hemicals · &lt;strong&gt;L&lt;/strong&gt;and reforms · &lt;strong&gt;I&lt;/strong&gt;rrigation · &lt;strong&gt;E&lt;/strong&gt;lectrification · &lt;strong&gt;P&lt;/strong&gt;olicies (CADP/MSP) · &lt;strong&gt;M&lt;/strong&gt;echanization
  &lt;/div&gt;

  &lt;div class=&quot;summary-box&quot;&gt;
    &lt;h3&gt;⚡ QUICK RECALL&lt;/h3&gt;
    &lt;ul class=&quot;no-border&quot;&gt;
      &lt;li&gt;India: &quot;begging bowl&quot; → &quot;breadbasket&quot; via Green Revolution&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;PL-480&lt;/strong&gt; = US food aid program before Green Revolution&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Borlaug&lt;/strong&gt; = Global father (Mexico, dwarf wheat) · &lt;strong&gt;Swaminathan&lt;/strong&gt; = Indian father&lt;/li&gt;
      &lt;li&gt;HYV crops = &lt;strong&gt;2–3× yield&lt;/strong&gt; but need NPK 4:2:1 + irrigation + electricity&lt;/li&gt;
      &lt;li&gt;CADP = &lt;span class=&quot;yr&quot;&gt;5th Plan&lt;/span&gt; · Provided on-farm &amp;amp; off-farm infrastructure&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════ TAB 5: PHASES ═══════════════════ --&gt;
&lt;div id=&quot;t5&quot; class=&quot;tab-content&quot;&gt;
  &lt;h2&gt;📈 Phases of Green Revolution&lt;/h2&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Memory Trick for Phases:&lt;/strong&gt; &lt;em&gt;&quot;Wheat Rice Dry&quot;&lt;/em&gt; → &lt;span class=&quot;yr&quot;&gt;1965&lt;/span&gt; · &lt;span class=&quot;yr&quot;&gt;1980&lt;/span&gt; · &lt;span class=&quot;yr&quot;&gt;1991&lt;/span&gt;&lt;br&gt;
    Think: &lt;strong&gt;W&lt;/strong&gt;heat = 1st · &lt;strong&gt;R&lt;/strong&gt;ice = 2nd · &lt;strong&gt;D&lt;/strong&gt;ry land = 3rd
  &lt;/div&gt;

  &lt;div class=&quot;phase-flow&quot;&gt;
    &lt;div class=&quot;phase-item&quot;&gt;
      &lt;div class=&quot;phase-dot-col&quot;&gt;
        &lt;div class=&quot;phase-dot&quot;&gt;I&lt;/div&gt;
        &lt;div class=&quot;phase-line&quot;&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;phase-body&quot;&gt;
        &lt;h4&gt;Phase I (&lt;span class=&quot;yr&quot;&gt;1965–1980&lt;/span&gt;) – The Wheat Revolution 🌾&lt;/h4&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Primary goal:&lt;/strong&gt; Immediate food security · end &quot;begging bowl&quot; image&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Focus:&lt;/strong&gt; HYV seeds – specifically for &lt;span class=&quot;kw&quot;&gt;Wheat&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Geography:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;Punjab · Haryana · Western UP&lt;/span&gt; (existing infrastructure)&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Outcome:&lt;/strong&gt; Food grain production &lt;strong&gt;tripled: 33 MT → 100 MT&lt;/strong&gt;&lt;/li&gt;
          &lt;li&gt;✅ India achieved &lt;strong&gt;self-sufficiency&lt;/strong&gt; · famine effectively mitigated&lt;/li&gt;
        &lt;/ul&gt;
        &lt;div class=&quot;mnemonic&quot; style=&quot;margin-top:6px;&quot;&gt;
          💡 &lt;em&gt;&quot;PHW&quot;&lt;/em&gt; → &lt;strong&gt;P&lt;/strong&gt;unjab + &lt;strong&gt;H&lt;/strong&gt;aryana + &lt;strong&gt;W&lt;/strong&gt;est UP did the Wheat Revolution
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;phase-item&quot;&gt;
      &lt;div class=&quot;phase-dot-col&quot;&gt;
        &lt;div class=&quot;phase-dot&quot;&gt;II&lt;/div&gt;
        &lt;div class=&quot;phase-line&quot;&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;phase-body&quot;&gt;
        &lt;h4&gt;Phase II (&lt;span class=&quot;yr&quot;&gt;1980–1991&lt;/span&gt;) – Expansion to Rice 🍚&lt;/h4&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Focus:&lt;/strong&gt; HYV technology expanded to &lt;span class=&quot;kw&quot;&gt;Rice&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Geography:&lt;/strong&gt; High-rainfall areas (&amp;gt;100 cm) – West Bengal, Bihar, coastal deltas: &lt;span class=&quot;kw&quot;&gt;Krishna-Godavari&lt;/span&gt; &amp;amp; &lt;span class=&quot;kw&quot;&gt;Cauvery&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;⚠️ &lt;strong&gt;Challenges:&lt;/strong&gt; Only partial success; hindered by lack of land reforms + traditional outlook of farmers&lt;/li&gt;
          &lt;li&gt;✅ Some areas (West Bengal) saw gains&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;phase-item&quot;&gt;
      &lt;div class=&quot;phase-dot-col&quot;&gt;
        &lt;div class=&quot;phase-dot&quot;&gt;III&lt;/div&gt;
        &lt;div class=&quot;phase-line&quot;&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;phase-body&quot;&gt;
        &lt;h4&gt;Phase III (&lt;span class=&quot;yr&quot;&gt;1991–2003&lt;/span&gt;) – Dry Land &amp;amp; Diversification 🌵&lt;/h4&gt;
        &lt;ul&gt;
          &lt;li&gt;&lt;strong&gt;Goal:&lt;/strong&gt; &quot;Bridging the gaps&quot; → neglected crops &amp;amp; arid regions&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Focus:&lt;/strong&gt; Dry land agriculture – &lt;span class=&quot;kw&quot;&gt;Oilseeds · Pulses · Cotton&lt;/span&gt;&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;Strategy:&lt;/strong&gt; Introduction of &lt;span class=&quot;kw&quot;&gt;Integrated Watershed Management Programme&lt;/span&gt; for semi-arid regions&lt;/li&gt;
          &lt;li&gt;⚠️ Ecological damage (soil degradation, water depletion) became evident&lt;/li&gt;
          &lt;li&gt;📋 Government pivoted to sustainable development in &lt;span class=&quot;kw&quot;&gt;10th Five-Year Plan&lt;/span&gt;&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;phase-item&quot;&gt;
      &lt;div class=&quot;phase-dot-col&quot;&gt;
        &lt;div class=&quot;phase-dot&quot; style=&quot;background:var(--amber);&quot;&gt;🌈&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;phase-body&quot;&gt;
        &lt;h4&gt;Rainbow Revolution – Inclusive Growth (Post-20th Century)&lt;/h4&gt;
        &lt;ul&gt;
          &lt;li&gt;Holistic initiative integrating &lt;strong&gt;multiple sectors&lt;/strong&gt; beyond just grains&lt;/li&gt;
          &lt;li&gt;Yellow Revolution (Oilseeds) · Blue Revolution (Fisheries) · White Revolution (Dairy) · Silver Revolution (Poultry) · Brown Revolution (Fertilizers)&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;📊 Phase-wise Comparison&lt;/h3&gt;
  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Phase&lt;/th&gt;&lt;th&gt;Years&lt;/th&gt;&lt;th&gt;Crop Focus&lt;/th&gt;&lt;th&gt;Region&lt;/th&gt;&lt;th&gt;Key Outcome&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;Phase I&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1965–1980&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Wheat (HYV)&lt;/td&gt;&lt;td&gt;Punjab, Haryana, W.UP&lt;/td&gt;&lt;td&gt;33 MT → 100 MT; self-sufficiency&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Phase II&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1980–1991&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Rice (HYV)&lt;/td&gt;&lt;td&gt;WB, Bihar, coastal deltas&lt;/td&gt;&lt;td&gt;Partial success; land reform gap&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Phase III&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;yr&quot;&gt;1991–2003&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Oilseeds, Pulses, Cotton&lt;/td&gt;&lt;td&gt;Arid/semi-arid regions&lt;/td&gt;&lt;td&gt;Diversification; sustainability focus&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Year Trick:&lt;/strong&gt; &lt;em&gt;&quot;65-80-91&quot;&lt;/em&gt; → Phase gaps: &lt;strong&gt;15 years&lt;/strong&gt; then &lt;strong&gt;11 years&lt;/strong&gt;&lt;br&gt;
    Phase I starts &lt;span class=&quot;yr&quot;&gt;1965&lt;/span&gt; (year of drought) · Phase II at &lt;span class=&quot;yr&quot;&gt;1980&lt;/span&gt; (new decade) · Phase III at &lt;span class=&quot;yr&quot;&gt;1991&lt;/span&gt; (liberalisation year)
  &lt;/div&gt;

  &lt;div class=&quot;summary-box&quot;&gt;
    &lt;h3&gt;⚡ QUICK RECALL&lt;/h3&gt;
    &lt;ul class=&quot;no-border&quot;&gt;
      &lt;li&gt;Phase I → &lt;strong&gt;Wheat · Punjab/Haryana · 33→100 MT&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Phase II → &lt;strong&gt;Rice · WB/Bihar/Deltas · Partial success&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Phase III → &lt;strong&gt;Oilseeds/Pulses · Dry land · Sustainability&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Rainbow Revolution = integrated multi-sector agricultural growth&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════ TAB 6: IMPACT ═══════════════════ --&gt;
&lt;div id=&quot;t6&quot; class=&quot;tab-content&quot;&gt;
  &lt;h2&gt;⚖️ Impact of Green Revolution – The Double-Edged Sword&lt;/h2&gt;

  &lt;h3&gt;✅ Positive Impacts&lt;/h3&gt;
  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;🏆 &lt;strong&gt;Self-Sufficiency:&lt;/strong&gt; India became a &lt;span class=&quot;kw&quot;&gt;net exporter&lt;/span&gt; of food grains&lt;/li&gt;
      &lt;li&gt;🏭 &lt;strong&gt;Industrial Growth:&lt;/strong&gt; Demand for tractors, pump sets, fertilizers → spurred &lt;strong&gt;manufacturing sector&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;🏦 &lt;strong&gt;Buffer Stocks:&lt;/strong&gt; Created massive grain reserves for &lt;span class=&quot;kw&quot;&gt;FCI (Food Corporation of India)&lt;/span&gt; → crucial for &lt;span class=&quot;kw&quot;&gt;PDS (Public Distribution System)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;🔹 &lt;strong&gt;Example:&lt;/strong&gt; Wheat production: &lt;span class=&quot;yr&quot;&gt;1960s&lt;/span&gt; → &lt;strong&gt;10 MT&lt;/strong&gt;; by &lt;span class=&quot;yr&quot;&gt;1990&lt;/span&gt; → &lt;strong&gt;55 MT&lt;/strong&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;⚠️ Negative Impacts&lt;/h3&gt;
  &lt;div class=&quot;card card-red&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;🌍 &lt;strong&gt;Ecological Degradation:&lt;/strong&gt; Excessive chemical fertilizers → &lt;strong&gt;soil salinity&lt;/strong&gt;; over-extraction of groundwater → &lt;strong&gt;falling water table&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;📉 &lt;strong&gt;Inter-Regional Disparity:&lt;/strong&gt; Regions like &lt;span class=&quot;kw&quot;&gt;Vidarbha&lt;/span&gt; and &lt;span class=&quot;kw&quot;&gt;Eastern India&lt;/span&gt; lagged → economic divide&lt;/li&gt;
      &lt;li&gt;🏥 &lt;strong&gt;Health Hazards:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;&quot;Cancer Train&quot;&lt;/span&gt; (Abohar-Jodhpur Express, Punjab) – high pesticide use in &quot;Cotton Belt&quot; → surge in cancer cases&lt;/li&gt;
      &lt;li&gt;🌿 &lt;strong&gt;Loss of Biodiversity:&lt;/strong&gt; Traditional climate-resilient varieties replaced by &lt;strong&gt;mono-cropping&lt;/strong&gt; of Wheat &amp;amp; Rice&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;quote-block&quot;&gt;
    &quot;The Green Revolution has been a success in terms of food production, but it has also brought the &#x27;Green Revolution&#x27; of environmental degradation.&quot; — &lt;strong&gt;Vandana Shiva&lt;/strong&gt; (Environmental Activist)
  &lt;/div&gt;

  &lt;h2&gt;🏛️ Government Steps to Address Negatives&lt;/h2&gt;

  &lt;div class=&quot;scheme-row&quot;&gt;
    &lt;div class=&quot;scheme-name&quot;&gt;Soil Health Card&lt;br&gt;&lt;span class=&quot;yr&quot;&gt;2015&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;scheme-desc&quot;&gt;Issued to &lt;strong&gt;100 million+ farmers&lt;/strong&gt; to stop &quot;blind&quot; fertilizer use and restore soil chemistry&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;scheme-row&quot;&gt;
    &lt;div class=&quot;scheme-name&quot;&gt;PMKSY&lt;/div&gt;
    &lt;div class=&quot;scheme-desc&quot;&gt;&lt;strong&gt;Pradhan Mantri Krishi Sinchayee Yojana&lt;/strong&gt; – promotes &quot;Per Drop More Crop&quot; via drip irrigation to fix groundwater depletion&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;scheme-row&quot;&gt;
    &lt;div class=&quot;scheme-name&quot;&gt;PKVY&lt;/div&gt;
    &lt;div class=&quot;scheme-desc&quot;&gt;&lt;strong&gt;Paramparagat Krishi Vikas Yojana&lt;/strong&gt; – supports clusters of farmers moving toward &lt;strong&gt;Organic Farming&lt;/strong&gt; to heal land from chemical toxicity&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;scheme-row&quot;&gt;
    &lt;div class=&quot;scheme-name&quot;&gt;National Millet Mission &lt;span class=&quot;yr&quot;&gt;2018&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;scheme-desc&quot;&gt;Rebranding millets as &lt;strong&gt;&quot;Nutri-Cereals&quot;&lt;/strong&gt; to break Rice-Wheat mono-cropping cycle&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Government Schemes Mnemonic:&lt;/strong&gt; &lt;em&gt;&quot;SOIL Produces More Nutrition&quot;&lt;/em&gt;&lt;br&gt;
    &lt;strong&gt;S&lt;/strong&gt;oil Health Card · &lt;strong&gt;P&lt;/strong&gt;MKSY · &lt;strong&gt;M&lt;/strong&gt;illet Mission · &lt;strong&gt;N&lt;/strong&gt;atural Farming (PKVY)
  &lt;/div&gt;

  &lt;h2&gt;🔮 Way Forward – &quot;Climate-Smart&quot; Shift&lt;/h2&gt;

  &lt;div class=&quot;card card-teal&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;🌾 &lt;strong&gt;Bio-fortification:&lt;/strong&gt; Crops like &lt;span class=&quot;kw&quot;&gt;&#x27;Golden Rice&#x27;&lt;/span&gt; or high-protein maize → solve &quot;hidden hunger&quot; (malnutrition)&lt;/li&gt;
      &lt;li&gt;🌿 &lt;strong&gt;Zero Budget Natural Farming (ZBNF):&lt;/strong&gt; Eliminate chemical inputs → reduce debt-cycle for small farmers&lt;/li&gt;
      &lt;li&gt;💧 &lt;strong&gt;Direct Seeded Rice (DSR):&lt;/strong&gt; Grow rice with &lt;strong&gt;significantly less water&lt;/strong&gt; → directly addresses &lt;span class=&quot;kw&quot;&gt;Punjab groundwater crisis&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;📱 Focus on &lt;strong&gt;&quot;Digital Agriculture&quot;&lt;/strong&gt; and &lt;strong&gt;&quot;Nature-Positive&quot;&lt;/strong&gt; farming&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;summary-box&quot;&gt;
    &lt;h3&gt;⚡ QUICK RECALL&lt;/h3&gt;
    &lt;ul class=&quot;no-border&quot;&gt;
      &lt;li&gt;Wheat: &lt;strong&gt;10 MT (1960s) → 55 MT (1990)&lt;/strong&gt; – massive leap&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;&quot;Cancer Train&quot;&lt;/strong&gt; = Abohar-Jodhpur Express → pesticide effect in Punjab&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;FCI + PDS&lt;/strong&gt; = buffer stock system born from Green Revolution&lt;/li&gt;
      &lt;li&gt;Key negatives: &lt;strong&gt;Soil salinity · Groundwater depletion · Biodiversity loss · Regional disparity&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Remedies: &lt;strong&gt;ZBNF · DSR · Bio-fortification · Digital Agriculture&lt;/strong&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════ TAB 8: MSP &amp; FRP ═══════════════════ --&gt;
&lt;div id=&quot;t8&quot; class=&quot;tab-content&quot;&gt;
  &lt;h2&gt;💰 Minimum Support Price (MSP)&lt;/h2&gt;

  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;strong&gt;Definition:&lt;/strong&gt; Price at which government offers to &lt;span class=&quot;kw&quot;&gt;purchase crops from farmers&lt;/span&gt; regardless of market price&lt;/li&gt;
      &lt;li&gt;Acts as a &lt;span class=&quot;kw&quot;&gt;safety net / &quot;floor price&quot;&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Objective:&lt;/strong&gt; Guaranteed price + encourage production of pulses/oilseeds&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Recommended by:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;CACP (Commission for Agricultural Costs and Prices)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Approved by:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;CCEA (Cabinet Committee on Economic Affairs)&lt;/span&gt; – chaired by PM&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Crops covered:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;22 mandated crops&lt;/span&gt; + Fair &amp;amp; Remunerative Price for sugarcane&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;📋 MSP Crop Coverage&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card card-blue&quot;&gt;
      &lt;h4&gt;7 Cereals&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;&quot;&gt;Paddy · Wheat · Maize · Sorghum · Pearl Millet · Barley · Ragi&lt;/p&gt;
      &lt;div class=&quot;mnemonic&quot; style=&quot;margin-top:6px;&quot;&gt;💡 &lt;em&gt;&quot;PWM SPB Ragi&quot;&lt;/em&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-teal&quot;&gt;
      &lt;h4&gt;5 Pulses&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;&quot;&gt;Gram · Tur · Moong · Urad · Lentil&lt;/p&gt;
      &lt;div class=&quot;mnemonic&quot; style=&quot;margin-top:6px;&quot;&gt;💡 &lt;em&gt;&quot;GT MUL&quot;&lt;/em&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-amber&quot;&gt;
      &lt;h4&gt;7 Oilseeds&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;&quot;&gt;Groundnut · Rapeseed-Mustard · Soybean · Sesamum · Sunflower · Safflower · Nigerseed&lt;/p&gt;
      &lt;div class=&quot;mnemonic&quot; style=&quot;margin-top:6px;&quot;&gt;💡 &lt;em&gt;&quot;GRMSSN + Safflower&quot;&lt;/em&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-green&quot;&gt;
      &lt;h4&gt;3 Commercial Crops&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;&quot;&gt;Copra · Sugarcane (FRP) · Cotton · Raw Jute&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;🧮 How is MSP Calculated?&lt;/h3&gt;
  &lt;div class=&quot;card card-purple&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;Since &lt;span class=&quot;yr&quot;&gt;2018–19&lt;/span&gt;: MSP = at least &lt;span class=&quot;kw&quot;&gt;1.5 times&lt;/span&gt; all-India weighted average cost of production&lt;/li&gt;
    &lt;/ul&gt;
    &lt;h4 style=&quot;margin-top:10px;&quot;&gt;Three Cost Types (CACP considers):&lt;/h4&gt;
    &lt;div class=&quot;formula&quot;&gt;A2 = Actual paid-out costs
     (seeds + fertilizers + fuel + irrigation + hired labour)&lt;/div&gt;
    &lt;div class=&quot;formula&quot;&gt;A2+FL = A2 + imputed value of unpaid family labour&lt;/div&gt;
    &lt;div class=&quot;formula&quot;&gt;C2 = A2+FL + interest on own land value + fixed capital assets
     (MOST COMPREHENSIVE)&lt;/div&gt;
    &lt;div class=&quot;mnemonic&quot; style=&quot;margin-top:8px;&quot;&gt;
      💡 &lt;strong&gt;Mnemonic:&lt;/strong&gt; &lt;em&gt;&quot;A-AF-C&quot;&lt;/em&gt; → A2 · A2+FL · C2 (gets more comprehensive each step)
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h2&gt;🍬 Fair and Remunerative Price (FRP) – Sugarcane Only&lt;/h2&gt;

  &lt;div class=&quot;card card-amber&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;strong&gt;Definition:&lt;/strong&gt; Minimum price &lt;span class=&quot;kw&quot;&gt;sugar mills are legally required&lt;/span&gt; to pay farmers for sugarcane&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Legal Basis:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;Sugarcane (Control) Order, 1966&lt;/span&gt; – under Essential Commodities Act&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Recommended by:&lt;/strong&gt; CACP · &lt;strong&gt;Approved by:&lt;/strong&gt; CCEA&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Key Difference from MSP:&lt;/strong&gt; Private/cooperative sugar mills are primary payers (not govt like in MSP)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;📊 MSP vs FRP – Comparison Table&lt;/h3&gt;
  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Basis&lt;/th&gt;&lt;th&gt;MSP&lt;/th&gt;&lt;th&gt;FRP&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;Full Form&lt;/td&gt;&lt;td&gt;Minimum Support Price&lt;/td&gt;&lt;td&gt;Fair and Remunerative Price&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Applicable To&lt;/td&gt;&lt;td&gt;&lt;strong&gt;23 crops&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Only Sugarcane&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;

&lt;script&gt;
  function showTab(id, btn) {
    document.querySelectorAll(&#x27;.tab-content&#x27;).forEach(el =&gt; el.classList.remove(&#x27;active&#x27;));
    document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(el =&gt; el.classList.remove(&#x27;active&#x27;));
    document.getElementById(id).classList.add(&#x27;active&#x27;);
    btn.classList.add(&#x27;active&#x27;);
    window.scrollTo({ top: 0, behavior: &#x27;smooth&#x27; });
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: &#x27;smooth&#x27; });
  }

  window.addEventListener(&#x27;scroll&#x27;, () =&gt; {
    const btn = document.getElementById(&#x27;scrollTop&#x27;);
    if (window.scrollY &gt; 250) btn.classList.add(&#x27;show&#x27;);
    else btn.classList.remove(&#x27;show&#x27;);
  });
&lt;/script&gt;
