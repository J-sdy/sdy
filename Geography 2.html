&lt;!-- ===================== TAB 1: INTRO &amp; TAXONOMY ===================== --&gt;
&lt;div id=&quot;t1&quot; class=&quot;panel active&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;📌&lt;/span&gt; What is Soil?&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Thin upper layer&lt;/span&gt; of Earth&#x27;s crust formed from &lt;span class=&quot;kw&quot;&gt;weathering of rocks&lt;/span&gt; mixed with organic matter, water, air &amp; microorganisms&lt;/li&gt;
      &lt;li&gt;Acts as the &lt;span class=&quot;kw&quot;&gt;medium for plant growth&lt;/span&gt;; supports terrestrial life&lt;/li&gt;
      &lt;li&gt;Develops over &lt;span class=&quot;kw&quot;&gt;thousands of years&lt;/span&gt; through &lt;span class=&quot;kw&quot;&gt;physical, chemical &amp; biological weathering&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Nature of soil depends on: &lt;span class=&quot;acc&quot;&gt;climate, parent rock, relief, vegetation &amp; time&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;🧠 Mnemonic – Factors of Soil Formation&lt;/div&gt;
      &lt;strong&gt;&quot;Can Parents Really Visit Tomorrow?&quot;&lt;/strong&gt;&lt;br&gt;
      &lt;span class=&quot;purple&quot;&gt;C&lt;/span&gt;limate · &lt;span class=&quot;purple&quot;&gt;P&lt;/span&gt;arent rock · &lt;span class=&quot;purple&quot;&gt;R&lt;/span&gt;elief · &lt;span class=&quot;purple&quot;&gt;V&lt;/span&gt;egetation · &lt;span class=&quot;purple&quot;&gt;T&lt;/span&gt;ime
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;🔬&lt;/span&gt; Soil Taxonomy&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Scientific system&lt;/span&gt; of classifying soils based on formation, physical &amp; chemical properties, horizons, moisture, temperature &amp; degree of development&lt;/li&gt;
      &lt;li&gt;Widely used system developed by &lt;span class=&quot;kw&quot;&gt;US Department of Agriculture (USDA)&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;1. Entisols – Youngest Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;ENTISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Youngest &amp; least developed&lt;/span&gt; soils; little or no horizon development&lt;/li&gt;
      &lt;li&gt;Form in areas where soil formation is &lt;span class=&quot;kw&quot;&gt;continuously disturbed&lt;/span&gt; – erosion, flooding, sand deposition, steep slopes&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; Sandy/coarse texture · Low humus &amp; fertility · &lt;span class=&quot;red&quot;&gt;Poor water-holding capacity&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Rajasthan desert, Indo-Gangetic floodplains, Coastal sandy regions&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;2. Inceptisols – Young Intermediate Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;INCEPTISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Young soils with &lt;span class=&quot;kw&quot;&gt;beginning stages of horizon development&lt;/span&gt;; intermediate between Entisols &amp; mature soils&lt;/li&gt;
      &lt;li&gt;Form under &lt;span class=&quot;kw&quot;&gt;moderate weathering conditions&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Among the &lt;span class=&quot;kw&quot;&gt;most widespread &amp; agriculturally important&lt;/span&gt; soils in India&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; Loamy texture · Moderate fertility · Fair moisture retention&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Indo-Gangetic plains, Himalayan foothills, Assam valley&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;3. Vertisols – Black Shrink-Swell Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;VERTISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Deep &lt;span class=&quot;kw&quot;&gt;black clay-rich soils&lt;/span&gt; formed from &lt;span class=&quot;kw&quot;&gt;basaltic parent rocks&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Famous for &lt;span class=&quot;kw&quot;&gt;shrink–swell nature&lt;/span&gt; → &lt;span class=&quot;acc&quot;&gt;deep cracks in dry season&lt;/span&gt;, swells during rains&lt;/li&gt;
      &lt;li&gt;Called &lt;span class=&quot;kw&quot;&gt;self-ploughing&lt;/span&gt; soils&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; High clay content · Deep cracks in summer · High moisture retention&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Maharashtra, Madhya Pradesh, Gujarat, Telangana, Karnataka&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;💡 Tip&lt;/div&gt;
      Vertisols = &lt;span class=&quot;kw&quot;&gt;Black Soil / Regur Soil&lt;/span&gt; of India. &lt;strong&gt;&quot;Verti&quot; = vertical cracks!&lt;/strong&gt;
    &lt;/div&gt;

    &lt;div class=&quot;sh&quot;&gt;4. Alfisols – Moderately Leached Red Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;ALFISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Moderately &lt;span class=&quot;kw&quot;&gt;leached soils&lt;/span&gt; with &lt;span class=&quot;kw&quot;&gt;relatively high natural fertility&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Clay accumulation in &lt;span class=&quot;kw&quot;&gt;subsurface horizon&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Develop under &lt;span class=&quot;kw&quot;&gt;deciduous forest vegetation&lt;/span&gt; in regions of moderate rainfall&lt;/li&gt;
      &lt;li&gt;Associated with &lt;span class=&quot;kw&quot;&gt;red &amp; red-loamy soils&lt;/span&gt; in India&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; Red/reddish-brown colour · Moderate fertility · Clay accumulation below surface&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Karnataka, Tamil Nadu, Andhra Pradesh, Eastern Rajasthan&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;5. Ultisols – Highly Weathered Acidic Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;ULTISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Old, &lt;span class=&quot;kw&quot;&gt;highly weathered soils&lt;/span&gt; formed in &lt;span class=&quot;kw&quot;&gt;humid tropical &amp; subtropical climates&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Intense rainfall &amp; leaching → most nutrients &lt;span class=&quot;red&quot;&gt;removed&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Soils are &lt;span class=&quot;kw&quot;&gt;acidic &amp; rich in iron &amp; aluminium oxides&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; Acidic · Strongly leached · Rich in Fe &amp; Al oxides&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Western Ghats, Kerala hills, North-East India&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;6. Aridisols – Desert Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;ARIDISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Desert soils formed in &lt;span class=&quot;kw&quot;&gt;arid &amp; semi-arid climates&lt;/span&gt; where &lt;span class=&quot;kw&quot;&gt;evaporation exceeds precipitation&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Limited rainfall restricts vegetation &amp; soil development → &lt;span class=&quot;acc&quot;&gt;dry, sandy, often saline&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; Sandy texture · Saline/alkaline tendency · Low organic matter&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Western Rajasthan, Kutch region of Gujarat&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;7. Mollisols – World&#x27;s Most Fertile Soils&lt;/div&gt;
    &lt;span class=&quot;tax-badge&quot;&gt;MOLLISOLS&lt;/span&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Dark-coloured, &lt;span class=&quot;kw&quot;&gt;humus-rich soils&lt;/span&gt; formed under &lt;span class=&quot;kw&quot;&gt;grassland vegetation&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Among the &lt;span class=&quot;green&quot;&gt;world&#x27;s most fertile soils&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;High organic matter → supports productive agriculture&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Physical Characteristics:&lt;/span&gt; High organic matter · Dark-coloured topsoil · Good moisture retention&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;India Distribution:&lt;/span&gt; Himalayan grasslands, Terai regions of UP &amp; Uttarakhand&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;Taxonomy Quick Compare&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Soil Order&lt;/th&gt;&lt;th&gt;Key Feature&lt;/th&gt;&lt;th&gt;Indian Regions&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Entisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Youngest; no horizons; sandy&lt;/td&gt;&lt;td&gt;Rajasthan desert, IGP floodplains&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Inceptisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Young; moderate development&lt;/td&gt;&lt;td&gt;Indo-Gangetic plains, Assam&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Vertisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Black clay; shrink-swell cracks&lt;/td&gt;&lt;td&gt;Maharashtra, MP, Gujarat&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Alfisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Red; moderately leached&lt;/td&gt;&lt;td&gt;Karnataka, TN, AP&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Ultisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Highly weathered; acidic&lt;/td&gt;&lt;td&gt;W. Ghats, Kerala, NE India&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Aridisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Desert; saline; dry&lt;/td&gt;&lt;td&gt;W. Rajasthan, Kutch&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Mollisols&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Most fertile; humus-rich; dark&lt;/td&gt;&lt;td&gt;Himalayan grasslands, Terai&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;🧠 Mnemonic – Soil Orders (Young → Old)&lt;/div&gt;
      &lt;strong&gt;&quot;Every Instant Verdict Always Underlines All Matters&quot;&lt;/strong&gt;&lt;br&gt;
      &lt;span class=&quot;purple&quot;&gt;E&lt;/span&gt;ntisols · &lt;span class=&quot;purple&quot;&gt;I&lt;/span&gt;nceptisols · &lt;span class=&quot;purple&quot;&gt;V&lt;/span&gt;ertisols · &lt;span class=&quot;purple&quot;&gt;A&lt;/span&gt;lfisols · &lt;span class=&quot;purple&quot;&gt;U&lt;/span&gt;ltisols · &lt;span class=&quot;purple&quot;&gt;A&lt;/span&gt;ridisols · &lt;span class=&quot;purple&quot;&gt;M&lt;/span&gt;ollisols
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ===================== TAB 2: SOIL PROFILE ===================== --&gt;
&lt;div id=&quot;t2&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;🧱&lt;/span&gt; What is a Soil Profile?&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Vertical section of soil&lt;/span&gt; showing different layers (horizons) from surface down to parent rock&lt;/li&gt;
      &lt;li&gt;Each horizon differs in &lt;span class=&quot;kw&quot;&gt;composition, colour, texture &amp; organic content&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Soil is made up of layers called &lt;span class=&quot;kw&quot;&gt;horizons&lt;/span&gt; that differ in colour, texture, composition &amp; biological activity&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;📊&lt;/span&gt; Soil Horizons – Top to Bottom&lt;/div&gt;

    &lt;ul class=&quot;horizon-list&quot;&gt;
      &lt;li class=&quot;horizon-item&quot;&gt;
        &lt;div class=&quot;horizon-dot h-o&quot;&gt;O&lt;/div&gt;
        &lt;div&gt;
          &lt;strong&gt;O Horizon – Organic Layer&lt;/strong&gt;
          &lt;ul class=&quot;notes&quot; style=&quot;margin-top:4px;&quot;&gt;
            &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Uppermost organic layer&lt;/span&gt; made of decomposed leaves, roots, twigs &amp; humus&lt;/li&gt;
            &lt;li&gt;Dark in colour; &lt;span class=&quot;kw&quot;&gt;rich in microorganisms&lt;/span&gt;&lt;/li&gt;
            &lt;li&gt;Retains moisture; common in &lt;span class=&quot;kw&quot;&gt;forest soils&lt;/span&gt;&lt;/li&gt;
            &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Depth:&lt;/span&gt; 0–5 cm&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;horizon-item&quot;&gt;
        &lt;div class=&quot;horizon-dot h-a&quot;&gt;A&lt;/div&gt;
        &lt;div&gt;
          &lt;strong&gt;A Horizon – Top Soil&lt;/strong&gt;
          &lt;ul class=&quot;notes&quot; style=&quot;margin-top:4px;&quot;&gt;
            &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Darkest &amp; most fertile layer&lt;/span&gt;; contains humus, minerals, water, air &amp; roots&lt;/li&gt;
            &lt;li&gt;Zone of &lt;span class=&quot;kw&quot;&gt;maximum biological activity&lt;/span&gt;, plant growth &amp; leaching&lt;/li&gt;
            &lt;li&gt;Soft, well-aerated; &lt;span class=&quot;kw&quot;&gt;ideal for root penetration&lt;/span&gt;&lt;/li&gt;
            &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Depth:&lt;/span&gt; 10–30 cm&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;horizon-item&quot;&gt;
        &lt;div class=&quot;horizon-dot h-b&quot;&gt;B&lt;/div&gt;
        &lt;div&gt;
          &lt;strong&gt;B Horizon – Sub Soil&lt;/strong&gt;
          &lt;ul class=&quot;notes&quot; style=&quot;margin-top:4px;&quot;&gt;
            &lt;li&gt;Lighter coloured layer &lt;span class=&quot;kw&quot;&gt;below topsoil&lt;/span&gt;&lt;/li&gt;
            &lt;li&gt;Accumulation of minerals like &lt;span class=&quot;kw&quot;&gt;clay, iron, aluminium &amp; calcium carbonate&lt;/span&gt; (illuviation)&lt;/li&gt;
            &lt;li&gt;Contains &lt;span class=&quot;kw&quot;&gt;less humus&lt;/span&gt;, denser texture, fewer organisms&lt;/li&gt;
            &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Depth:&lt;/span&gt; 30–100 cm&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;horizon-item&quot;&gt;
        &lt;div class=&quot;horizon-dot h-c&quot;&gt;C&lt;/div&gt;
        &lt;div&gt;
          &lt;strong&gt;C Horizon – Parent Material&lt;/strong&gt;
          &lt;ul class=&quot;notes&quot; style=&quot;margin-top:4px;&quot;&gt;
            &lt;li&gt;Partially weathered &lt;span class=&quot;kw&quot;&gt;parent rock&lt;/span&gt; with coarse rock fragments&lt;/li&gt;
            &lt;li&gt;Very little organic matter&lt;/li&gt;
            &lt;li&gt;Represents the &lt;span class=&quot;kw&quot;&gt;initial stage of soil formation&lt;/span&gt;&lt;/li&gt;
            &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Supplies minerals&lt;/span&gt; to upper layers&lt;/li&gt;
            &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Depth:&lt;/span&gt; 100–200 cm&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/li&gt;
      &lt;li class=&quot;horizon-item&quot;&gt;
        &lt;div class=&quot;horizon-dot h-r&quot;&gt;R&lt;/div&gt;
        &lt;div&gt;
          &lt;strong&gt;R Horizon – Bedrock&lt;/strong&gt;
          &lt;ul class=&quot;notes&quot; style=&quot;margin-top:4px;&quot;&gt;
            &lt;li&gt;Hard, &lt;span class=&quot;kw&quot;&gt;unweathered parent rock&lt;/span&gt; beneath the soil profile&lt;/li&gt;
            &lt;li&gt;Source material from which upper soil horizons gradually develop through &lt;span class=&quot;kw&quot;&gt;weathering&lt;/span&gt;&lt;/li&gt;
            &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Depth:&lt;/span&gt; 200+ cm&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;Soil Profile – Key Points (from Infographic)&lt;/div&gt;
    &lt;div class=&quot;keypoint-grid&quot;&gt;
      &lt;div class=&quot;kp-item&quot;&gt;
        &lt;div class=&quot;kp-icon&quot;&gt;🌱&lt;/div&gt;
        &lt;div class=&quot;kp-text&quot;&gt;Soil forms over time due to &lt;span class=&quot;kw&quot;&gt;climate, organisms, relief, parent material &amp; time&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;kp-item&quot;&gt;
        &lt;div class=&quot;kp-icon&quot;&gt;💧&lt;/div&gt;
        &lt;div class=&quot;kp-text&quot;&gt;Water moves &lt;span class=&quot;kw&quot;&gt;downward through horizons&lt;/span&gt;, leaching minerals from upper &amp; depositing in lower layers&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;kp-item&quot;&gt;
        &lt;div class=&quot;kp-icon&quot;&gt;🌿&lt;/div&gt;
        &lt;div class=&quot;kp-text&quot;&gt;&lt;span class=&quot;kw&quot;&gt;Root density is highest in A horizon&lt;/span&gt; and decreases with depth&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;kp-item&quot;&gt;
        &lt;div class=&quot;kp-icon&quot;&gt;🪨&lt;/div&gt;
        &lt;div class=&quot;kp-text&quot;&gt;Texture becomes &lt;span class=&quot;kw&quot;&gt;coarser &amp; harder with depth&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;kp-item&quot;&gt;
        &lt;div class=&quot;kp-icon&quot;&gt;⏳&lt;/div&gt;
        &lt;div class=&quot;kp-text&quot;&gt;Well-developed soil profiles take &lt;span class=&quot;kw&quot;&gt;hundreds to thousands of years to form&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;📊&lt;/span&gt; Horizon Summary Table&lt;/div&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Horizon&lt;/th&gt;&lt;th&gt;Name&lt;/th&gt;&lt;th&gt;Depth&lt;/th&gt;&lt;th&gt;Key Feature&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;O&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Organic&lt;/td&gt;&lt;td&gt;0–5 cm&lt;/td&gt;&lt;td&gt;Humus; forest litter; microorganisms&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;A&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Top Soil&lt;/td&gt;&lt;td&gt;10–30 cm&lt;/td&gt;&lt;td&gt;Most fertile; max biological activity&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;B&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Sub Soil&lt;/td&gt;&lt;td&gt;30–100 cm&lt;/td&gt;&lt;td&gt;Mineral accumulation (illuviation)&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;C&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Parent Material&lt;/td&gt;&lt;td&gt;100–200 cm&lt;/td&gt;&lt;td&gt;Partly weathered rock; mineral supply&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;strong&gt;R&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Bedrock&lt;/td&gt;&lt;td&gt;200+ cm&lt;/td&gt;&lt;td&gt;Unweathered hard rock; source material&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;🧠 Mnemonic – Soil Horizons (Top → Bottom)&lt;/div&gt;
      &lt;strong&gt;&quot;Oh! All Brave Children Run&quot;&lt;/strong&gt;&lt;br&gt;
      &lt;span class=&quot;purple&quot;&gt;O&lt;/span&gt;rganic → &lt;span class=&quot;purple&quot;&gt;A&lt;/span&gt; (Topsoil) → &lt;span class=&quot;purple&quot;&gt;B&lt;/span&gt; (Subsoil) → &lt;span class=&quot;purple&quot;&gt;C&lt;/span&gt; (Parent Material) → &lt;span class=&quot;purple&quot;&gt;R&lt;/span&gt; (Bedrock)
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ===================== TAB 3: TYPES OF SOILS ===================== --&gt;
&lt;div id=&quot;t3&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;🗺️&lt;/span&gt; 8 Major Types of Soils in India&lt;/div&gt;
    &lt;div class=&quot;mnemo-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;🧠 Mnemonic – 8 Soil Types&lt;/div&gt;
      &lt;strong&gt;&quot;A Black Red Lion Doesn&#x27;t Make Poor Sense&quot;&lt;/strong&gt;&lt;br&gt;
      &lt;span class=&quot;purple&quot;&gt;A&lt;/span&gt;lluvial · &lt;span class=&quot;purple&quot;&gt;Bl&lt;/span&gt;ack · &lt;span class=&quot;purple&quot;&gt;R&lt;/span&gt;ed · &lt;span class=&quot;purple&quot;&gt;L&lt;/span&gt;aterite · &lt;span class=&quot;purple&quot;&gt;D&lt;/span&gt;esert · &lt;span class=&quot;purple&quot;&gt;M&lt;/span&gt;ountain/Forest · &lt;span class=&quot;purple&quot;&gt;P&lt;/span&gt;eaty · &lt;span class=&quot;purple&quot;&gt;S&lt;/span&gt;aline

  &lt;!-- 1. ALLUVIAL --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;1️⃣&lt;/span&gt; Alluvial Soil &lt;span class=&quot;pill pill-alluvial&quot;&gt;Most Widespread&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Formed by &lt;span class=&quot;kw&quot;&gt;deposition of river sediments&lt;/span&gt; over long periods&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Most widespread &amp; fertile soil&lt;/span&gt; in India&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Fine sandy to &lt;span class=&quot;kw&quot;&gt;clayey texture&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Rich in &lt;span class=&quot;kw&quot;&gt;potash &amp; lime&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Very fertile&lt;/span&gt; &amp; easy to cultivate&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Punjab, Haryana, Uttar Pradesh, Bihar, West Bengal, Assam (delta regions)&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Wheat&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🍚 Rice&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🎋 Sugarcane&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🫛 Pulses&lt;/span&gt;
    &lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 2. BLACK --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;2️⃣&lt;/span&gt; Black Soil &lt;span class=&quot;pill pill-black&quot;&gt;Regur / Cotton Soil&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Formed from weathering of &lt;span class=&quot;kw&quot;&gt;basaltic lava rocks&lt;/span&gt; of the &lt;span class=&quot;kw&quot;&gt;Deccan Trap&lt;/span&gt; region&lt;/li&gt;
      &lt;li&gt;Famous for &lt;span class=&quot;kw&quot;&gt;cotton cultivation&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Deep black colour&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;High clay content&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Develops cracks&lt;/span&gt; in summer (self-ploughing)&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Excellent moisture retention&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Maharashtra, Madhya Pradesh, Gujarat, Telangana, Karnataka&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌿 Cotton&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🫘 Soybean&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🎋 Sugarcane&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Wheat&lt;/span&gt;
    &lt;/p&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;💡 Key Fact&lt;/div&gt;
      Also called &lt;span class=&quot;kw&quot;&gt;Regur Soil&lt;/span&gt; (from Telugu word &#x27;Reguda&#x27;). Cracks in summer = &lt;span class=&quot;kw&quot;&gt;self-ploughing property&lt;/span&gt; = &lt;strong&gt;natural advantage!&lt;/strong&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- 3. RED --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;3️⃣&lt;/span&gt; Red Soil &lt;span class=&quot;pill pill-red&quot;&gt;Iron-Rich&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Develops from weathering of &lt;span class=&quot;kw&quot;&gt;ancient crystalline igneous rocks&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Forms in regions with &lt;span class=&quot;kw&quot;&gt;low to moderate rainfall&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Red colour due to &lt;span class=&quot;kw&quot;&gt;iron oxide (Fe₂O₃)&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Red / reddish-brown colour&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Light textured &amp; porous&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Less fertile&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;red&quot;&gt;Low in nitrogen &amp; humus&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Tamil Nadu, Karnataka, Andhra Pradesh, Odisha, Chhattisgarh&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Millets&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🫛 Pulses&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🥜 Groundnut&lt;/span&gt;
    &lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 4. LATERITE --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;4️⃣&lt;/span&gt; Laterite Soil &lt;span class=&quot;pill pill-laterite&quot;&gt;Leached&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Forms in &lt;span class=&quot;kw&quot;&gt;hot &amp; wet tropical climates&lt;/span&gt; with heavy rainfall &amp; intense leaching&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Silica gets removed&lt;/span&gt;, leaving &lt;span class=&quot;kw&quot;&gt;iron &amp; aluminium-rich soil&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Rich in &lt;span class=&quot;kw&quot;&gt;iron &amp; aluminium&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Strongly leached &amp; acidic&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Coarse &amp; porous texture&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;red&quot;&gt;Low fertility&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Western Ghats (Kerala, Karnataka, Tamil Nadu), Odisha, Assam &amp; NE India&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🍵 Tea&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;☕ Coffee&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌿 Rubber&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🥜 Cashew&lt;/span&gt;
    &lt;/p&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;⚠️ Remember&lt;/div&gt;
      &quot;Laterite&quot; comes from Latin &lt;em&gt;later&lt;/em&gt; = brick. This soil hardens on drying → &lt;span class=&quot;kw&quot;&gt;used as building bricks!&lt;/span&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- 5. DESERT --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;5️⃣&lt;/span&gt; Desert / Arid Soil &lt;span class=&quot;pill pill-desert&quot;&gt;Arid Regions&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Develops in &lt;span class=&quot;kw&quot;&gt;arid regions&lt;/span&gt; with very low rainfall &amp; sparse vegetation&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Mechanical weathering dominates&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Sandy texture&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Low organic matter&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Saline / alkaline tendency&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;red&quot;&gt;Poor moisture retention&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Rajasthan (mainly), Gujarat (dry regions), Haryana (dry regions)&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Bajra&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Jowar&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌿 Guar (with irrigation)&lt;/span&gt;
    &lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 6. MOUNTAIN/FOREST --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;6️⃣&lt;/span&gt; Mountain / Forest Soil &lt;span class=&quot;pill pill-mountain&quot;&gt;Altitude-Dependent&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Formed in &lt;span class=&quot;kw&quot;&gt;hilly &amp; forested regions&lt;/span&gt; under varying vegetation &amp; altitude&lt;/li&gt;
      &lt;li&gt;Nature &lt;span class=&quot;kw&quot;&gt;changes with altitude&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Thin &amp; coarse&lt;/span&gt; on slopes&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Rich in humus&lt;/span&gt; in forests&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Acidic in higher altitudes&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Low to moderate fertility&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Himalayas (J&amp;K, Himachal Pradesh, Uttarakhand), North-East India&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🍵 Tea&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🍎 Apple&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌿 Spices&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🍊 Fruits&lt;/span&gt;
    &lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 7. PEATY --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;7️⃣&lt;/span&gt; Peaty &amp; Marshy Soil &lt;span class=&quot;pill pill-peaty&quot;&gt;Waterlogged&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Forms in &lt;span class=&quot;kw&quot;&gt;waterlogged regions&lt;/span&gt; due to accumulation of organic matter under &lt;span class=&quot;kw&quot;&gt;humid conditions&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Dark black colour&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Very high organic matter&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Acidic in nature&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Waterlogged &amp; poorly drained&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Kerala, Sundarbans (West Bengal), Coastal Odisha, North Bihar&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Paddy&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌿 Jute&lt;/span&gt;
    &lt;/p&gt;
  &lt;/div&gt;

  &lt;!-- 8. SALINE --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span&gt;8️⃣&lt;/span&gt; Saline / Usara Soil &lt;span class=&quot;pill pill-saline&quot;&gt;Salt-Excess&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sh&quot;&gt;Formation&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Develops in &lt;span class=&quot;kw&quot;&gt;arid &amp; semi-arid areas&lt;/span&gt; due to &lt;span class=&quot;kw&quot;&gt;excess accumulation of salts&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Physical Characteristics&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Sandy &amp; loamy texture&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Excess soluble salts&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Poor structure&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;red&quot;&gt;Low fertility&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;States&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Gujarat (Rann of Kutch, Saurashtra), Punjab &amp; Haryana (some parts), Coastal AP &amp; TN&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Crops Grown&lt;/div&gt;
    &lt;p style=&quot;padding:6px 0; font-size:0.84rem;&quot;&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌾 Barley&lt;/span&gt;
      &lt;span class=&quot;crop-tag&quot;&gt;🌿 Cotton&lt;/span&gt;
    &lt;/p&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;⚠️ Also Called&lt;/div&gt;
      Saline soil is also known as &lt;span class=&quot;kw&quot;&gt;Reh, Kallar, or Usar&lt;/span&gt; soil in different regions of India.
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span class=&quot;icon&quot;&gt;📌&lt;/span&gt; What are Minerals?&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Naturally occurring&lt;/span&gt; inorganic substances found in &lt;span class=&quot;kw&quot;&gt;Earth&#x27;s crust&lt;/span&gt;&lt;/li&gt;

    &lt;div class=&quot;sh&quot;&gt;1. Metallic Minerals ⚙️&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Contain &lt;span class=&quot;kw&quot;&gt;metals in raw form&lt;/span&gt;; can be melted to obtain metals&lt;/li&gt;
      &lt;li&gt;Generally &lt;span class=&quot;kw&quot;&gt;hard, lustrous&lt;/span&gt;; good conductors of &lt;span class=&quot;kw&quot;&gt;heat &amp; electricity&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Important for &lt;span class=&quot;kw&quot;&gt;metallurgical &amp; manufacturing&lt;/span&gt; industries&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tbl-wrap&quot;&gt;
      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Type&lt;/th&gt;&lt;th&gt;Key Feature&lt;/th&gt;&lt;th&gt;Examples&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;type-pill pill-ferrous&quot;&gt;Ferrous&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Contain &lt;span class=&quot;kw&quot;&gt;iron&lt;/span&gt;; important for steel&lt;/td&gt;&lt;td&gt;Iron ore, Manganese, Chromite, Nickel&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;type-pill pill-nonferrous&quot;&gt;Non-Ferrous&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Do &lt;span class=&quot;kw&quot;&gt;NOT&lt;/span&gt; contain iron&lt;/td&gt;&lt;td&gt;Copper, Bauxite, Lead, Zinc, Gold, Silver&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;div class=&quot;sh&quot;&gt;2. Non-Metallic Minerals 💎&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Do &lt;span class=&quot;kw&quot;&gt;not&lt;/span&gt; contain metals; lack metallic lustre&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Poor conductors&lt;/span&gt; of heat &amp; electricity&lt;/li&gt;
      &lt;li&gt;Used in &lt;span class=&quot;kw&quot;&gt;construction, electrical, chemical&lt;/span&gt; industries&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Examples:&lt;/span&gt; Mica, Limestone, Gypsum, Dolomite, Graphite&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;3. Energy Minerals ⚡&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Used mainly for &lt;span class=&quot;kw&quot;&gt;power generation &amp; fuel&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Backbone of &lt;span class=&quot;kw&quot;&gt;industrial and economic development&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Examples:&lt;/span&gt; Coal, Petroleum, Natural Gas, Uranium, Thorium&lt;/li&gt;
    &lt;/ul&gt;

    &lt;div class=&quot;sh&quot;&gt;4. Atomic / Strategic Minerals ☢️&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;

      &lt;li&gt;Strategically important for &lt;span class=&quot;kw&quot;&gt;national security&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;green&quot;&gt;Examples:&lt;/span&gt; Lithium, Cobalt, Rare Earth Elements, Titanium, Uranium, Thorium&lt;/li&gt;
    &lt;/ul&gt;

    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Types of Iron Ore&lt;/div&gt;

      &lt;table&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Type&lt;/th&gt;&lt;th&gt;Key Feature&lt;/th&gt;&lt;th&gt;Quality&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;

          &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;kw&quot;&gt;Hematite&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Red-ochre ore; &lt;span class=&quot;acc&quot;&gt;60–70% Fe&lt;/span&gt;&lt;/td&gt;&lt;td&gt;✅ Most important Indian ore&lt;/td&gt;&lt;/tr&gt;

      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;Essential alloying mineral&lt;/span&gt; in steel industry&lt;/li&gt;
      &lt;li&gt;Improves &lt;span class=&quot;kw&quot;&gt;hardness, strength &amp; resistance&lt;/span&gt; of steel&lt;/li&gt;

  &lt;div class=&quot;card&quot;&gt;

&lt;!-- ===================== TAB 3: NON-FERROUS ===================== --&gt;
&lt;div id=&quot;t3&quot; class=&quot;panel&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;

      &lt;/div&gt;
      &lt;div class=&quot;fact-item&quot;&gt;
        &lt;div class=&quot;fact-label&quot;&gt;🏢 Headquarters&lt;/div&gt;

    &lt;div class=&quot;mnemo-box&quot;&gt;

      &lt;span class=&quot;purple&quot;&gt;I&lt;/span&gt;ran, &lt;span class=&quot;purple&quot;&gt;I&lt;/span&gt;raq, &lt;span class=&quot;purple&quot;&gt;K&lt;/span&gt;uwait, &lt;span class=&quot;purple&quot;&gt;S&lt;/span&gt;audi Arabia, &lt;span class=&quot;purple&quot;&gt;V&lt;/span&gt;enezuela

    &lt;ul class=&quot;notes&quot;&gt;

  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-title&quot;&gt;&lt;span class=&quot;icon&quot;&gt;🌐&lt;/span&gt; OPEC+ – Extended Alliance&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Alliance of &lt;span class=&quot;kw&quot;&gt;OPEC members + major non-OPEC producers&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Created because OPEC alone couldn&#x27;t control prices after rise of &lt;span class=&quot;kw&quot;&gt;Russia &amp; US shale oil&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Formed in &lt;span class=&quot;acc&quot;&gt;2016&lt;/span&gt; – after falling global crude oil prices due to oversupply&lt;/li&gt;
      &lt;li&gt;&lt;span class=&quot;acc&quot;&gt;Russia&lt;/span&gt; became the most important non-OPEC partner&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;tip-box&quot;&gt;

      &lt;li&gt;&lt;span class=&quot;kw&quot;&gt;OPEC Members:&lt;/span&gt; Saudi Arabia, Iran, Iraq, Kuwait, Algeria, Libya, Nigeria, Venezuela, Congo, Equatorial Guinea, Gabon&lt;/li&gt;

    &lt;/ul&gt;
    &lt;div class=&quot;sh&quot;&gt;Purpose of OPEC+&lt;/div&gt;
    &lt;ul class=&quot;notes&quot;&gt;
      &lt;li&gt;Coordinate oil production between &lt;span class=&quot;kw&quot;&gt;major producers&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Stabilize global crude oil prices &amp; prevent oversupply&lt;/li&gt;
      &lt;li&gt;Reduce &lt;span class=&quot;kw&quot;&gt;price volatility&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Ensure stability in &lt;span class=&quot;kw&quot;&gt;global energy markets&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;warn-box&quot;&gt;
      &lt;div class=&quot;label&quot;&gt;⚠️ Current Update (2026)&lt;/div&gt;

      &lt;span class=&quot;kw&quot;&gt;Russia &amp; Saudi Arabia&lt;/span&gt; remain most influential in OPEC+.&lt;br&gt;

  &lt;div class=&quot;intro-banner&quot;&gt;
    &lt;h2&gt;Indian Agriculture – Overview&lt;/h2&gt;
    &lt;p&gt;Primary livelihood for &lt;strong&gt;~58%&lt;/strong&gt; of India&#x27;s population · &lt;strong&gt;~55%&lt;/strong&gt; of net sown area is rainfed · Divided into &lt;strong&gt;3 cropping seasons&lt;/strong&gt;&lt;/p&gt;
  &lt;/div&gt;

  &lt;h2 class=&quot;first-tab&quot;&gt;📅 Three Cropping Seasons&lt;/h2&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Mnemonic — &quot;KRZ&quot;&lt;/strong&gt; → &lt;strong&gt;K&lt;/strong&gt;harif · &lt;strong&gt;R&lt;/strong&gt;abi · &lt;strong&gt;Z&lt;/strong&gt;aid&lt;br&gt;
    Think: &lt;em&gt;&quot;Karo Rabi Zara&quot;&lt;/em&gt; (June → Nov → March — goes in order round the year)
  &lt;/div&gt;

  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;&lt;th&gt;Season&lt;/th&gt;&lt;th&gt;Period&lt;/th&gt;&lt;th&gt;Sown / Harvested&lt;/th&gt;&lt;th&gt;Key Crops&lt;/th&gt;&lt;th&gt;States&lt;/th&gt;&lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;
          &lt;td&gt;🌧️ &lt;span class=&quot;kw&quot;&gt;Kharif&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;Jun–Oct&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;Sown: Jun–Jul · Harvested: Sep–Oct&lt;/td&gt;
          &lt;td&gt;Rice, Maize, Jowar, Bajra, Soyabean, Cotton, Groundnut&lt;/td&gt;
          &lt;td&gt;Assam, WB, Odisha, AP, Telangana, TN, Kerala, Maharashtra&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;❄️ &lt;span class=&quot;kw&quot;&gt;Rabi&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;Nov–Apr&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;Sown: Oct–Dec · Harvested: Apr–Jun&lt;/td&gt;
          &lt;td&gt;Wheat, Barley, Peas, Gram, Mustard&lt;/td&gt;
          &lt;td&gt;Punjab, Haryana, HP, J&amp;K, Uttarakhand, UP&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;☀️ &lt;span class=&quot;kw&quot;&gt;Zaid&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;yr&quot;&gt;Mar–Jun&lt;/span&gt;&lt;/td&gt;
          &lt;td&gt;Sown &amp; harvested: Mar–Jul&lt;/td&gt;
          &lt;td&gt;Watermelon, Muskmelon, Cucumber, Vegetables, Fodder&lt;/td&gt;
          &lt;td&gt;Most northern &amp; north-western states&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;h4&gt;✅ Kharif – Quick Facts&lt;/h4&gt;
    &lt;ul&gt;
      &lt;li&gt;Driven by &lt;strong&gt;South West Monsoon&lt;/strong&gt; – needs &lt;strong&gt;high humidity &amp;amp; abundant rainfall&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;🔹 &lt;strong&gt;West Bengal &amp;amp; Odisha&lt;/strong&gt;: 3 paddy crops/year → &lt;span class=&quot;kw&quot;&gt;Aus&lt;/span&gt; · &lt;span class=&quot;kw&quot;&gt;Aman&lt;/span&gt; · &lt;span class=&quot;kw&quot;&gt;Boro&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
    &lt;div class=&quot;mnemonic&quot; style=&quot;margin-top:8px;&quot;&gt;
      💡 &lt;strong&gt;AAB&lt;/strong&gt; → &lt;em&gt;Aus, Aman, Boro&lt;/em&gt; (think: &quot;AAB paddy in Bengal&quot;)
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card card-blue&quot;&gt;
    &lt;h4&gt;✅ Rabi – Quick Facts&lt;/h4&gt;
    &lt;ul&gt;
      &lt;li&gt;NOT fed by SW Monsoon – relies on &lt;strong&gt;residual soil moisture&lt;/strong&gt; left by it&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Western Disturbances&lt;/strong&gt; → vital winter rain for North India Rabi crops&lt;/li&gt;
      &lt;li&gt;Strong monsoon → recharged groundwater → better Rabi yields&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;card card-amber&quot;&gt;
    &lt;h4&gt;✅ Zaid – Quick Facts&lt;/h4&gt;
    &lt;ul&gt;
      &lt;li&gt;Short season between &lt;strong&gt;Rabi harvest &amp;amp; Kharif sowing&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Peak dry period → &lt;strong&gt;only irrigated areas&lt;/strong&gt; can farm&lt;/li&gt;
      &lt;li&gt;Crops: mostly &lt;strong&gt;fruits, vegetables, fodder&lt;/strong&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h2&gt;🌦️ Monsoon Variability → Cropping Pattern Impact&lt;/h2&gt;

  &lt;div class=&quot;tbl-wrap&quot;&gt;

      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Monsoon Condition&lt;/th&gt;&lt;th&gt;Farmer Response&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;✅ Early onset / Good distribution&lt;/td&gt;&lt;td&gt;Prefer water-intensive → &lt;strong&gt;Rice &amp;amp; Sugarcane&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;⚠️ Deficit / El Niño years&lt;/td&gt;&lt;td&gt;Shift to drought-resistant → &lt;strong&gt;Millets (Nutri-cereals)&lt;/strong&gt; or &lt;strong&gt;Pulses&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Heavy Rainfall zones (W. Ghats, NE)&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Rice &amp;amp; Plantation crops&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Moderate Rainfall (Gangetic Plains)&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Wheat-Rice cycle&lt;/strong&gt; (irrigation supported)&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Low Rainfall (Rajasthan, Deccan)&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Coarse Cereals &amp;amp; Oilseeds&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;div class=&quot;summary-box&quot;&gt;
    &lt;h3&gt;⚡ QUICK RECALL&lt;/h3&gt;
    &lt;ul class=&quot;no-border&quot;&gt;
      &lt;li&gt;Kharif = &lt;strong&gt;Monsoon crops&lt;/strong&gt; (Jun–Oct) · High water needed&lt;/li&gt;
      &lt;li&gt;Rabi = &lt;strong&gt;Winter crops&lt;/strong&gt; (Nov–Apr) · Residual moisture + Western Disturbances&lt;/li&gt;
      &lt;li&gt;Zaid = &lt;strong&gt;Summer bridge&lt;/strong&gt; (Mar–Jun) · Only irrigated areas&lt;/li&gt;
      &lt;li&gt;El Niño → &lt;strong&gt;farmers shift to Millets/Pulses&lt;/strong&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════ TAB 2: AGRO ZONES ═══════════════════ --&gt;
&lt;div id=&quot;t2&quot; class=&quot;tab-content&quot;&gt;
  &lt;h2&gt;🗺️ Agro-Climatic Zones of India&lt;/h2&gt;

  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;Divided by &lt;span class=&quot;kw&quot;&gt;Planning Commission&lt;/span&gt; (now &lt;strong&gt;NITI Aayog&lt;/strong&gt;) in &lt;span class=&quot;yr&quot;&gt;8th Five Year Plan&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;Total: &lt;strong&gt;15 Agro-Climatic Zones&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Based on: &lt;strong&gt;Topography · Soil type · Rainfall · Water availability&lt;/strong&gt;&lt;/li&gt;
      &lt;li&gt;Now form basis for → &lt;span class=&quot;kw&quot;&gt;National Mission for Sustainable Agriculture (NMSA)&lt;/span&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;🎯 Objectives of Agro-Climatic Zoning&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card card-blue&quot;&gt;
      &lt;h4&gt;🗓️ Regional Planning&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Scientific farming based on each region&#x27;s specific constraints &amp;amp; potentials&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-teal&quot;&gt;
      &lt;h4&gt;💧 Resource Optimization&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Improve water-use efficiency &amp;amp; soil health management&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-green&quot;&gt;
      &lt;h4&gt;🌿 Cropping Diversification&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Move away from &lt;strong&gt;Wheat-Rice monoculture&lt;/strong&gt; where ecologically unsustainable&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-amber&quot;&gt;
      &lt;h4&gt;👷 Employment Generation&lt;/h4&gt;
      &lt;p style=&quot;font-size:0.85rem;color:var(--text2);&quot;&gt;Develop agro-based industries (food processing) for local produce&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;h3&gt;📋 All 15 Zones – At a Glance&lt;/h3&gt;
  &lt;div class=&quot;tbl-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;#&lt;/th&gt;&lt;th&gt;Zone Name&lt;/th&gt;&lt;th&gt;Key Characteristics&lt;/th&gt;&lt;th&gt;Major Crops&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;Western Himalayan Region&lt;/td&gt;&lt;td&gt;High relief, snow, steep slopes&lt;/td&gt;&lt;td&gt;Apples, Walnuts, Saffron, Potato&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;Eastern Himalayan Region&lt;/td&gt;&lt;td&gt;High rainfall, thick forest, shifting cultivation&lt;/td&gt;&lt;td&gt;Rice, Maize, Tea, Pineapple&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;Lower Gangetic Plains&lt;/td&gt;&lt;td&gt;Alluvial soil, very high rainfall, humid&lt;/td&gt;&lt;td&gt;Rice (Aus, Aman, Boro), Jute&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Middle Gangetic Plains&lt;/td&gt;&lt;td&gt;Fertile alluvium, high population density&lt;/td&gt;&lt;td&gt;Rice, Wheat, Sugarcane, Maize&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;5&lt;/td&gt;&lt;td&gt;Upper Gangetic Plains&lt;/td&gt;&lt;td&gt;Sub-humid, well-irrigated (canals/tubewells)&lt;/td&gt;&lt;td&gt;Wheat, Rice, Sugarcane, Mustard&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;6&lt;/td&gt;&lt;td&gt;Trans-Gangetic Plains&lt;/td&gt;&lt;td&gt;High semi-arid intensity, highest irrigation&lt;/td&gt;&lt;td&gt;Wheat, Paddy, Cotton, Gram&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;Eastern Plateau &amp;amp; Hills&lt;/td&gt;&lt;td&gt;Red &amp;amp; yellow soils, tribal farming, undulating&lt;/td&gt;&lt;td&gt;Rice, Maize, Oilseeds, Tur&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;8&lt;/td&gt;&lt;td&gt;Central Plateau &amp;amp; Hills&lt;/td&gt;&lt;td&gt;Scanty rainfall, diverse soil (Black/Red/Alluvial)&lt;/td&gt;&lt;td&gt;Wheat, Gram, Oilseeds, Cotton&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;9&lt;/td&gt;&lt;td&gt;Western Plateau &amp;amp; Hills&lt;/td&gt;&lt;td&gt;Black soil (Regur), basaltic topography&lt;/td&gt;&lt;td&gt;Jowar, Bajra, Cotton, Grapes, Oranges&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;10&lt;/td&gt;&lt;td&gt;Southern Plateau &amp;amp; Hills&lt;/td&gt;&lt;td&gt;Dry farming, rain-shadow area&lt;/td&gt;&lt;td&gt;Millets, Pulses, Groundnut, Coffee&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;11&lt;/td&gt;&lt;td&gt;East Coast Plains &amp;amp; Hills&lt;/td&gt;&lt;td&gt;Deltaic alluvium, marine influence&lt;/td&gt;&lt;td&gt;Rice, Coconut, Tobacco&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;12&lt;/td&gt;&lt;td&gt;West Coast Plains &amp;amp; Ghats&lt;/td&gt;&lt;td&gt;High rainfall, humid, laterite soil&lt;/td&gt;&lt;td&gt;Rice, Spices, Rubber, Cashew, Coconut&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;13&lt;/td&gt;&lt;td&gt;Gujarat Plains &amp;amp; Hills&lt;/td&gt;&lt;td&gt;Arid/Semi-arid, saline soils in parts&lt;/td&gt;&lt;td&gt;Cotton, Groundnut, Castor, Tobacco&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;14&lt;/td&gt;&lt;td&gt;Western Dry Region&lt;/td&gt;&lt;td&gt;Desert soil, hot arid climate, very low rain&lt;/td&gt;&lt;td&gt;Bajra, Guar, Moth&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;15&lt;/td&gt;&lt;td&gt;The Islands&lt;/td&gt;&lt;td&gt;Equatorial climate, high humidity, coral/volcanic soil&lt;/td&gt;&lt;td&gt;Rice, Spices, Fruits, Rubber&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;h2&gt;🌿 National Mission for Sustainable Agriculture (NMSA)&lt;/h2&gt;
  &lt;div class=&quot;card card-green&quot;&gt;
    &lt;ul&gt;
      &lt;li&gt;One of &lt;strong&gt;8 missions&lt;/strong&gt; under &lt;span class=&quot;kw&quot;&gt;National Action Plan on Climate Change (NAPCC)&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Nodal Ministry:&lt;/strong&gt; Ministry of Agriculture and Farmers Welfare&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Origin:&lt;/strong&gt; Launched as part of NAPCC in &lt;span class=&quot;yr&quot;&gt;2008&lt;/span&gt; · Fully operational ~&lt;span class=&quot;yr&quot;&gt;2014–15&lt;/span&gt;&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Financial Model:&lt;/strong&gt; &lt;span class=&quot;kw&quot;&gt;60:40&lt;/span&gt; (Centre:States) · &lt;span class=&quot;kw&quot;&gt;90:10&lt;/span&gt; for NE &amp;amp; Himalayan States&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Goal:&lt;/strong&gt; Transform agriculture into &lt;strong&gt;climate-resilient production system&lt;/strong&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;h3&gt;4 Major Components of NMSA&lt;/h3&gt;
  &lt;div class=&quot;grid-2&quot;&gt;
    &lt;div class=&quot;card card-teal&quot;&gt;
      &lt;h4&gt;1. RAD – Rainfed Area Development&lt;/h4&gt;
      &lt;ul class=&quot;no-border&quot;&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Area-based approach for rainfed regions&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Promotes &lt;strong&gt;Integrated Farming Systems (IFS)&lt;/strong&gt;&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Combines crops + horticulture + livestock + fishery + agro-forestry&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Income diversification → buffer if one component fails&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-blue&quot;&gt;
      &lt;h4&gt;2. OFWM – On-Farm Water Management&lt;/h4&gt;
      &lt;ul class=&quot;no-border&quot;&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Enhances water-use efficiency&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Promotes &lt;strong&gt;Precision Irrigation&lt;/strong&gt; (Drip &amp;amp; Sprinkler)&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;&lt;strong&gt;FERTIGATION&lt;/strong&gt; – direct fertilizer via drip&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Reduces water wastage &amp;amp; prevents soil salinity&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-green&quot;&gt;
      &lt;h4&gt;3. SHM – Soil Health Management&lt;/h4&gt;
      &lt;ul class=&quot;no-border&quot;&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Sustainable soil health&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;&lt;strong&gt;Soil Health Card (SHC)&lt;/strong&gt; – nutrient status + dosage&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Prevents excessive Urea use&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Balances &lt;strong&gt;NPK ratio&lt;/strong&gt;&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card card-amber&quot;&gt;
      &lt;h4&gt;4. CRA – Climate Resilient Agriculture&lt;/h4&gt;
      &lt;ul class=&quot;no-border&quot;&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Disseminates &lt;strong&gt;Climate-Smart Technologies&lt;/strong&gt;&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Uses drought-tolerant seed varieties&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Alters sowing dates based on weather forecasts&lt;/li&gt;
        &lt;li style=&quot;font-size:0.82rem;&quot;&gt;Promotes &lt;strong&gt;&#x27;Zero Tillage&#x27;&lt;/strong&gt; to prevent soil carbon loss&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;mnemonic&quot;&gt;
    💡 &lt;strong&gt;Mnemonic for NMSA Components:&lt;/strong&gt; &lt;em&gt;&quot;ROCS&quot;&lt;/em&gt; → &lt;strong&gt;R&lt;/strong&gt;ainfed · &lt;strong&gt;O&lt;/strong&gt;n-farm water · &lt;strong&gt;C&lt;/strong&gt;limate resilient · &lt;strong&gt;S&lt;/strong&gt;oil health
  &lt;/div&gt;

  &lt;div class=&quot;summary-box&quot;&gt;
    &lt;h3&gt;⚡ QUICK RECALL&lt;/h3&gt;
    &lt;ul class=&quot;no-border&quot;&gt;
      &lt;li&gt;&lt;strong&gt;15 Agro Zones&lt;/strong&gt; → 8th Five Year Plan · NITI Aayog&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;NMSA&lt;/strong&gt; → under NAPCC · 2008 launched · 60:40 funding&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;4 NMSA pillars&lt;/strong&gt; → RAD · OFWM · SHM · CRA&lt;/li&gt;
      &lt;li&gt;Zone 14 (Western Dry) → only Bajra, Guar, Moth (extreme arid)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;
&lt;/div&gt;
